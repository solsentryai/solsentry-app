<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SolSentry — Is it safe?</title>
<meta name="description" content="SolSentry: find out in seconds if a Solana wallet or token is safe.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #C17D0E; --teal: #00C9A7; --purple: #A855F7;
  --red: #FF4444; --yellow: #FFB800; --green: #22C55E;
  --bg: #100E0A; --card: #1F1B14; --border: #2A251C;
  --white: #F2EDE4; --muted: rgba(242,237,228,0.55);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html, body { background: var(--bg); color: var(--white); font-family: var(--font-body); min-height: 100vh; }
body { background:
  radial-gradient(ellipse 900px 600px at 20% 10%, rgba(193,125,14,0.08), transparent 60%),
  radial-gradient(ellipse 700px 500px at 80% 90%, rgba(168,85,247,0.06), transparent 60%),
  #100E0A;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; border-radius: 4px; }
button { font-family: inherit; }

@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scale-in { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
.fade-up { animation: fade-up 400ms ease-out; }
.scale-in { animation: scale-in 500ms cubic-bezier(0.34, 1.56, 0.64, 1); }

/* Mode switcher (bottom-left) */
.mode-switcher { display: none !important;
  position: fixed; bottom: 20px; left: 20px; z-index: 100;
  background: rgba(26,26,26,0.95); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 10px; padding: 6px;
  display: flex; flex-direction: column; gap: 2px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.mode-btn {
  padding: 8px 14px; border-radius: 6px; background: transparent;
  border: none; color: var(--muted); cursor: pointer;
  font-family: var(--font-body); font-weight: 500; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s ease; min-width: 100px;
}
.mode-btn:hover { background: rgba(242,237,228,0.04); color: var(--white); }
.mode-btn.active { background: var(--orange); color: var(--white); }
.mode-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.mode-btn.active .dot { opacity: 1; animation: pulse 1.8s infinite; }
.mode-hint { font-size: 10px; color: var(--muted); padding: 4px 14px 2px; letter-spacing: 0.1em; text-transform: uppercase; }

/* FUN MODE */
.fun-shell {
  max-width: 640px; margin: 0 auto;
  padding: 40px 20px 120px; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
.fun-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; margin-top: 40px; }
.fun-logo-text { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: var(--orange); letter-spacing: -0.02em; text-transform: uppercase; }
.fun-headline {
  font-family: var(--font-display); font-weight: 700; font-size: 32px;
  text-align: center; line-height: 1.15; margin-bottom: 10px;
  letter-spacing: -0.02em;
}
.fun-sub {
  font-size: 15px; color: var(--muted); text-align: center;
  margin-bottom: 32px; max-width: 460px; line-height: 1.5;
}
.fun-input-wrap {
  width: 100%; display: flex; gap: 10px; margin-bottom: 12px;
}
.fun-input {
  flex: 1; background: var(--card); border: 2px solid var(--border);
  border-radius: 12px; padding: 18px 20px;
  color: var(--white); font-family: var(--font-mono); font-size: 14px;
  outline: none; transition: all 0.2s ease;
}
.fun-input:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(193,125,14,0.1); }
.fun-input::placeholder { color: var(--muted); }
.fun-btn {
  background: var(--orange); color: var(--white); border: none;
  border-radius: 12px; padding: 0 28px; cursor: pointer;
  font-family: var(--font-body); font-weight: 700; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.08em;
  transition: all 0.15s ease; white-space: nowrap;
}
.fun-btn:hover { background: #D89530; transform: translateY(-1px); }
.fun-btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; transform: none; }
.fun-examples {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-top: 4px;
}
.fun-example {
  background: rgba(242,237,228,0.04); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; cursor: pointer;
  font-size: 12px; color: var(--muted); font-family: var(--font-body);
  transition: all 0.15s ease;
}
.fun-example:hover { background: rgba(242,237,228,0.08); color: var(--white); }

/* Result card */
.result-card {
  width: 100%; margin-top: 32px;
  background: var(--card); border: 2px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.result-card.critical { border-color: rgba(255,68,68,0.5); box-shadow: 0 0 40px rgba(255,68,68,0.15); }
.result-card.high { border-color: rgba(193,125,14,0.5); box-shadow: 0 0 40px rgba(193,125,14,0.15); }
.result-card.medium { border-color: rgba(255,184,0,0.45); }
.result-card.low, .result-card.clean { border-color: rgba(34,197,94,0.45); box-shadow: 0 0 40px rgba(34,197,94,0.1); }
.result-card.unknown { border-color: rgba(168,85,247,0.4); }

.result-header {
  padding: 36px 28px 24px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.result-emoji { font-size: 72px; line-height: 1; margin-bottom: 16px; display: block; }
.result-title {
  font-family: var(--font-display); font-weight: 700; font-size: 32px;
  letter-spacing: -0.02em; margin-bottom: 8px;
}
.result-title.critical { color: var(--red); }
.result-title.high { color: var(--orange); }
.result-title.medium { color: var(--yellow); }
.result-title.low, .result-title.clean { color: var(--green); }
.result-title.unknown { color: var(--purple); }

.result-recommendation {
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em;
  padding: 6px 14px; border-radius: 6px;
  display: inline-block;
}
.result-recommendation.critical { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid rgba(255,68,68,0.4); }
.result-recommendation.high { background: rgba(193,125,14,0.15); color: var(--orange); border: 1px solid rgba(193,125,14,0.4); }
.result-recommendation.medium { background: rgba(255,184,0,0.12); color: var(--yellow); border: 1px solid rgba(255,184,0,0.35); }
.result-recommendation.low, .result-recommendation.clean { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.35); }
.result-recommendation.unknown { background: rgba(168,85,247,0.12); color: var(--purple); border: 1px solid rgba(168,85,247,0.35); }

.result-body { padding: 24px 28px; }
.result-explain { font-size: 15px; line-height: 1.65; color: rgba(242,237,228,0.85); margin-bottom: 20px; }
.result-explain strong { color: var(--white); font-weight: 600; }
.result-explain .num { font-family: var(--font-mono); }

.result-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-top: 20px;
}
.result-stat {
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px 12px; text-align: center;
}
.result-stat-value {
  font-family: var(--font-display); font-weight: 700; font-size: 24px;
  line-height: 1; letter-spacing: -0.02em;
}
.result-stat-label {
  font-size: 10px; color: var(--muted); margin-top: 6px;
  text-transform: uppercase; letter-spacing: 0.1em;
}

.result-details-toggle {
  display: block; width: 100%; padding: 14px 28px;
  background: rgba(242,237,228,0.02); border: none; border-top: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;
  transition: background 0.15s ease;
}
.result-details-toggle:hover { background: rgba(242,237,228,0.04); color: var(--white); }

.result-details {
  padding: 20px 28px; border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}
.result-detail-row {
  display: flex; justify-content: space-between; padding: 8px 0;
  font-size: 13px; border-bottom: 1px solid rgba(242,237,228,0.03);
}
.result-detail-row:last-child { border-bottom: none; }
.result-detail-key { color: var(--muted); }
.result-detail-val { color: var(--white); font-weight: 500; font-family: var(--font-mono); font-size: 12px; }

.addr-display {
  font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  padding: 10px 14px; background: rgba(0,0,0,0.3);
  border-radius: 6px; word-break: break-all; margin-bottom: 16px;
}

.fun-footer {
  text-align: center; color: var(--muted); font-size: 12px; margin-top: 48px;
  line-height: 1.6;
}
.fun-footer a { color: var(--orange); text-decoration: none; }
.fun-footer a:hover { text-decoration: underline; }

/* Loading spinner */
.spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 3px solid rgba(193,125,14,0.2); border-top-color: var(--orange);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}

/* PRO MODE */
.pro-shell {
  padding: 0; min-height: 100vh;
}
.pro-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: rgba(10,10,10,0.9); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}
.pro-brand { display: flex; align-items: center; gap: 12px; }
.pro-brand-text { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--orange); letter-spacing: -0.02em; }
.pro-stats-bar {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px; padding: 16px 24px;
}
.pro-stat {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px;
}
.pro-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; }
.pro-stat-value { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; }
.pro-stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.pro-main { padding: 16px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .pro-main { grid-template-columns: 1fr; } }
.pro-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.pro-panel-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  font-family: var(--font-display); font-weight: 700; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.12em;
  display: flex; justify-content: space-between; align-items: center;
}
.pro-op-row {
  display: grid; grid-template-columns: 160px 1fr 100px 80px;
  gap: 10px; padding: 10px 16px; align-items: center;
  border-bottom: 1px solid var(--border);
}
.pro-op-row:last-child { border-bottom: none; }
.mono { font-family: var(--font-mono); font-size: 12px; }
.risk-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 2px 8px; border-radius: 4px;
}
.risk-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; display: inline-block; }
.risk-CRITICAL { color: var(--red); background: rgba(255,68,68,0.12); border: 1px solid rgba(255,68,68,0.35); }
.risk-HIGH { color: var(--orange); background: rgba(193,125,14,0.12); border: 1px solid rgba(193,125,14,0.35); }
.risk-MEDIUM { color: var(--yellow); background: rgba(255,184,0,0.12); border: 1px solid rgba(255,184,0,0.35); }
.risk-LOW, .risk-CLEAN { color: var(--teal); background: rgba(0,201,167,0.12); border: 1px solid rgba(0,201,167,0.35); }
.risk-UNKNOWN { color: var(--muted); background: rgba(242,237,228,0.04); border: 1px solid var(--border); }

/* DEV MODE */
.dev-shell { padding: 24px; max-width: 1100px; margin: 0 auto 100px; }
.dev-title {
  font-family: var(--font-display); font-weight: 700; font-size: 32px;
  margin-bottom: 8px; color: var(--orange); letter-spacing: -0.02em;
}
.dev-sub { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
.dev-section { margin-bottom: 32px; }
.dev-section-title {
  font-family: var(--font-display); font-weight: 700; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--muted); margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.dev-endpoint {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px;
}
.dev-endpoint-method {
  display: inline-block; font-family: var(--font-mono); font-size: 11px;
  font-weight: 700; padding: 2px 8px; border-radius: 4px;
  background: rgba(0,201,167,0.15); color: var(--teal);
  margin-right: 10px; letter-spacing: 0.05em;
}
.dev-endpoint-path {
  font-family: var(--font-mono); font-size: 14px; color: var(--white);
}
.dev-endpoint-desc { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.5; }
.dev-code {
  background: #000; border: 1px solid var(--border); border-radius: 6px;
  padding: 14px 16px; font-family: var(--font-mono); font-size: 12px;
  color: #88ddff; overflow-x: auto; margin-top: 10px;
  line-height: 1.6; position: relative;
}
.dev-code-copy {
  position: absolute; top: 10px; right: 10px;
  background: rgba(242,237,228,0.06); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; padding: 4px 10px;
  font-family: var(--font-body); font-size: 10px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.dev-code-copy:hover { color: var(--orange); border-color: var(--orange); }
.dev-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.dev-tab {
  padding: 6px 14px; background: transparent; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px; cursor: pointer;
  font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
}
.dev-tab.active { background: var(--orange); color: var(--white); border-color: var(--orange); }

/* Responsive */
@media (max-width: 600px) {
  .fun-headline { font-size: 26px; }
  .fun-input-wrap { flex-direction: column; }
  .fun-btn { padding: 16px; width: 100%; }
  .result-emoji { font-size: 56px; }
  .result-title { font-size: 24px; }
  .result-stats { grid-template-columns: repeat(2, 1fr); }
  .mode-switcher { display: none !important; bottom: 10px; left: 10px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = 'https://api.solsentry.app';
const DEFAULT_DANGER = '4kxscuteRLQdNiTXA33YYsvywAPNA6DQTifswxjL5pH1';
const DEFAULT_SAFE = 'So11111111111111111111111111111111111111112';

// ── API ───────────────────────────────────────────────────────
async function fetchOperator(a) { const r = await fetch(`${API}/v1/operator/${a}`); return r.json(); }
async function fetchToken(a) { const r = await fetch(`${API}/v1/token/${a}`); return r.json(); }
async function fetchStats() { const r = await fetch(`${API}/v1/stats`); return r.json(); }
async function fetchTopOps(n = 10) { const r = await fetch(`${API}/v1/top-operators?limit=${n}`); const d = await r.json(); return d.operators || []; }

// ── Helpers ───────────────────────────────────────────────────
function isValidAddr(s) {
  if (!s) return false;
  const t = s.trim();
  return t.length >= 32 && t.length <= 44 && /^[1-9A-HJ-NP-Za-km-z]+$/.test(t);
}
function fmt(n) { if (n == null) return '—'; return typeof n === 'number' ? n.toLocaleString() : String(n); }
function shortAddr(a) { if (!a || a.length < 12) return a || '—'; return a.slice(0,6)+'…'+a.slice(-4); }

// ── Rule-based AI Explainer (pt-BR) ───────────────────────────
function explainRisk({ op, tok, addr }) {
  const opKnown = op?.known;
  const tokKnown = tok?.known;

  if (!opKnown && !tokKnown) {
    const isPumpFun = /pump$/i.test(addr);
    const isMoon = /moon$/i.test(addr);
    const knownMint = isPumpFun || isMoon;
    return {
      level: 'unknown',
      emoji: knownMint ? '🆕' : '❓',
      title: knownMint ? 'NEW LAUNCH' : 'NOT FOUND',
      recommendation: knownMint ? 'Investigate before buying' : 'Maximum caution',
      explain: <>
        {knownMint ? (
          <>
            This looks like a <strong>{isPumpFun ? 'Pump.fun' : 'meme'} token</strong> that hasn't been scanned by SolSentry yet.
            <br/><br/>
            <strong>Most Pump.fun tokens fail or rug within hours.</strong> Use the links below to investigate before buying.
          </>
        ) : (
          <>
            This address <strong>is not in the SolSentry database</strong>.
            It might be too new, never scanned, or simply has not generated suspicious activity.
            <br/><br/>
            <strong>That does not mean it is safe</strong> — it means we have no information.
            If you are planning to buy, investigate with other tools first.
          </>
        )}
      </>,
      stats: null,
      externalLinks: [
        { label: 'Solscan', href: `https://solscan.io/token/${addr}` },
        { label: 'DexScreener', href: `https://dexscreener.com/solana/${addr}` },
        { label: 'RugCheck', href: `https://rugcheck.xyz/tokens/${addr}` },
      ],
    };
  }

  // Operator takes priority
  if (opKnown) {
    const rugs = op.confirmed_rugs || 0;
    const tokens = op.total_tokens || 0;
    const rate = op.rug_rate_pct || 0;
    const isSerial = op.tags?.includes('serial_rugger') || op.tags?.includes('serial_deployer');
    const level = op.risk_level;

    const stats = [
      { label: 'Rug pulls', value: fmt(rugs), color: 'var(--red)' },
      { label: 'Tokens created', value: fmt(tokens), color: 'var(--orange)' },
      { label: 'Rug rate', value: rate != null ? rate + '%' : '—', color: rate >= 50 ? 'var(--red)' : 'var(--white)' },
    ];

    if (rugs >= 5 || level === 'CRITICAL') {
      return {
        level: 'critical', emoji: '🔴',
        title: 'EXTREME DANGER',
        recommendation: '⛔ DO NOT BUY',
        explain: <>
          This creator has already executed <strong className="num">{rugs} confirmed rug pulls</strong> across <strong className="num">{tokens} tokens</strong> deployed.
          Rug rate: <strong className="num">{rate}%</strong>.
          {isSerial && <> This is a known <strong>serial deployer</strong> — repeating pattern of launching tokens, attracting buyers, and pulling liquidity.</>}
          <br/><br/>
          Any new token from this wallet is extremely likely to be another scam.
        </>,
        stats
      };
    }

    if (rugs >= 2 || level === 'HIGH') {
      return {
        level: 'high', emoji: '🟠',
        title: 'HIGH RISK',
        recommendation: '⚠ Avoid buying',
        explain: <>
          This wallet has <strong className="num">{rugs} confirmed rug pulls</strong> across <strong className="num">{tokens} tokens</strong> deployed.
          {rate >= 30 && <> Rug rate: <strong className="num">{rate}%</strong>.</>}
          <br/><br/>
          If you really need to interact, use only very small amounts — there is real risk of losing everything.
        </>,
        stats
      };
    }

    if (level === 'MEDIUM') {
      return {
        level: 'medium', emoji: '🟡',
        title: 'MEDIUM RISK',
        recommendation: 'Investigate first',
        explain: <>
          This wallet has some warning signs but nothing conclusive.
          Activity: <strong className="num">{tokens} tokens</strong> created{rugs > 0 && <>, <strong className="num">{rugs}</strong> turned into rugs</>}.
          <br/><br/>
          Look for more information before investing any significant amount.
        </>,
        stats
      };
    }

    return {
      level: 'low', emoji: '🟢',
      title: 'LOW RISK',
      recommendation: 'Looks safe',
      explain: <>
        This wallet is in our database and <strong>does not show clear scam patterns</strong>.
        Activity: <strong className="num">{tokens} tokens</strong> created, <strong className="num">{rugs}</strong> rugs.
        <br/><br/>
        This is not an absolute guarantee — in crypto, never invest more than you can afford to lose.
      </>,
      stats
    };
  }

  // Token (not operator)
  if (tokKnown) {
    const score = tok.risk_score || 0;
    const level = tok.risk_level;
    const sym = tok.symbol;

    const stats = [
      { label: 'Risk Score', value: score + '/100', color: score >= 60 ? 'var(--red)' : score >= 40 ? 'var(--yellow)' : 'var(--green)' },
      { label: 'Symbol', value: sym || '—', color: 'var(--white)' },
      { label: 'Result', value: tok.final_outcome === 'confirmed_scam' ? 'RUG' : tok.final_outcome === 'confirmed_safe' ? 'SAFE' : 'Pending', color: 'var(--muted)' },
    ];

    if (level === 'CRITICAL' || score >= 80 || tok.final_outcome === 'confirmed_scam') {
      return {
        level: 'critical', emoji: '🔴',
        title: 'DANGEROUS TOKEN',
        recommendation: '⛔ DO NOT BUY',
        explain: <>
          This token <strong>{sym ? `(${sym})` : ''} has been classified as a scam</strong> by SolSentry.
          Risk score: <strong className="num">{score}/100</strong>.
          {tok.final_outcome === 'confirmed_scam' && <> Already confirmed as an <strong>executed rug pull</strong>.</>}
          {tok.is_bundle && <> We detected a <strong>coordinated bot cluster</strong> buying on launch.</>}
          <br/><br/>
          {tok.flags?.length > 0 && <>Signals detected: {tok.flags.slice(0,3).map(f => String(f).replace(/[^\x20-\x7E]/g,'').trim()).filter(Boolean).join(', ')}.</>}
        </>,
        stats
      };
    }

    if (level === 'HIGH' || score >= 60) {
      return {
        level: 'high', emoji: '🟠',
        title: 'RISKY TOKEN',
        recommendation: '⚠ Maximum caution',
        explain: <>
          This token has <strong>concerning signals</strong>. Score: <strong className="num">{score}/100</strong>.
          {tok.is_bundle && <> Coordinated bot cluster detected.</>}
          <br/><br/>
          Only invest amounts you accept to lose completely.
        </>,
        stats
      };
    }

    if (level === 'MEDIUM' || score >= 40) {
      return {
        level: 'medium', emoji: '🟡',
        title: 'MEDIUM RISK',
        recommendation: 'Investigate first',
        explain: <>
          Risk score: <strong className="num">{score}/100</strong>. Some warning signs detected, but not conclusive.
          <br/><br/>
          Check liquidity, holders, and creator activity before deciding.
        </>,
        stats
      };
    }

    return {
      level: 'low', emoji: '🟢',
      title: 'TOKEN OK',
      recommendation: 'Looks safe',
      explain: <>
        Low score: <strong className="num">{score}/100</strong>.
        {tok.final_outcome === 'confirmed_safe' && <> Confirmed as <strong>safe</strong> by our resolution system.</>}
        <br/><br/>
        Remember: "low risk" is not "no risk". Do your own research.
      </>,
      stats
    };
  }

  return { level: 'unknown', emoji: '❓', title: 'NOT FOUND', recommendation: 'Caution', explain: 'No data.', stats: null };
}

  const inputRef = useRef(null);

  const check = useCallback(async (addr) => {
    const a = (addr || input).trim();
    if (!isValidAddr(a)) {
      setErrorr('Invalid Solana address. Check and try again.');
      return;
    }
    setLoading(true); setErrorr(null); setResult(null); setShowDetails(false);
    try {
      const [op, tok] = await Promise.all([
        fetchOperator(a).catch(() => ({})),
        fetchToken(a).catch(() => ({}))
      ]);
      const analysis = explainRisk({ op, tok, addr: a });
      setResult({ ...analysis, addr: a, raw: { op, tok } });
    } catch (e) {
      setErrorr('API request failed. Check that the server is running.');
    } finally {
      setLoading(false);
    }
  }, [input]);

  const tryExample = useCallback((addr) => {
    setInput(addr);
    setTimeout(() => check(addr), 100);
  }, [check]);

  return (

// ── App ───────────────────────────────────────────────────────
function App() {
  const [mode, setMode] = useState(() => localStorage.getItem('solsentry_mode') || 'fun');

  const changeMode = useCallback((m) => {
    setMode(m);
    localStorage.setItem('solsentry_mode', m);
  }, []);

  return (
    <>
      {mode === 'fun' && <FunMode />}
      {mode === 'pro' && <ProMode />}
      {mode === 'dev' && <DevMode />}
      <ModeSwitcher mode={mode} onChange={changeMode} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
