<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SolSentry — Nav Concepts A/B/C</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; background: #0A0A0A; color: #F5F5F5; font-family: Inter, system-ui, sans-serif; }
  body {
    background:
      radial-gradient(ellipse 900px 600px at 20% 10%, rgba(255,107,0,0.08), transparent 60%),
      radial-gradient(ellipse 700px 500px at 80% 90%, rgba(168,85,247,0.06), transparent 60%),
      #0A0A0A;
  }

  /* ============================================================
     Mock page body — shared faux fun.html content behind each nav
     ============================================================ */
  .mock-stage {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 10px;
    background:
      radial-gradient(ellipse 600px 400px at 20% 10%, rgba(255,107,0,0.10), transparent 60%),
      radial-gradient(ellipse 500px 350px at 80% 90%, rgba(168,85,247,0.07), transparent 60%),
      #0A0A0A;
  }
  .mock-body {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 140px;
  }
  .mock-shield {
    width: 56px; height: 56px; border-radius: 14px;
    background: rgba(255,107,0,0.12); border: 1px solid rgba(255,107,0,0.35);
    display: grid; place-items: center; margin-bottom: 20px;
  }
  .mock-shield svg { width: 30px; height: 30px; }
  .mock-h1 {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 40px; letter-spacing: -0.02em; line-height: 1.1; text-align: center;
    margin: 0 0 10px;
  }
  .mock-sub { color: #8A8A8A; font-size: 14px; text-align: center; max-width: 380px; }
  .mock-input {
    margin-top: 28px;
    width: min(560px, 80%); height: 54px; border-radius: 12px;
    background: #1A1A1A; border: 1px solid #242424;
    display: flex; align-items: center; padding: 0 18px;
    font-family: 'JetBrains Mono', monospace; color: #5A5A5A; font-size: 13px;
    gap: 10px;
  }
  .mock-input .orange-btn {
    margin-left: auto; height: 38px; padding: 0 18px; border-radius: 8px;
    background: #FF6B00; color: #0A0A0A; font-weight: 700; font-size: 12px;
    letter-spacing: 0.08em; text-transform: uppercase;
    display: grid; place-items: center;
  }
  .mock-chip-row { margin-top: 14px; display: flex; gap: 8px; font-size: 11px; color: #8A8A8A; }
  .mock-chip { padding: 6px 10px; border-radius: 8px; border: 1px solid #242424; background: rgba(255,255,255,0.02); }

  /* floating bottom-left mode switcher (from fun.html) */
  .mock-mode {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(26,26,26,0.95); border: 1px solid #242424; border-radius: 10px;
    padding: 6px; display: flex; flex-direction: column; gap: 2px; min-width: 110px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .mock-mode .label { font-size: 9px; color: #8A8A8A; padding: 4px 10px 2px; letter-spacing: 0.12em; text-transform: uppercase; }
  .mock-mode .m-btn { padding: 7px 12px; border-radius: 6px; font-size: 11px; font-family: Inter; font-weight: 500; color: #8A8A8A; display: flex; align-items: center; gap: 7px; text-transform: uppercase; letter-spacing: 0.08em; }
  .mock-mode .m-btn.active { background: #FF6B00; color: #0A0A0A; }
  .mock-mode .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .mock-mode .m-btn.active .dot { opacity: 1; }

  /* ============================================================
     CONCEPT A — Minimal chrome (Linear / Anthropic)
     ============================================================ */
  .navA {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    background: rgba(10,10,10,0.72);
    backdrop-filter: blur(14px) saturate(130%);
    -webkit-backdrop-filter: blur(14px) saturate(130%);
    border-bottom: 1px solid #242424;
    display: flex; align-items: center; padding: 0 20px;
    gap: 28px;
    font-family: Inter, sans-serif;
    z-index: 2;
  }
  .navA .brand { display: flex; align-items: center; gap: 9px; }
  .navA .brand-mark { width: 22px; height: 22px; border-radius: 6px; background: rgba(255,107,0,0.15); border: 1px solid rgba(255,107,0,0.4); display: grid; place-items: center; }
  .navA .brand-mark svg { width: 12px; height: 12px; }
  .navA .brand-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: -0.01em; color: #F5F5F5; }
  .navA .links { display: flex; gap: 22px; margin-left: 8px; }
  .navA .link { font-size: 13px; font-weight: 500; color: #B8B8B8; display: flex; align-items: center; gap: 3px; cursor: pointer; }
  .navA .link:hover { color: #F5F5F5; }
  .navA .link .chev { opacity: 0.5; font-size: 9px; }
  .navA .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .navA .lang-pill {
    display: flex; background: #121212; border: 1px solid #242424; border-radius: 999px; padding: 2px; height: 26px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
  }
  .navA .lang-pill span { padding: 0 9px; height: 100%; display: grid; place-items: center; border-radius: 999px; color: #8A8A8A; }
  .navA .lang-pill span.on { background: #262626; color: #F5F5F5; }
  .navA .icon-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #242424; display: grid; place-items: center; color: #B8B8B8; }
  .navA .cta-ghost { height: 30px; padding: 0 14px; border-radius: 7px; border: 1px solid #3A3A3A; font-size: 12px; font-weight: 600; color: #F5F5F5; display: grid; place-items: center; }

  /* ============================================================
     CONCEPT B — Sibling pills (mesmo vocabulário do mode switcher)
     ============================================================ */
  .navB {
    position: absolute; top: 14px; right: 14px; left: auto;
    display: flex; gap: 8px; align-items: center;
    font-family: Inter, sans-serif;
    z-index: 2;
  }
  .pill-base {
    background: rgba(26,26,26,0.95);
    border: 1px solid #242424;
    border-radius: 10px;
    padding: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 2px;
  }
  /* pill 1: brand */
  .navB .pill-brand { padding: 6px 12px 6px 8px; gap: 8px; }
  .navB .pill-brand .mark { width: 22px; height: 22px; border-radius: 6px; background: rgba(255,107,0,0.15); border: 1px solid rgba(255,107,0,0.4); display: grid; place-items: center; }
  .navB .pill-brand .mark svg { width: 12px; height: 12px; }
  .navB .pill-brand .name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; color: #F5F5F5; }
  /* pill 2: menu */
  .navB .pill-menu { gap: 0; }
  .navB .pill-menu .item { padding: 7px 12px; font-size: 12px; font-weight: 500; color: #B8B8B8; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
  .navB .pill-menu .item.active { background: rgba(255,107,0,0.12); color: #FF6B00; }
  .navB .pill-menu .divider { width: 1px; height: 16px; background: #242424; margin: 0 2px; }
  .navB .pill-menu .chev { font-size: 9px; opacity: 0.5; }
  /* pill 3: utility */
  .navB .pill-util { padding: 6px; gap: 4px; }
  .navB .pill-util .seg { display: flex; background: #121212; border-radius: 6px; padding: 2px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; height: 24px; }
  .navB .pill-util .seg span { padding: 0 8px; display: grid; place-items: center; border-radius: 4px; color: #8A8A8A; }
  .navB .pill-util .seg span.on { background: #262626; color: #F5F5F5; }
  .navB .pill-util .ic { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; color: #B8B8B8; }
  .navB .pill-util .ic:hover { background: rgba(255,255,255,0.04); color: #F5F5F5; }
  .navB .pill-util .kbd { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 0 7px; height: 22px; display: grid; place-items: center; border: 1px solid #242424; border-radius: 4px; color: #8A8A8A; }

  /* ============================================================
     CONCEPT C — Floating HUD bar (Pyth / Helius híbrido)
     ============================================================ */
  .navC-wrap {
    position: absolute; top: 12px; left: 12px; right: 12px;
    z-index: 2;
  }
  .navC {
    height: 52px; border-radius: 14px;
    background: rgba(18,18,18,0.78);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid #242424;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    display: flex; align-items: center; padding: 0 16px;
    gap: 24px;
    font-family: Inter, sans-serif;
  }
  .navC .brand { display: flex; align-items: center; gap: 10px; }
  .navC .brand-mark { width: 24px; height: 24px; border-radius: 7px; background: rgba(255,107,0,0.15); border: 1px solid rgba(255,107,0,0.4); display: grid; place-items: center; }
  .navC .brand-mark svg { width: 13px; height: 13px; }
  .navC .brand-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14.5px; letter-spacing: -0.01em; }
  .navC .brand-badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: #FF6B00; padding: 2px 6px; border: 1px solid rgba(255,107,0,0.4); border-radius: 4px; background: rgba(255,107,0,0.06); margin-left: 2px; }
  .navC .links { display: flex; gap: 20px; }
  .navC .link { font-size: 13px; font-weight: 500; color: #B8B8B8; display: flex; align-items: center; gap: 3px; cursor: pointer; }
  .navC .link .chev { opacity: 0.5; font-size: 9px; }
  .navC .link:hover { color: #F5F5F5; }
  .navC .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .navC .seg-lang { display: flex; background: #0A0A0A; border: 1px solid #242424; border-radius: 7px; padding: 2px; height: 26px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; }
  .navC .seg-lang span { padding: 0 9px; height: 100%; display: grid; place-items: center; border-radius: 5px; color: #8A8A8A; font-weight: 500; }
  .navC .seg-lang span.on { background: #202020; color: #F5F5F5; }
  .navC .status-dot { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8A8A8A; letter-spacing: 0.06em; }
  .navC .status-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #00C9A7; box-shadow: 0 0 8px rgba(0,201,167,0.6); }
  .navC .icon-btn { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; color: #B8B8B8; }
  .navC .cta { height: 30px; padding: 0 14px; border-radius: 7px; background: #FF6B00; color: #0A0A0A; font-size: 12px; font-weight: 700; display: grid; place-items: center; }

  /* ============================================================
     Notes column — used in the "details" artboards
     ============================================================ */
  .notes {
    padding: 28px 32px; color: #B8B8B8; font-size: 13px; line-height: 1.7;
    font-family: Inter, system-ui, sans-serif;
    background: #121212; border-radius: 10px; height: 100%;
  }
  .notes h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #F5F5F5; margin: 0 0 4px; letter-spacing: -0.01em; }
  .notes .tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: #FF6B00; background: rgba(255,107,0,0.08); border: 1px solid rgba(255,107,0,0.3); padding: 3px 7px; border-radius: 4px; margin-bottom: 14px; text-transform: uppercase; }
  .notes h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px; color: #F5F5F5; margin: 18px 0 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .notes ul { margin: 0; padding-left: 18px; }
  .notes li { margin: 4px 0; }
  .notes code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #FF8A33; background: rgba(255,107,0,0.06); padding: 1px 6px; border-radius: 3px; }
  .notes .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 14px; margin-top: 10px; font-size: 12px; }
  .notes .kv span:nth-child(odd) { color: #8A8A8A; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; align-self: center; }
  .notes .kv span:nth-child(even) { color: #F5F5F5; }
  .verdict { margin-top: 20px; padding: 12px 14px; border-radius: 8px; border: 1px solid #242424; background: #0A0A0A; font-size: 12px; color: #B8B8B8; line-height: 1.6; }
  .verdict strong { color: #F5F5F5; }

  /* mobile preview frame */
  .phone {
    width: 340px; height: 640px; border-radius: 32px;
    background: #0A0A0A; border: 8px solid #1A1A1A; overflow: hidden; position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    margin: 20px auto;
  }
  .phone .mock-stage { border-radius: 24px; }
  .phone .mock-body { padding-top: 120px; }
  .phone .mock-h1 { font-size: 26px; }
  .phone .mock-input { width: 85%; height: 48px; }
  .phone .mock-mode { bottom: 12px; left: 12px; }

  /* Concept A mobile */
  .phone .navA { padding: 0 14px; gap: 12px; height: 52px; }
  .phone .navA .links, .phone .navA .cta-ghost, .phone .navA .lang-pill, .phone .navA .icon-btn { display: none; }
  .phone .navA .hamburger { display: grid; place-items: center; width: 32px; height: 32px; border-radius: 6px; border: 1px solid #242424; color: #F5F5F5; margin-left: auto; }

  /* Concept B mobile — single FAB */
  .phone .navB { top: 14px; right: 14px; gap: 0; }
  .phone .navB .pill-menu, .phone .navB .pill-util { display: none; }

  /* Concept C mobile */
  .phone .navC { padding: 0 12px; gap: 10px; height: 48px; }
  .phone .navC .links, .phone .navC .cta, .phone .navC .seg-lang, .phone .navC .status-dot, .phone .navC .icon-btn { display: none; }
  .phone .navC .brand-badge { display: none; }
  .phone .navC .hamburger { display: grid; place-items: center; width: 32px; height: 32px; border-radius: 6px; color: #F5F5F5; margin-left: auto; }

  /* hide hamburger on desktop */
  .hamburger { display: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="dc-root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { useState } = React;

/* ---------- shared shield icon ---------- */
function Shield({ size = 12 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      <path d="M20 4L6 10v10c0 8.8 6 17 14 19 8-2 14-10.2 14-19V10L20 4z" fill="rgba(255,107,0,0.15)" stroke="#FF6B00" strokeWidth="2"/>
      <circle cx="20" cy="20" r="4" stroke="#FF6B00" strokeWidth="2"/>
      <circle cx="20" cy="20" r="1.5" fill="#FF6B00"/>
    </svg>
  );
}

/* ---------- shared mock page body ---------- */
function MockBody() {
  return (
    <div className="mock-body">
      <div className="mock-shield"><Shield size={30} /></div>
      <h1 className="mock-h1">Esta carteira<br/>ou token é seguro?</h1>
      <div className="mock-sub">Cole qualquer endereço Solana e descubra em segundos.</div>
      <div className="mock-input">
        <span>Cole aqui um endereço Solana…</span>
        <span className="orange-btn">Verificar</span>
      </div>
      <div className="mock-chip-row">
        <span className="mock-chip">⚠ Operador perigoso</span>
        <span className="mock-chip">✓ Token confiável</span>
      </div>
      <div className="mock-mode">
        <div className="label">Modo</div>
        <div className="m-btn active"><span className="dot"></span>Fácil</div>
        <div className="m-btn"><span className="dot"></span>Pro</div>
        <div className="m-btn"><span className="dot"></span>Dev</div>
      </div>
    </div>
  );
}

/* ---------- Concept A — Minimal chrome ---------- */
function NavA() {
  return (
    <nav className="navA">
      <div className="brand">
        <div className="brand-mark"><Shield /></div>
        <div className="brand-name">SolSentry</div>
      </div>
      <div className="links">
        <span className="link">Explorer</span>
        <span className="link">Products <span className="chev">▾</span></span>
        <span className="link">Docs <span className="chev">▾</span></span>
        <span className="link">Blog</span>
      </div>
      <div className="right">
        <div className="lang-pill"><span className="on">EN</span><span>PT</span></div>
        <div className="icon-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg></div>
        <div className="cta-ghost">Try Explorer</div>
      </div>
      <div className="hamburger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
    </nav>
  );
}

/* ---------- Concept B — Sibling pills ---------- */
function NavB() {
  return (
    <nav className="navB">
      <div className="pill-base pill-brand">
        <div className="mark"><Shield /></div>
        <div className="name">SolSentry</div>
      </div>
      <div className="pill-base pill-menu">
        <span className="item active">Explorer</span>
        <span className="divider"></span>
        <span className="item">Products <span className="chev">▾</span></span>
        <span className="divider"></span>
        <span className="item">Docs <span className="chev">▾</span></span>
        <span className="divider"></span>
        <span className="item">Blog</span>
      </div>
      <div className="pill-base pill-util">
        <div className="seg"><span className="on">EN</span><span>PT</span></div>
        <div className="kbd">⌘K</div>
        <div className="ic"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77 5.44 5.44 0 003.5 8.55c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg></div>
      </div>
    </nav>
  );
}

/* ---------- Concept C — Floating HUD ---------- */
function NavC() {
  return (
    <div className="navC-wrap">
      <nav className="navC">
        <div className="brand">
          <div className="brand-mark"><Shield size={13} /></div>
          <div className="brand-name">SolSentry</div>
          <div className="brand-badge">v0.4</div>
        </div>
        <div className="links">
          <span className="link">Explorer</span>
          <span className="link">Products <span className="chev">▾</span></span>
          <span className="link">Docs <span className="chev">▾</span></span>
          <span className="link">Blog</span>
        </div>
        <div className="right">
          <div className="status-dot">mainnet · ok</div>
          <div className="seg-lang"><span className="on">EN</span><span>PT</span></div>
          <div className="icon-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg></div>
          <div className="cta">Try Explorer</div>
        </div>
        <div className="hamburger">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </div>
      </nav>
    </div>
  );
}

/* ---------- Stage wrapper ---------- */
function Stage({ children }) {
  return (
    <div className="mock-stage">
      <MockBody />
      {children}
    </div>
  );
}

function Phone({ children }) {
  return (
    <div className="phone">
      <div className="mock-stage">
        <MockBody />
        {children}
      </div>
    </div>
  );
}

/* ---------- Notes cards ---------- */
function NotesA() {
  return (
    <div className="notes">
      <span className="tag">Concept A · Minimal chrome</span>
      <h3>Linear / Anthropic school</h3>
      <p>Barra fixa 56px, blur 14px, hairline bottom. Zero laranja sólido no nav — o shield do fun.html continua o único foco visual da página.</p>

      <h4>Tokens</h4>
      <div className="kv">
        <span>height</span><span>56px</span>
        <span>bg</span><span><code>rgba(10,10,10,0.72)</code></span>
        <span>backdrop</span><span><code>blur(14px)</code></span>
        <span>border</span><span><code>--border</code> bottom</span>
        <span>CTA</span><span>ghost · border strong</span>
        <span>EN/PT</span><span>pill toggle · mono</span>
      </div>

      <h4>Mobile</h4>
      <ul>
        <li>Logo left, hamburger right</li>
        <li>Tap → bottom sheet 85vh</li>
        <li>EN/PT segmented no topo do sheet</li>
      </ul>

      <h4>Scroll</h4>
      <ul>
        <li>Hide on scroll-down &gt;80px</li>
        <li>Reappear on scroll-up</li>
        <li><code>prefers-reduced-motion</code> desabilita</li>
      </ul>

      <div className="verdict">
        <strong>Prós.</strong> Baixíssimo risco de destoar. Implementação rápida.<br/>
        <strong>Contras.</strong> Pode ficar genérico — a magia está no EN/PT pill e no blur.
      </div>
    </div>
  );
}

function NotesB() {
  return (
    <div className="notes">
      <span className="tag">Concept B · Sibling pills · RECOMENDADO</span>
      <h3>Mesmo vocabulário do mode switcher</h3>
      <p>Três pills flutuantes top-right espelhando o chip do mode switcher bottom-left. Não é uma barra — são objetos no mesmo idioma visual.</p>

      <h4>Tokens</h4>
      <div className="kv">
        <span>position</span><span>top 14px / right 14px</span>
        <span>pill bg</span><span><code>rgba(26,26,26,0.95)</code></span>
        <span>pill border</span><span><code>1px #242424</code></span>
        <span>pill radius</span><span>10px (match switcher)</span>
        <span>shadow</span><span><code>0 8px 24px rgba(0,0,0,0.4)</code></span>
        <span>active link</span><span>orange tint bg + orange text</span>
      </div>

      <h4>3 pills</h4>
      <ul>
        <li><strong>Brand</strong> — shield + SolSentry → <code>/</code></li>
        <li><strong>Menu</strong> — Explorer · Products ▾ · Docs ▾ · Blog (divisores verticais internos)</li>
        <li><strong>Utility</strong> — EN/PT segmented · ⌘K · GitHub</li>
      </ul>

      <h4>Mobile</h4>
      <ul>
        <li>Pills colapsam em 1 FAB top-right</li>
        <li>Tap abre bottom sheet (radial fica exagero)</li>
        <li>Mode switcher bottom-left não colide</li>
      </ul>

      <h4>Risco</h4>
      <ul>
        <li>Dropdown (Products ▾) dentro de pill é apertado</li>
        <li>Precisa testar bordas do painel encostando na pill</li>
        <li>Se falhar nesse detalhe, conceito cai</li>
      </ul>

      <div className="verdict">
        <strong>Prós.</strong> Vocabulário consistente com fun.html. Identidade memorável.<br/>
        <strong>Contras.</strong> Dropdown técnico exige polimento extra.
      </div>
    </div>
  );
}

function NotesC() {
  return (
    <div className="notes">
      <span className="tag">Concept C · Floating HUD</span>
      <h3>Pyth / Helius híbrido</h3>
      <p>Barra flutuante com margin lateral, cantos arredondados, blur 20px. Sensação de HUD sobre o gradiente — produto sério sobreposto à landing experimental.</p>

      <h4>Tokens</h4>
      <div className="kv">
        <span>position</span><span>top 12px / left 12px / right 12px</span>
        <span>height</span><span>52px</span>
        <span>radius</span><span>14px</span>
        <span>bg</span><span><code>rgba(18,18,18,0.78)</code></span>
        <span>backdrop</span><span><code>blur(20px) saturate(140%)</code></span>
        <span>extras</span><span>v0.4 badge · mainnet·ok dot · CTA laranja</span>
      </div>

      <h4>Mobile</h4>
      <ul>
        <li>Altura 48px, margin 8px lateral</li>
        <li>Hamburger → bottom sheet padrão</li>
      </ul>

      <h4>Scroll</h4>
      <ul>
        <li>Encolhe 52→44px após 100px</li>
        <li>Opacidade 0.78→0.92 (endurece)</li>
        <li>Sem translate (respeita reduced-motion)</li>
      </ul>

      <h4>Riscos</h4>
      <ul>
        <li>backdrop-filter caro em mobile low-end → fallback sólido</li>
        <li>CTA laranja cria 2º foco visual vs. shield do fun</li>
        <li>Em viewport 375×600 pode encostar no mode switcher</li>
      </ul>

      <div className="verdict">
        <strong>Prós.</strong> Signal "produto sério" (Colosseum/Phantom).<br/>
        <strong>Contras.</strong> Mais chrome · mais pontos de falha técnica.
      </div>
    </div>
  );
}
