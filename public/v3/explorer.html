<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SolSentry — Operator Network Explorer</title>
<link rel="icon" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />

<style>
  html, body { margin: 0; background: var(--bg); color: var(--fg-1); min-height: 100vh; overflow: hidden; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  ::selection { background: var(--brand-orange); color: var(--fg-on-brand); }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  .xp-root { height: 100vh; display: grid; grid-template-rows: 64px 1fr 28px; padding-top: 64px; }
  .xp-header { display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--surface); gap: 16px; }
  .xp-title { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
  .xp-crumb { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .xp-crumb b { color: var(--brand-orange); }
  .xp-search { flex: 1; max-width: 560px; display: flex; gap: 8px; align-items: center; background: var(--bg-elev-1); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; height: 36px; }
  .xp-search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg-1); font-family: var(--font-mono); font-size: 12.5px; }
  .xp-search input::placeholder { color: var(--fg-4); }
  .xp-btn { padding: 7px 14px; background: var(--brand-orange); color: #fff; font-weight: 600; font-size: 12.5px; border-radius: 6px; }
  .xp-btn:hover { background: var(--brand-orange-600); }
  .xp-btn.ghost { background: transparent; color: var(--fg-2); border: 1px solid var(--border); }
  .xp-btn.ghost:hover { border-color: var(--brand-orange); color: var(--brand-orange); }

  .xp-body { display: grid; grid-template-columns: 260px 1fr 320px; min-height: 0; }

  /* left panel: filters */
  .xp-left { border-right: 1px solid var(--border); background: var(--surface); padding: 20px 16px; overflow-y: auto; }
  .xp-group { margin-bottom: 22px; }
  .xp-group-title { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-4); margin-bottom: 10px; }
  .xp-slider { width: 100%; }
  .xp-slider-row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 6px; }
  .xp-slider-row b { color: var(--brand-orange); }
  .xp-chk { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 4px; font-size: 13px; color: var(--fg-2); cursor: pointer; }
  .xp-chk:hover { background: rgba(255,255,255,0.03); color: var(--fg-1); }
  .xp-chk input { accent-color: var(--brand-orange); }
  .xp-chk .c-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; }
  .xp-preset { display: block; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-2); margin-bottom: 6px; cursor: pointer; }
  .xp-preset:hover { border-color: var(--brand-orange); color: var(--brand-orange); }
  .xp-preset.active { border-color: var(--brand-orange); background: var(--brand-orange-tint); color: var(--brand-orange); }
  .xp-preset small { display: block; color: var(--fg-4); font-size: 10px; margin-top: 2px; }

  /* canvas */
  .xp-canvas {
    position: relative; overflow: hidden;
    background-color: var(--bg-elev-1);
    background-image: linear-gradient(rgba(255,107,0,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,107,0,.035) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .xp-canvas svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .xp-legend { position: absolute; top: 16px; left: 16px; background: rgba(10,10,10,0.92); border: 1px solid var(--border); padding: 12px 14px; border-radius: 8px; font-family: var(--font-body); font-size: 11px; color: var(--fg-3); }
  .xp-legend-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .xp-legend-row:first-child { margin-top: 0; color: var(--fg-2); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; font-size: 10px; margin-bottom: 4px; }
  .xp-legend-row i { width: 10px; height: 10px; border-radius: 50%; }

  .xp-overlay-stats { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; }
  .xp-ostat { background: rgba(10,10,10,0.92); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; }
  .xp-ostat b { display: block; font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--fg-1); letter-spacing: -0.02em; }
  .xp-ostat small { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.1em; text-transform: uppercase; }

  .xp-zoom { position: absolute; bottom: 16px; right: 16px; display: flex; gap: 4px; background: rgba(10,10,10,0.92); border: 1px solid var(--border); padding: 4px; border-radius: 8px; }
  .xp-zoom button { width: 28px; height: 28px; border-radius: 4px; color: var(--fg-2); font-size: 14px; font-family: var(--font-mono); }
  .xp-zoom button:hover { background: rgba(255,255,255,0.04); color: var(--fg-1); }

  .xp-drain-legend { position: absolute; bottom: 16px; left: 16px; background: rgba(10,10,10,0.92); border: 1px solid var(--border); padding: 10px 14px; border-radius: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .xp-drain-legend b { color: var(--status-critical); font-weight: 500; }

  .xp-node { cursor: pointer; transition: filter 150ms ease; }
  .xp-node:hover { filter: brightness(1.3); }
  .xp-node.selected circle { stroke-width: 2.5; }

  /* right panel: detail */
  .xp-right { border-left: 1px solid var(--border); background: var(--surface); padding: 20px; overflow-y: auto; }
  .xp-detail-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .xp-detail-type { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--brand-orange); background: var(--brand-orange-tint); padding: 3px 8px; border-radius: 4px; }
  .xp-detail-type.wal { color: var(--brand-teal); background: var(--brand-teal-tint); }
  .xp-detail-type.bot { color: var(--brand-purple); background: var(--brand-purple-tint); }
  .xp-detail-type.cex { color: var(--fg-3); background: rgba(255,255,255,0.04); }

  .xp-detail-handle { font-family: var(--font-display); font-weight: 700; font-size: 28px; letter-spacing: -0.02em; margin-bottom: 4px; }
  .xp-detail-addr { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); word-break: break-all; line-height: 1.5; }
  .xp-detail-addr b { color: var(--brand-orange); }

  .xp-risk-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; margin: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .xp-risk-score { font-family: var(--font-display); font-weight: 700; font-size: 48px; line-height: 1; color: var(--status-critical); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .xp-risk-score span { font-size: 18px; color: var(--fg-3); }
  .xp-risk-label { display: flex; flex-direction: column; gap: 4px; }
  .xp-risk-label .t { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--status-critical); }
  .xp-risk-label .s { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }

  .xp-kv { display: grid; grid-template-columns: 110px 1fr; gap: 10px 14px; padding: 4px 0; font-size: 12.5px; }
  .xp-kv dt { color: var(--fg-3); font-family: var(--font-body); font-weight: 500; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; align-self: center; }
  .xp-kv dd { margin: 0; color: var(--fg-1); font-family: var(--font-mono); font-size: 12.5px; }
  .xp-kv dd.crit { color: var(--status-critical); }
  .xp-kv dd.warn { color: var(--status-warning); }

  .xp-flags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 12px; }
  .xp-flag { font-family: var(--font-mono); font-size: 10px; padding: 3px 7px; border-radius: 4px; border: 1px solid currentColor; }
  .xp-flag.critical { color: var(--status-critical); background: var(--status-critical-tint); }
  .xp-flag.warning { color: var(--status-warning); background: var(--status-warning-tint); }

  .xp-section-label { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-4); margin: 20px 0 10px; }

  .xp-event { display: grid; grid-template-columns: 60px 1fr; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--border); font-family: var(--font-mono); font-size: 11.5px; }
  .xp-event:last-child { border-bottom: 0; }
  .xp-event .t { color: var(--fg-4); }
  .xp-event .k { color: var(--status-critical); font-weight: 500; font-size: 10px; letter-spacing: 0.08em; }
  .xp-event .k.w { color: var(--status-warning); }
  .xp-event .k.ok { color: var(--brand-teal); }
  .xp-event .body { color: var(--fg-2); }

  .xp-detail-actions { display: flex; gap: 6px; margin-top: 16px; }
  .xp-detail-actions button { flex: 1; padding: 9px 10px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 6px; border: 1px solid var(--border); color: var(--fg-2); transition: all 120ms; }
  .xp-detail-actions button:hover { border-color: var(--brand-orange); color: var(--brand-orange); }

  .xp-footer { border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing: 0.05em; }

  @media (max-width: 1100px) {
    .xp-body { grid-template-columns: 1fr; grid-template-rows: auto 400px auto; }
    .xp-left, .xp-right { border-right: 0; border-left: 0; border-bottom: 1px solid var(--border); max-height: 320px; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>

<body>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const API = 'https://api.solsentry.app/v1';

function useOperatorLookup(wallet) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  useEffect(() => {
    const w = (wallet || '').trim();
    if (w.length < 32 || w.length > 44) { setData(null); setError(null); return; }
    let dead = false;
    setLoading(true); setError(null);
    (async () => {
      try {
        const r = await fetch(API + '/operator/' + encodeURIComponent(w), { cache: 'no-store' });
        if (!r.ok) throw new Error('status ' + r.status);
        const j = await r.json();
        if (!dead) setData(j);
      } catch (e) {
        if (!dead) { setData(null); setError(e.message || 'lookup failed'); }
      } finally {
        if (!dead) setLoading(false);
      }
    })();
    return () => { dead = true; };
  }, [wallet]);
  return { data, loading, error };
}

// Generated graph: operator hub + wallets + bots + drain paths
const NODES = [
  { id: 'root', x: 500, y: 320, t: 'op',  risk: 100, handle: '4kxscute',  addr: '4kxscuteRLQdNiTXA33YYsvywAPNA6DQTifswxjL5pH1', deploys: 703, rugs: 634, wallets: 14, funded: 'Binance · Oct 2024', firstSeen: '2024-10-12 04:22 UTC' },
  { id: 'w1',   x: 260, y: 180, t: 'wal', risk: 92,  handle: '6ApZRMWh',  addr: '6ApZRMWh…KzqT',   deploys: 101, rugs: 88 },
  { id: 'w2',   x: 740, y: 180, t: 'wal', risk: 87,  handle: 'DXenfC9P',  addr: 'DXenfC9P…w2mQ',   deploys: 74,  rugs: 60 },
  { id: 'w3',   x: 220, y: 460, t: 'wal', risk: 78,  handle: 'GEUDKx63',  addr: 'GEUDKx63…pN4u',   deploys: 52,  rugs: 36 },
  { id: 'w4',   x: 780, y: 460, t: 'wal', risk: 71,  handle: 'B8zH3NXp',  addr: 'B8zH3NXp…gR7t',   deploys: 40,  rugs: 22 },
  { id: 'b1',   x: 400, y: 80,  t: 'bot', risk: 94,  handle: 'cluster#1749', wallets: 12 },
  { id: 'b2',   x: 620, y: 580, t: 'bot', risk: 82,  handle: 'cluster#0823', wallets: 8 },
  { id: 'w5',   x: 100, y: 320, t: 'wal', risk: 44,  handle: '9fRq2aLp', addr: '9fRq2aLp…xN3K', deploys: 12, rugs: 2 },
  { id: 'cex1', x: 900, y: 320, t: 'cex', risk: 0,   handle: 'MEXC · dep', addr: 'MEXC…qT9p' },
  { id: 'cex2', x: 420, y: 640, t: 'cex', risk: 0,   handle: 'Binance · dep', addr: 'BN…dK12' },
  { id: 'w6',   x: 350, y: 260, t: 'wal', risk: 66,  handle: 'EaK81r2m', addr: 'EaK81r2m…vR8t', deploys: 18, rugs: 9 },
  { id: 'w7',   x: 660, y: 380, t: 'wal', risk: 58,  handle: 'HqZp4T9n', addr: 'HqZp4T9n…mF2w', deploys: 15, rugs: 6 },
  { id: 'w8',   x: 380, y: 500, t: 'wal', risk: 39,  handle: '3RtGm1cX', addr: '3RtGm1cX…aL7q', deploys: 9, rugs: 1 },
];

const EDGES = [
  ['root','w1','fund'],['root','w2','fund'],['root','w3','fund'],['root','w4','fund'],
  ['root','b1','ctrl'],['root','b2','ctrl'],['root','w6','fund'],['root','w7','fund'],
  ['w1','w5','fund'],['w2','cex1','drain'],['w3','cex2','drain'],
  ['w4','w7','fund'],['b1','w1','buy'],['b1','w6','buy'],['b2','w4','buy'],
  ['w3','w8','fund'],['w2','w4','fund'],
];

const EVENTS_BY_NODE = {
  root: [
    { t: 'T+0m',   k: 'DEPLOY',   tone: 'w',  body: 'token #634 minted · risk 100/100' },
    { t: 'T+4m',   k: 'ALERT',    tone: 'w',  body: 'SolSentry CRITICAL · pushed to @solsentryai' },
    { t: 'T+19m',  k: 'RUG',      tone: '',   body: 'liquidity pulled · 42.1 SOL drain' },
    { t: '-2d',    k: 'DEPLOY',   tone: 'w',  body: 'token #633 · rugged in 11m' },
    { t: '-7d',    k: 'EXPAND',   tone: 'w',  body: '+2 new wallets funded from Binance' },
    { t: '-14d',   k: 'OP',       tone: 'ok', body: 'SolSentry operator cluster confirmed' },
  ],
  w1: [
    { t: 'T+19m', k: 'DRAIN',    tone: '',  body: '42.1 SOL → Kamino → Jupiter' },
    { t: 'T+0m',  k: 'BUY',      tone: 'w', body: 'cluster#1749 same-block (12 wallets)' },
    { t: '-1d',   k: 'FUND',     tone: 'w', body: 'funded by 4kxscute · 2 SOL' },
  ],
};

const FILTER_PRESETS = [
  { id: 'rug',   t: 'Serial rug operators',    s: 'risk ≥ 90 · rugs ≥ 50' },
  { id: 'new',   t: 'New activity · 24h',       s: 'first seen < 1d' },
  { id: 'drain', t: 'Drain paths → CEX',        s: 'terminal = exchange' },
  { id: 'cls',   t: 'Active bot clusters',      s: 'same-block buy > 3' },
];

function nodeColor(n) {
  if (n.t === 'op')  return 'var(--brand-orange)';
  if (n.t === 'bot') return 'var(--brand-purple)';
  if (n.t === 'cex') return 'var(--fg-3)';
  if (n.risk >= 90) return 'var(--status-critical)';
  if (n.risk >= 70) return 'var(--status-warning)';
  return 'var(--brand-teal)';
}
function nodeSize(n) {
  if (n.t === 'op') return 18;
  if (n.t === 'bot') return 13;
  if (n.t === 'cex') return 10;
  return 10;
}

function XpHeader({ query, setQuery, pending, setPending }) {
  return (
    <header className="xp-header">
      <div className="xp-title">Operator Network Explorer</div>
      <div className="xp-crumb">root · <b>{(query || '').slice(0, 8) || '—'}</b></div>
      <div style={{flex: 1}}></div>
      <div className="xp-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8A8A8A" strokeWidth="2">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
        </svg>
        <input
          value={pending}
          onChange={e => setPending(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') setQuery(pending.trim()); }}
          placeholder="Paste root wallet or operator handle…" spellCheck="false" />
      </div>
      <button className="xp-btn ghost" onClick={() => { setPending(''); setQuery(''); }}>Clear</button>
      <button className="xp-btn" onClick={() => setQuery(pending.trim())}>Explore →</button>
    </header>
  );
}

function LeftPanel({ depth, setDepth, preset, setPreset }) {
  return (
    <aside className="xp-left">
      <div className="xp-group">
        <div className="xp-group-title">Depth · {depth} hops</div>
        <input type="range" min="1" max="10" value={depth} onChange={e => setDepth(+e.target.value)} className="xp-slider" style={{accentColor: 'var(--brand-orange)'}} />
        <div className="xp-slider-row">
          <span>1</span><span><b>{depth}</b> / 10</span><span>10</span>
        </div>
      </div>

      <div className="xp-group">
        <div className="xp-group-title">Presets</div>
        {FILTER_PRESETS.map(p => (
          <button key={p.id} className={'xp-preset' + (preset === p.id ? ' active' : '')} onClick={() => setPreset(p.id)}>
            {p.t}<small>{p.s}</small>
          </button>
        ))}
      </div>

      <div className="xp-group">
        <div className="xp-group-title">Node types</div>
        <label className="xp-chk"><input type="checkbox" defaultChecked /> Operators <i className="c-dot" style={{background:'var(--brand-orange)'}}/></label>
        <label className="xp-chk"><input type="checkbox" defaultChecked /> Wallets <i className="c-dot" style={{background:'var(--brand-teal)'}}/></label>
        <label className="xp-chk"><input type="checkbox" defaultChecked /> Bot clusters <i className="c-dot" style={{background:'var(--brand-purple)'}}/></label>
        <label className="xp-chk"><input type="checkbox" defaultChecked /> CEX / bridges <i className="c-dot" style={{background:'var(--fg-3)'}}/></label>
      </div>

      <div className="xp-group">
        <div className="xp-group-title">Edge types</div>
        <label className="xp-chk"><input type="checkbox" defaultChecked /> Funding <i className="c-dot" style={{background:'rgba(255,107,0,0.5)'}}/></label>
        <label className="xp-chk"><input type="checkbox" defaultChecked /> Drain flow <i className="c-dot" style={{background:'var(--status-critical)'}}/></label>
        <label className="xp-chk"><input type="checkbox" defaultChecked /> Same-block buy <i className="c-dot" style={{background:'var(--brand-purple)'}}/></label>
        <label className="xp-chk"><input type="checkbox" /> Bridge transfer <i className="c-dot" style={{background:'var(--status-info)'}}/></label>
      </div>

      <div className="xp-group">
        <div className="xp-group-title">Min risk score</div>
        <input type="range" min="0" max="100" defaultValue="60" className="xp-slider" style={{accentColor: 'var(--brand-orange)', width: '100%'}} />
        <div className="xp-slider-row">
          <span>0</span><span><b>60</b> / 100</span><span>100</span>
        </div>
      </div>
    </aside>
  );
}

function edgeStroke(kind) {
  if (kind === 'drain') return 'rgba(255,68,68,0.55)';
  if (kind === 'ctrl')  return 'rgba(168,85,247,0.5)';
  if (kind === 'buy')   return 'rgba(168,85,247,0.4)';
  return 'rgba(255,107,0,0.35)';
}

function Canvas({ selected, setSelected }) {
  return (
    <div className="xp-canvas">
      <svg viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet">
        {EDGES.map(([a, b, kind], i) => {
          const n1 = NODES.find(n => n.id === a), n2 = NODES.find(n => n.id === b);
          return (
            <line key={i} x1={n1.x} y1={n1.y} x2={n2.x} y2={n2.y}
              stroke={edgeStroke(kind)}
              strokeWidth={kind === 'drain' ? 2 : 1}
              strokeDasharray={kind === 'ctrl' ? '4 3' : kind === 'buy' ? '2 3' : 'none'} />
          );
        })}
        {NODES.map(n => {
          const sel = selected === n.id;
          return (
            <g key={n.id} className={'xp-node' + (sel ? ' selected' : '')} onClick={() => setSelected(n.id)}>
              {sel && <circle cx={n.x} cy={n.y} r={nodeSize(n) + 12} fill="none" stroke={nodeColor(n)} strokeOpacity="0.3" strokeWidth="1" />}
              <circle cx={n.x} cy={n.y} r={nodeSize(n)}
                fill={nodeColor(n)} fillOpacity={n.t === 'cex' ? 0.6 : 0.9}
                stroke={nodeColor(n)} strokeOpacity="0.5" strokeWidth="6" paintOrder="stroke"
                style={{filter: n.t === 'op' ? 'drop-shadow(0 0 10px rgba(255,107,0,0.5))' : 'none'}} />
              {(n.t === 'op' || n.t === 'bot' || n.t === 'cex') && (
                <text x={n.x} y={n.y + nodeSize(n) + 16} textAnchor="middle"
                  fill="#F5F5F5" fontSize="11" fontFamily="JetBrains Mono, monospace" fontWeight="500">
                  {n.handle}
                </text>
              )}
            </g>
          );
        })}
      </svg>

      <div className="xp-legend">
        <div className="xp-legend-row">Legend</div>
        <div className="xp-legend-row"><i style={{background:'var(--brand-orange)'}}/>Operator (root)</div>
        <div className="xp-legend-row"><i style={{background:'var(--status-critical)'}}/>Wallet · risk ≥ 90</div>
        <div className="xp-legend-row"><i style={{background:'var(--status-warning)'}}/>Wallet · risk ≥ 70</div>
        <div className="xp-legend-row"><i style={{background:'var(--brand-teal)'}}/>Wallet · safe</div>
        <div className="xp-legend-row"><i style={{background:'var(--brand-purple)'}}/>Bot cluster</div>
        <div className="xp-legend-row"><i style={{background:'var(--fg-3)'}}/>CEX / bridge</div>
      </div>

      <div className="xp-overlay-stats">
        <div className="xp-ostat"><b>13</b><small>entities</small></div>
        <div className="xp-ostat"><b>17</b><small>edges</small></div>
        <div className="xp-ostat"><b style={{color:'var(--status-critical)'}}>2</b><small>drain paths</small></div>
      </div>

      <div className="xp-drain-legend">
        drain path · <b>w1 → MEXC</b> · 42.1 SOL · 6 hops
      </div>

      <div className="xp-zoom">
        <button>−</button>
        <button>100%</button>
        <button>+</button>
        <button>⤢</button>
      </div>
    </div>
  );
}

function DetailPanel({ nodeId }) {
  const n = NODES.find(x => x.id === nodeId) || NODES[0];
  const events = EVENTS_BY_NODE[n.id] || EVENTS_BY_NODE.root;
  const flags = n.t === 'op'
    ? ['SERIAL_RUGGER','OPERATOR_4KXSCUTE','RUG_RATE_90%','FUNDED_FROM_CEX','14_WALLET_CLUSTER']
    : n.t === 'bot'
    ? ['SAME_BLOCK_BUY_12X','LIQUIDITY_SNIPE','COORDINATED']
    : n.risk >= 80
    ? ['HIGH_RISK','OPERATOR_LINK','DRAIN_TARGET']
    : n.risk >= 50 ? ['OPERATOR_LINK','FUNDED_BY_OP'] : ['OPERATOR_LINK'];

  return (
    <aside className="xp-right">
      <div className="xp-detail-head">
        <span className={'xp-detail-type ' + n.t}>{n.t === 'op' ? 'Operator' : n.t === 'bot' ? 'Bot cluster' : n.t === 'cex' ? 'CEX · bridge' : 'Wallet'}</span>
      </div>
      <div className="xp-detail-handle">{n.handle}</div>
      <div className="xp-detail-addr"><b>{n.addr || '—'}</b></div>

      {n.t !== 'cex' && (
        <div className="xp-risk-row">
          <div className="xp-risk-score" style={{color: n.risk >= 90 ? 'var(--status-critical)' : n.risk >= 70 ? 'var(--status-warning)' : 'var(--brand-teal)'}}>
            {n.risk}<span>/100</span>
          </div>
          <div className="xp-risk-label">
            <span className="t" style={{color: n.risk >= 90 ? 'var(--status-critical)' : n.risk >= 70 ? 'var(--status-warning)' : 'var(--brand-teal)'}}>
              {n.risk >= 90 ? 'Critical' : n.risk >= 70 ? 'High' : n.risk >= 40 ? 'Medium' : 'Safe'}
            </span>
            <span className="s">confidence 94% · 210h tracked</span>
          </div>
        </div>
      )}

      <dl className="xp-kv">
        {n.t === 'op' && <>
          <dt>Deploys</dt><dd>{n.deploys}</dd>
          <dt>Rugs</dt><dd className="crit">{n.rugs} · {((n.rugs/n.deploys)*100).toFixed(1)}%</dd>
          <dt>Wallets</dt><dd>{n.wallets}</dd>
          <dt>Funded by</dt><dd>{n.funded}</dd>
          <dt>First seen</dt><dd>{n.firstSeen}</dd>
        </>}
        {n.t === 'wal' && <>
          <dt>Deploys</dt><dd>{n.deploys}</dd>
          <dt>Rugs</dt><dd className="crit">{n.rugs}</dd>
          <dt>Cluster</dt><dd>4kxscute · direct</dd>
        </>}
        {n.t === 'bot' && <>
          <dt>Wallets</dt><dd>{n.wallets}</dd>
          <dt>Strategy</dt><dd>same-block buy</dd>
          <dt>Active since</dt><dd>-3d</dd>
        </>}
        {n.t === 'cex' && <>
          <dt>Role</dt><dd>drain terminal</dd>
          <dt>Hops to op</dt><dd>2</dd>
          <dt>Last drain</dt><dd>T+19m · 42.1 SOL</dd>
        </>}
      </dl>

      {n.t !== 'cex' && (
        <>
          <div className="xp-section-label">Flags</div>
          <div className="xp-flags">
            {flags.map(f => <span key={f} className={'xp-flag ' + (n.risk >= 90 ? 'critical' : 'warning')}>{f}</span>)}
          </div>
        </>
      )}

      <div className="xp-section-label">Timeline</div>
      <div>
        {events.map((e, i) => (
          <div className="xp-event" key={i}>
            <span className="t">{e.t}</span>
            <span>
              <span className={'k ' + e.tone}>[{e.k}]</span>{' '}
              <span className="body">{e.body}</span>
            </span>
          </div>
        ))}
      </div>

      <div className="xp-detail-actions">
        <button>Focus</button>
        <button>Expand</button>
        <button>Copy addr</button>
      </div>
    </aside>
  );
}

function LivePanel({ query }) {
  const { data, loading, error } = useOperatorLookup(query);
  if (!query) return null;
  return (
    <div style={{
      position: 'absolute', top: 62, left: 16, right: 16, zIndex: 20,
      background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8,
      padding: '10px 14px', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--fg-2)',
      display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap',
    }}>
      <span style={{color: 'var(--brand-orange)', letterSpacing: '0.12em', textTransform: 'uppercase', fontSize: 10}}>LIVE · api.solsentry.app</span>
      {loading && <span>fetching /v1/operator/{query.slice(0,8)}…</span>}
      {error && <span style={{color: 'var(--status-critical)'}}>lookup failed: {error}</span>}
      {data && (
        <>
          <span><b style={{color: 'var(--fg-1)'}}>{(data.wallet || query).slice(0, 12)}</b>…</span>
          <span>risk · <b style={{color: data.risk_level === 'CRITICAL' ? 'var(--status-critical)' : data.risk_level === 'HIGH' ? 'var(--status-warning)' : 'var(--brand-teal)'}}>{data.risk_level || 'UNKNOWN'}</b> ({data.risk_score ?? 0}/100)</span>
          <span>tokens · <b style={{color: 'var(--fg-1)'}}>{data.total_tokens ?? 0}</b></span>
          <span>rugs · <b style={{color: data.confirmed_rugs > 0 ? 'var(--status-critical)' : 'var(--fg-1)'}}>{data.confirmed_rugs ?? 0}</b> ({(data.rug_rate_pct ?? 0).toFixed(1)}%)</span>
          {data.known ? <span style={{color: 'var(--brand-orange)'}}>● tracked</span> : <span style={{color: 'var(--fg-3)'}}>○ new to us</span>}
        </>
      )}
    </div>
  );
}

function App() {
  const [selected, setSelected] = useState('root');
  const initial = (typeof window !== 'undefined' && window.location.hash) ? decodeURIComponent(window.location.hash.slice(1)) : '4kxscuteRLQdNiTXA33YYsvywAPNA6DQTifswxjL5pH1';
  const [query, setQuery] = useState(initial);
  const [pending, setPending] = useState(initial);
  const [depth, setDepth] = useState(2);
  const [preset, setPreset] = useState('rug');
  useEffect(() => {
    if (query) window.history.replaceState(null, '', '#' + encodeURIComponent(query));
  }, [query]);
  return (
    <>
      <SSNav active="graph" />
      <div className="xp-root" style={{position: 'relative'}}>
        <XpHeader query={query} setQuery={setQuery} pending={pending} setPending={setPending} />
        <LivePanel query={query} />
        <div className="xp-body" style={{paddingTop: 56}}>
          <LeftPanel depth={depth} setDepth={setDepth} preset={preset} setPreset={setPreset} />
          <Canvas selected={selected} setSelected={setSelected} />
          <DetailPanel nodeId={selected} />
        </div>
        <footer className="xp-footer">
          <span>explorer.solsentry.app · v1.2</span>
          <span>210h uptime · live on mainnet</span>
          <span>⌘K search · ⇧⏎ expand · esc deselect</span>
        </footer>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
