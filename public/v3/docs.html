<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SolSentry — API + MCP Docs</title>
<link rel="icon" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="shared/nav.css" />
<style>
  html, body { margin: 0; background: var(--bg); color: var(--fg-1); min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  ::selection { background: var(--brand-orange); color: var(--fg-on-brand); }

  .dx { display: grid; grid-template-columns: 240px 1fr; padding-top: 64px; min-height: 100vh; }
  .dx-side { position: sticky; top: 64px; height: calc(100vh - 64px); border-right: 1px solid var(--border); background: var(--surface); padding: 24px 16px; overflow-y: auto; }
  .dx-side h5 { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-4); margin: 18px 10px 6px; }
  .dx-side h5:first-child { margin-top: 0; }
  .dx-side a { display: flex; justify-content: space-between; padding: 6px 10px; font-size: 13px; color: var(--fg-2); border-radius: 4px; }
  .dx-side a:hover { background: rgba(255,255,255,0.03); color: var(--fg-1); }
  .dx-side a.active { color: var(--brand-orange); background: var(--brand-orange-tint); }
  .dx-side a .m { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.08em; }
  .dx-side a.active .m { color: var(--brand-orange); }

  .dx-main { padding: 56px 56px 80px; max-width: 920px; }
  .dx-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--brand-orange); margin-bottom: 14px; }
  .dx-h1 { font-family: var(--font-display); font-weight: 700; font-size: 44px; letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 14px; }
  .dx-lead { font-size: 18px; color: var(--fg-2); line-height: 1.55; max-width: 680px; margin-bottom: 40px; }

  .dx-base { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-mono); font-size: 13px; }
  .dx-base .lbl { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-3); }
  .dx-base .val { color: var(--brand-orange); }
  .dx-base .status { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--brand-teal); }
  .dx-base .status i { width: 6px; height: 6px; background: var(--brand-teal); border-radius: 50%; }

  h2.dx-h2 { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.015em; margin: 48px 0 16px; padding-top: 24px; border-top: 1px solid var(--border); }
  h2.dx-h2:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
  .dx-p { color: var(--fg-2); margin-bottom: 16px; max-width: 700px; }

  .dx-ep { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin: 18px 0; overflow: hidden; }
  .dx-ep-head { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .dx-ep-method { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 4px; }
  .dx-ep-method.get  { color: var(--brand-teal); background: var(--brand-teal-tint); }
  .dx-ep-method.post { color: var(--brand-orange); background: var(--brand-orange-tint); }
  .dx-ep-path { font-family: var(--font-mono); font-size: 13.5px; color: var(--fg-1); }
  .dx-ep-path .p { color: var(--brand-orange); }
  .dx-ep-tag { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing: 0.1em; text-transform: uppercase; }
  .dx-ep-desc { padding: 14px 18px; color: var(--fg-2); font-size: 13.5px; }
  .dx-ep-desc code { font-family: var(--font-mono); color: var(--brand-orange); font-size: 12.5px; background: var(--bg); padding: 1px 6px; border-radius: 3px; }
  .dx-ep-body { background: var(--bg); padding: 14px 18px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); border-top: 1px solid var(--border); white-space: pre; overflow-x: auto; line-height: 1.6; }
  .dx-ep-body .s { color: var(--brand-teal); }
  .dx-ep-body .n { color: var(--brand-orange); }
  .dx-ep-body .k { color: var(--fg-3); }
  .dx-ep-body .c { color: var(--fg-4); font-style: italic; }

  .dx-code {
    background: var(--bg-elev-1); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 20px; font-family: var(--font-mono); font-size: 13px; color: var(--fg-2);
    white-space: pre; overflow-x: auto; margin: 16px 0; line-height: 1.65; position: relative;
  }
  .dx-code .k { color: var(--brand-orange); }
  .dx-code .s { color: var(--brand-teal); }
  .dx-code .c { color: var(--fg-4); font-style: italic; }
  .dx-code .copy { position: absolute; top: 10px; right: 10px; font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-4); padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
  .dx-code .copy:hover { color: var(--brand-orange); border-color: var(--brand-orange-line); }

  .dx-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: 16px 0 0; }
  .dx-tab { padding: 10px 16px; font-size: 12.5px; font-family: var(--font-mono); color: var(--fg-3); border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; }
  .dx-tab.active { color: var(--brand-orange); border-bottom-color: var(--brand-orange); }

  .dx-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 24px 0; }
  .dx-card { padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .dx-card h4 { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin: 0 0 6px; }
  .dx-card p { font-size: 13px; color: var(--fg-2); line-height: 1.5; margin: 0 0 12px; }
  .dx-card a { font-family: var(--font-mono); font-size: 12px; color: var(--brand-orange); }

  .dx-kv { display: grid; grid-template-columns: 180px 1fr; gap: 8px 16px; margin: 12px 0 24px; font-family: var(--font-mono); font-size: 12.5px; }
  .dx-kv dt { color: var(--fg-3); font-family: var(--font-body); font-weight: 500; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .dx-kv dd { color: var(--fg-1); margin: 0; }
  .dx-kv dd b { color: var(--brand-orange); }

  @media (max-width: 900px) {
    .dx { grid-template-columns: 1fr; }
    .dx-side { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--border); }
    .dx-main { padding: 32px 20px; }
    .dx-cards { grid-template-columns: 1fr; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/nav.jsx"></script>

<script type="text/babel">
const { useState } = React;

const ENDPOINTS = [
  { m: 'get',  path: '/v1/operator/{wallet}',   tag: 'Operators', desc: <>Full operator dossier: risk score, wallet cluster, deploy history, rug rate, first-seen, funded-by.</>, rsp: `{
  "operator": "4kxscute",
  "risk": 100,
  "wallets": 14,
  "deploys": 703,
  "rugs": 634,
  "rug_rate": 0.902,
  "first_seen": "2024-10-12T04:22Z",
  "funded_by": "Binance · CEX"
}` },
  { m: 'get',  path: '/v1/token/{mint}',        tag: 'Scan',      desc: <>Risk score + flags for any Solana mint. Returns in &lt;200ms. Use pre-snipe.</>, rsp: `{
  "mint": "EMSTMP9u…CVrRgVa",
  "risk": 100,
  "flags": [
    "MINT_AUTHORITY_ENABLED",
    "FREEZE_AUTHORITY_ENABLED",
    "TOP_HOLDER_OWNS_100%"
  ],
  "operator": "4kxscute",
  "ms": 187
}` },
  { m: 'get',  path: '/v1/graph/{wallet}?depth=N', tag: 'Graph',   desc: <>Operator graph. <code>depth</code> 1–10. Returns nodes + edges.</>, rsp: `{
  "root": "4kxscute…L5pH1",
  "depth": 2,
  "nodes": 13,
  "edges": 17,
  "drain_paths": 2
}` },
  { m: 'get',  path: '/v1/drain/{wallet}',      tag: 'Trace',     desc: <>Drain trace up to 10 hops. Terminal resolution: CEX deposit, bridge, mixer.</>, rsp: `{
  "hops": 6,
  "terminal": "MEXC · deposit",
  "sol_drained": 42.1,
  "path": ["w1","w2","kamino","jupiter","w3","cex"]
}` },
  { m: 'get',  path: '/v1/cluster/{id}',        tag: 'Bot',       desc: 'Bot-cluster dossier · same-block buy coordination.', rsp: `{
  "cluster": 1749,
  "wallets": 12,
  "strategy": "same_block_buy",
  "active_since": "-3d",
  "risk": 94
}` },
  { m: 'get',  path: '/v1/feed?since={ts}',     tag: 'Live',      desc: 'Live feed. Poll or upgrade to /ws for websocket.', rsp: '' },
  { m: 'get',  path: '/v1/stats',               tag: 'Health',    desc: 'Global counters · accuracy, operators tracked, runtime.', rsp: '' },
  { m: 'post', path: '/v1/scan',                tag: 'Scan',      desc: 'Force a scan. Skips cache. Rate-limited at 60/min on dev.', rsp: '' },
  { m: 'get',  path: '/v1/explain/{mint}?lang=pt|en', tag: 'Explain', desc: 'AI risk explainer. Provider-agnostic. 10 calls/hr on dev tier.', rsp: '' },
  { m: 'get',  path: '/v1/watchlist',           tag: 'Intel',     desc: 'Serial-deployer watchlist · top 69 tracked operators.', rsp: '' },
  { m: 'get',  path: '/health',                 tag: 'Status',    desc: 'RPC + db liveness · 200/503. Used by dashboard footer.', rsp: '' },
];

const SECTIONS = [
  { id: 'start',    t: 'Getting started',  m: '2 min' },
  { id: 'auth',     t: 'Auth & rate limit',m: 'dev · free' },
  { id: 'rest',     t: 'REST endpoints',   m: '11' },
  { id: 'mcp',      t: 'MCP server',       m: 'Claude/Cursor' },
  { id: 'webhooks', t: 'Webhooks',         m: 'Telegram · Discord' },
  { id: 'sdks',     t: 'SDKs',             m: 'ts · py · rust' },
  { id: 'errors',   t: 'Errors',           m: '' },
  { id: 'changelog',t: 'Changelog',        m: 'v1.4' },
];

function Sidebar({ active }) {
  return (
    <aside className="dx-side">
      <h5>Docs</h5>
      {SECTIONS.map(s => (
        <a key={s.id} href={'#' + s.id} className={active === s.id ? 'active' : ''}>
          <span>{s.t}</span><span className="m">{s.m}</span>
        </a>
      ))}
      <h5>Reference</h5>
      <a href="everything.html"><span>Everything page</span><span className="m">↗</span></a>
      <a href="dashboard.html"><span>Dashboard</span><span className="m">↗</span></a>
      <a href="explorer.html"><span>Explorer</span><span className="m">↗</span></a>
      <h5>Links</h5>
      <a href="https://github.com/solsentry" target="_blank" rel="noopener"><span>GitHub</span><span className="m">↗</span></a>
      <a href="https://t.me/solsentryai" target="_blank" rel="noopener"><span>Telegram</span><span className="m">↗</span></a>
    </aside>
  );
}

function Endpoint({ m, path, tag, desc, rsp }) {
  return (
    <div className="dx-ep">
      <div className="dx-ep-head">
        <span className={'dx-ep-method ' + m}>{m.toUpperCase()}</span>
        <span className="dx-ep-path">
          {path.split(/(\{[^}]+\})/g).map((p, i) => /^\{/.test(p) ? <span key={i} className="p">{p}</span> : <span key={i}>{p}</span>)}
        </span>
        <span className="dx-ep-tag">{tag}</span>
      </div>
      <div className="dx-ep-desc">{desc}</div>
      {rsp && <pre className="dx-ep-body">{rsp}</pre>}
    </div>
  );
}

function CodeTabs() {
  const [tab, setTab] = useState('curl');
  const samples = {
    curl: `# scan any mint — no auth in dev
curl https://api.solsentry.app/v1/token/EMSTMP9uTV1uEVXMHURR6w8pDmaywJkgurF8XCVrRgVa

# operator dossier
curl https://api.solsentry.app/v1/operator/4kxscuteRLQdNiTXA33YYsvywAPNA6DQTifswxjL5pH1`,
    ts: `import { SolSentry } from '@solsentry/sdk';

const ss = new SolSentry(); // no key in dev tier
const verdict = await ss.scan('EMSTMP9u…CVrRgVa');

if (verdict.risk >= 90) {
  throw new Error(\`Blocked: \${verdict.flags.join(', ')}\`);
}`,
    py: `from solsentry import SolSentry

ss = SolSentry()  # no key in dev tier
verdict = ss.scan("EMSTMP9u…CVrRgVa")

if verdict.risk >= 90:
    raise RuntimeError(f"Blocked: {', '.join(verdict.flags)}")`,
    mcp: `# Add to ~/.claude/mcp.json or .cursor/mcp.json
{
  "mcpServers": {
    "solsentry": {
      "command": "npx",
      "args": ["-y", "@solsentry/mcp"]
    }
  }
}

# Then in Claude: "scan mint EMSTMP9u… and tell me who deployed it"`,
  };
  return (
    <div>
      <div className="dx-tabs">
        {['curl','ts','py','mcp'].map(k => (
          <button key={k} className={'dx-tab' + (tab === k ? ' active' : '')} onClick={() => setTab(k)}>
            {k === 'ts' ? 'typescript' : k === 'py' ? 'python' : k}
          </button>
        ))}
      </div>
      <pre className="dx-code">
        <span className="copy">copy</span>
        {samples[tab]}
      </pre>
    </div>
  );
}

function App() {
  return (
    <>
      <SSNav active="docs" />
      <div className="dx">
        <Sidebar active="start" />
        <main className="dx-main">
          <div className="dx-eyebrow">§ solsentry / docs · v1.4 · Apr 2026</div>
          <h1 className="dx-h1">Operator intelligence,<br/>dropped into your stack.</h1>
          <p className="dx-lead">
            11 REST endpoints. One MCP server. Zero auth in dev tier. Same operator graph that
            powers the dashboard and the Telegram bot — now in your wallet, bot, or terminal.
          </p>

          <div className="dx-base">
            <span className="lbl">Base URL</span>
            <span className="val">https://api.solsentry.app</span>
            <span className="status"><i/>200 · 210h uptime · mainnet</span>
          </div>

          <h2 className="dx-h2" id="start">Getting started</h2>
          <p className="dx-p">No signup. No API key. Point your client at the base URL and scan.</p>
          <CodeTabs />

          <h2 className="dx-h2" id="auth">Auth &amp; rate limit</h2>
          <dl className="dx-kv">
            <dt>Dev tier</dt><dd>no key · <b>60 req/min</b> · 10 explain/hr</dd>
            <dt>Pro tier</dt><dd>bearer token · <b>600 req/min</b> · unlimited explain</dd>
            <dt>Enterprise</dt><dd>dedicated RPC · SLA 99.9 · custom webhooks</dd>
            <dt>429 handling</dt><dd>retry after <code>Retry-After</code> header</dd>
          </dl>

          <h2 className="dx-h2" id="rest">REST endpoints</h2>
          <p className="dx-p">All endpoints return JSON. All responses include <code style={{color:'var(--brand-orange)',fontFamily:'var(--font-mono)'}}>ms</code> for debugging. CORS enabled for all origins in dev.</p>
          {ENDPOINTS.map(ep => <Endpoint key={ep.path} {...ep} />)}

          <h2 className="dx-h2" id="mcp">MCP server</h2>
          <p className="dx-p">
            Drop SolSentry into Claude, Cursor, or any MCP-capable client. Your agent
            gets <code style={{color:'var(--brand-orange)'}}>scan</code>, <code style={{color:'var(--brand-orange)'}}>operator</code>, <code style={{color:'var(--brand-orange)'}}>graph</code>, and <code style={{color:'var(--brand-orange)'}}>drain</code> tools wired to the
            live operator graph.
          </p>
          <pre className="dx-code">
            <span className="copy">copy</span>
{`npm i -g @solsentry/mcp

# ~/.claude/mcp.json
{
  "mcpServers": {
    "solsentry": { "command": "npx", "args": ["-y", "@solsentry/mcp"] }
  }
}`}
          </pre>

          <h2 className="dx-h2" id="webhooks">Webhooks</h2>
          <div className="dx-cards">
            <div className="dx-card">
              <h4>Telegram</h4>
              <p>Pipe CRITICAL alerts into any channel. Pre-built bot at @solsentryai.</p>
              <a href="#">Telegram guide →</a>
            </div>
            <div className="dx-card">
              <h4>Discord</h4>
              <p>Webhook URL + risk threshold. Embed with flag list and operator tag.</p>
              <a href="#">Discord guide →</a>
            </div>
            <div className="dx-card">
              <h4>HTTP POST</h4>
              <p>Raw webhook. Signed with <code style={{color:'var(--brand-orange)',fontFamily:'var(--font-mono)'}}>X-SolSentry-Sig</code> (HMAC-SHA256).</p>
              <a href="#">HTTP guide →</a>
            </div>
          </div>

          <h2 className="dx-h2" id="sdks">SDKs</h2>
          <div className="dx-cards">
            <div className="dx-card">
              <h4>TypeScript</h4>
              <p>Official. Fully typed. Zero deps besides <code>fetch</code>.</p>
              <a href="#">npm i @solsentry/sdk →</a>
            </div>
            <div className="dx-card">
              <h4>Python</h4>
              <p>Async-first. <code>pydantic</code> models for every response.</p>
              <a href="#">pip install solsentry →</a>
            </div>
            <div className="dx-card">
              <h4>Rust</h4>
              <p>Community-maintained. For on-chain bots and validators.</p>
              <a href="#">cargo add solsentry →</a>
            </div>
          </div>

          <h2 className="dx-h2" id="errors">Errors</h2>
          <dl className="dx-kv">
            <dt>400 bad_request</dt><dd>malformed address · returns <code>{'{error, hint}'}</code></dd>
            <dt>404 not_tracked</dt><dd>wallet/mint not yet indexed · try POST /v1/scan</dd>
            <dt>429 rate_limited</dt><dd>retry after <code>Retry-After</code></dd>
            <dt>503 degraded</dt><dd>RPC provider rotation in progress · retry 5s</dd>
          </dl>

          <h2 className="dx-h2" id="changelog">Changelog</h2>
          <dl className="dx-kv">
            <dt>v1.4 · Apr 2026</dt><dd>MCP 1.2 · drain trace depth 10 · Rust SDK</dd>
            <dt>v1.3 · Mar 2026</dt><dd>Bot-cluster endpoint · 11 endpoints total</dd>
            <dt>v1.2 · Feb 2026</dt><dd>Graph endpoint · depth slider · explain PT-BR</dd>
            <dt>v1.0 · Dec 2025</dt><dd>Public beta · Telegram bot + REST</dd>
          </dl>
        </main>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
