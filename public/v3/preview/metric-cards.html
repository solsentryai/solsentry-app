<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg);display:flex;gap:16px;}
  .card{flex:1;background:#1A1A1A;border:1px solid #242424;border-radius:6px;padding:20px;display:flex;flex-direction:column;gap:10px;}
  .card.hot{border-color:#FF4444;box-shadow:0 0 0 1px #FF4444, 0 0 24px rgba(255,68,68,.18);}
  .card.live::before{content:"";position:absolute;}
  .lbl{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-3);}
  .val{font-family:var(--font-display);font-weight:700;font-size:36px;line-height:1;letter-spacing:-.02em;color:#F5F5F5;font-variant-numeric:tabular-nums;}
  .sub{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .val.teal{color:#00C9A7;} .val.orange{color:#FF6B00;} .val.crit{color:#FF4444;}
</style></head>
<body>
  <div class="card">
    <span class="lbl">Tokens Scanned</span>
    <span class="val">20,105<span style="color:#FF6B00">+</span></span>
    <span class="sub">v2.3.18 · since Oct 2025</span>
  </div>
  <div class="card">
    <span class="lbl">Prediction Accuracy</span>
    <span class="val teal">83.8%</span>
    <span class="sub">0 false positives @ HIGH+</span>
  </div>
  <div class="card hot">
    <span class="lbl" style="color:#FF4444">Critical Operators</span>
    <span class="val crit">47</span>
    <span class="sub">serial deployers tracked</span>
  </div>
</body></html>
