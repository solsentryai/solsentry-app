<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:32px;}
  .mark{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;}
  img{display:block;}
</style></head>
<body>
  <div class="mark"><img src="../assets/logo-shield.svg" width="80" height="80" /><span class="lbl">logo-shield.svg</span></div>
  <div class="mark"><img src="../assets/logo-shield-reticle.svg" width="110" height="110" /><span class="lbl">logo-shield-reticle.svg</span></div>
  <div class="mark" style="background:#F5F5F5;padding:14px;border-radius:6px;"><img src="../assets/logo-shield.svg" width="64" height="64" /><span class="lbl" style="color:#0A0A0A">on light surface</span></div>
  <div class="mark"><img src="../assets/favicon.svg" width="32" height="32" style="image-rendering:pixelated" /><span class="lbl">favicon @ 2x</span></div>
</body></html>
