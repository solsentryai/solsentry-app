<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{padding:28px;background:var(--bg);} .row{display:flex;gap:20px;} .box{width:140px;height:80px;background:var(--surface);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-body);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;} .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:8px;text-align:center;} .tok{display:flex;flex-direction:column;align-items:center;}</style>
</head><body>
  <div class="row">
    <div class="tok"><div class="box" style="box-shadow: inset 0 0 0 1px #242424">flat</div><span class="lbl">inset-border · default</span></div>
    <div class="tok"><div class="box" style="box-shadow: inset 0 0 0 1px #FF6B00">brand</div><span class="lbl">inset-brand · focused</span></div>
    <div class="tok"><div class="box" style="box-shadow: 0 0 0 1px #FF6B00, 0 0 24px rgba(255,107,0,.18)">glow</div><span class="lbl">glow-brand · live</span></div>
    <div class="tok"><div class="box" style="box-shadow: 0 0 0 1px #FF4444, 0 0 24px rgba(255,68,68,.22)">critical</div><span class="lbl">glow-critical · alert</span></div>
    <div class="tok"><div class="box" style="box-shadow: 0 0 0 2px rgba(255,107,0,.35)">focus</div><span class="lbl">focus ring</span></div>
  </div>
</body></html>
