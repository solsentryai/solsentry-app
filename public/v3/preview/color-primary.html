<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg); }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .swatch { flex: 1; aspect-ratio: 1.6/1; border-radius: 6px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; padding: 12px; }
  .swatch .name { font-family: var(--font-body); font-weight:500; font-size: 11px; letter-spacing:.15em; text-transform: uppercase; }
  .swatch .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style></head>
<body>
  <div class="row">
    <div class="swatch" style="background:#FF6B00"><span class="name" style="color:#0A0A0A">Orange · Primary</span><span class="hex" style="color:#0A0A0A">#FF6B00</span></div>
    <div class="swatch" style="background:#E55F00"><span class="name" style="color:#0A0A0A">Orange 600</span><span class="hex" style="color:#0A0A0A">#E55F00</span></div>
    <div class="swatch" style="background:#FF8A33"><span class="name" style="color:#0A0A0A">Orange 400</span><span class="hex" style="color:#0A0A0A">#FF8A33</span></div>
    <div class="swatch" style="background:rgba(255,107,0,.08); border-color: rgba(255,107,0,.22)"><span class="name" style="color:#FF6B00">Orange Tint</span><span class="hex" style="color:#FF6B00">rgba 8%</span></div>
  </div>
</body></html>
