<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding:24px; background:var(--bg); }
  .row { display:flex; gap:12px; }
  .swatch { flex:1; aspect-ratio:1.6/1; border-radius:6px; display:flex; flex-direction:column; justify-content:space-between; padding:12px; border:1px solid var(--border); }
  .name { font-family: var(--font-body); font-weight:500; font-size: 11px; letter-spacing:.15em; text-transform:uppercase; color: var(--fg-2); }
  .sub  { font-family: var(--font-mono); font-size:11px; color: var(--fg-3); }
</style></head>
<body>
  <div class="row">
    <div class="swatch" style="background:#0A0A0A"><span class="name">BG</span><span class="sub">#0A0A0A</span></div>
    <div class="swatch" style="background:#121212"><span class="name">Elev 1</span><span class="sub">#121212</span></div>
    <div class="swatch" style="background:#1A1A1A"><span class="name">Surface</span><span class="sub">#1A1A1A</span></div>
    <div class="swatch" style="background:#202020"><span class="name">Surface 2</span><span class="sub">#202020</span></div>
    <div class="swatch" style="background:#262626"><span class="name">Surface 3</span><span class="sub">#262626</span></div>
  </div>
</body></html>
