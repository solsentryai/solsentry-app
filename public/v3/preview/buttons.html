<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg);}
  .btn{font-family:var(--font-body);font-weight:600;font-size:13px;letter-spacing:.15em;text-transform:uppercase;border-radius:4px;padding:10px 18px;border:1px solid transparent;cursor:pointer;transition:background 120ms, border-color 120ms;}
  .primary{background:#FF6B00;color:#0A0A0A;border-color:#FF6B00;}
  .primary:hover{background:#E55F00;border-color:#E55F00;}
  .secondary{background:transparent;color:#F5F5F5;border-color:#3A3A3A;}
  .secondary:hover{background:#202020;border-color:#FF6B00;}
  .ghost{background:transparent;color:#FF6B00;border-color:transparent;}
  .ghost:hover{background:rgba(255,107,0,.08);}
  .danger{background:transparent;color:#FF4444;border-color:#FF4444;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:12px}
</style></head>
<body>
  <div class="row">
    <button class="btn primary">Scan Token</button>
    <button class="btn secondary">View Graph</button>
    <button class="btn ghost">Cancel</button>
    <button class="btn danger">Flag Critical</button>
    <button class="btn primary" disabled style="opacity:.35;cursor:not-allowed">Disabled</button>
  </div>
  <div class="lbl">primary · secondary · ghost · danger · disabled</div>
</body></html>
