<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding:24px; background:var(--bg); }
  .row { display:flex; gap:12px; }
  .swatch { flex:1; aspect-ratio:1.6/1; border-radius:6px; border:1px solid var(--border); display:flex; flex-direction:column; justify-content:space-between; padding:12px; }
  .name { font-family: var(--font-body); font-weight:500; font-size: 11px; letter-spacing:.15em; text-transform:uppercase; }
  .sub  { font-family: var(--font-mono); font-size:11px; opacity:.85; }
</style></head>
<body>
  <div class="row">
    <div class="swatch" style="background:#FF4444"><span class="name" style="color:#0A0A0A">Critical</span><span class="sub" style="color:#0A0A0A">#FF4444</span></div>
    <div class="swatch" style="background:#FFB020"><span class="name" style="color:#0A0A0A">Warning</span><span class="sub" style="color:#0A0A0A">#FFB020</span></div>
    <div class="swatch" style="background:#00C9A7"><span class="name" style="color:#0A0A0A">Safe</span><span class="sub" style="color:#0A0A0A">#00C9A7</span></div>
    <div class="swatch" style="background:#3AA9FF"><span class="name" style="color:#0A0A0A">Info</span><span class="sub" style="color:#0A0A0A">#3AA9FF</span></div>
  </div>
</body></html>
