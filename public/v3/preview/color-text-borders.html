<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg);}
  .grid{display:grid;grid-template-columns:120px 1fr 80px;gap:4px 16px;align-items:baseline;}
  .dot{height:28px;border-radius:4px;border:1px solid var(--border);}
  .lbl{font-family:var(--font-body);font-weight:500;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-3);}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
  .sample{font-family:var(--font-body);font-size:14px;}
</style></head>
<body>
  <div class="grid">
    <span class="lbl">fg-1</span><span class="sample" style="color:#F5F5F5">The quick brown fox jumps — primary body text</span><span class="val">#F5F5F5</span>
    <span class="lbl">fg-2</span><span class="sample" style="color:#B8B8B8">The quick brown fox jumps — secondary text</span><span class="val">#B8B8B8</span>
    <span class="lbl">fg-3</span><span class="sample" style="color:#8A8A8A">Labels, eyebrows, metadata — tertiary</span><span class="val">#8A8A8A</span>
    <span class="lbl">fg-4</span><span class="sample" style="color:#5A5A5A">Disabled, placeholder — quaternary</span><span class="val">#5A5A5A</span>
    <span class="lbl">border</span><span class="dot" style="background:#242424"></span><span class="val">#242424</span>
    <span class="lbl">border soft</span><span class="dot" style="background:#1E1E1E"></span><span class="val">#1E1E1E</span>
    <span class="lbl">border strong</span><span class="dot" style="background:#3A3A3A"></span><span class="val">#3A3A3A</span>
  </div>
</body></html>
