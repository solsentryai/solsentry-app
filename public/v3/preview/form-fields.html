<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg);display:flex;flex-direction:column;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;max-width:520px;}
  .lbl{font-family:var(--font-body);font-weight:500;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg-3);}
  .input{font-family:var(--font-mono);font-size:14px;color:var(--fg-1);background:#202020;border:1px solid #242424;border-radius:4px;padding:10px 12px;}
  .input:focus{outline:none;border-color:#FF6B00;box-shadow:0 0 0 2px rgba(255,107,0,.35);}
  .input.has-value{color:var(--brand-orange);}
</style></head>
<body>
  <div class="field">
    <label class="lbl">Token Contract</label>
    <input class="input has-value" value="EMSTMP9uTV1uEVXMHURR6w8pDmaywJkgurF8XCVrRgVa" />
  </div>
  <div class="field">
    <label class="lbl">Operator Wallet</label>
    <input class="input" placeholder="Paste wallet address…" />
  </div>
  <div class="field">
    <label class="lbl">Risk Threshold</label>
    <select class="input" style="font-family:var(--font-body)"><option>HIGH (≥ 75)</option><option>MEDIUM (≥ 50)</option></select>
  </div>
</body></html>
