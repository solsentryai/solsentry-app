<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{padding:24px;background:var(--bg);} .row{display:flex;gap:16px;align-items:center;} .box{width:80px;height:80px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;} .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px;text-align:center;} .tok{display:flex;flex-direction:column;align-items:center;}</style>
</head><body>
  <div class="row">
    <div class="tok"><div class="box" style="border-radius:0"></div><span class="lbl">none · 0</span></div>
    <div class="tok"><div class="box" style="border-radius:2px"></div><span class="lbl">sm · 2</span></div>
    <div class="tok"><div class="box" style="border-radius:4px"></div><span class="lbl">md · 4</span></div>
    <div class="tok"><div class="box" style="border-radius:6px"></div><span class="lbl">lg · 6 (default)</span></div>
    <div class="tok"><div class="box" style="border-radius:10px"></div><span class="lbl">xl · 10 (max)</span></div>
    <div class="tok"><div class="box" style="border-radius:999px;width:120px"></div><span class="lbl">pill · 999 (chips only)</span></div>
  </div>
</body></html>
