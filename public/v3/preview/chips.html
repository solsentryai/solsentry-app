<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .chip{font-family:var(--font-body);font-weight:500;font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:6px 12px;border-radius:999px;border:1px solid;display:inline-flex;align-items:center;gap:6px;}
  .dot{width:6px;height:6px;border-radius:999px;background:currentColor;}
  .orange{color:#FF6B00;border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.08);}
  .teal{color:#00C9A7;border-color:rgba(0,201,167,.4);background:rgba(0,201,167,.08);}
  .purple{color:#A855F7;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.08);}
  .white{color:#F5F5F5;border-color:rgba(245,245,245,.25);background:rgba(245,245,245,.06);}
  .crit{color:#FF4444;border-color:rgba(255,68,68,.4);background:rgba(255,68,68,.08);}
  .warn{color:#FFB020;border-color:rgba(255,176,32,.4);background:rgba(255,176,32,.08);}
</style></head>
<body>
  <span class="chip orange"><span class="dot"></span>PREVENT</span>
  <span class="chip teal"><span class="dot"></span>TRACK</span>
  <span class="chip white"><span class="dot"></span>EXPLAIN</span>
  <span class="chip purple"><span class="dot"></span>EVOLVE</span>
  <span class="chip crit"><span class="dot"></span>RISK 100/100</span>
  <span class="chip warn"><span class="dot"></span>HIGH_CONCENTRATION</span>
  <span class="chip teal"><span class="dot"></span>HUNTER ACTIVE</span>
</body></html>
