<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;background:var(--bg);}
  .grid{background-color:#0A0A0A;background-image:linear-gradient(rgba(255,107,0,.06) 1px, transparent 1px),linear-gradient(90deg, rgba(255,107,0,.06) 1px, transparent 1px);background-size:48px 48px;height:180px;border:1px solid #242424;border-radius:6px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .crosshair{position:absolute;inset:50% auto auto 50%;transform:translate(-50%,-50%);width:80px;height:80px;}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:10px;letter-spacing:.1em;text-transform:uppercase;}
</style></head>
<body>
  <div class="grid">
    <svg class="crosshair" viewBox="0 0 80 80"><circle cx="40" cy="40" r="24" stroke="#FF6B00" stroke-width="1" fill="none"/><circle cx="40" cy="40" r="10" stroke="#FF6B00" stroke-width="1" fill="none"/><circle cx="40" cy="40" r="2" fill="#FF6B00"/><line x1="14" y1="40" x2="30" y2="40" stroke="#FF6B00"/><line x1="50" y1="40" x2="66" y2="40" stroke="#FF6B00"/><line x1="40" y1="14" x2="40" y2="30" stroke="#FF6B00"/><line x1="40" y1="50" x2="40" y2="66" stroke="#FF6B00"/></svg>
  </div>
  <div class="cap">blueprint grid · 48px lattice · rgba(255,107,0,.06) · signature ambient texture</div>
</body></html>
