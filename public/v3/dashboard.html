<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SolSentry — Operator Dashboard</title>
<link rel="icon" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="shared/nav.css" />
<style>
  html, body { margin: 0; background: var(--bg); color: var(--fg-1); min-height: 100vh; }
  @keyframes sol-pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(1.25); } }
  @keyframes reticle-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  ::selection { background: var(--brand-orange); color: var(--fg-on-brand); }

  /* top bar adjusted — shared nav floats, so main dashboard has its own internal top bar */
  .ds-wrap { padding-top: 64px; }
  .ds-topbar {
    position: sticky; top: 64px; z-index: 10;
    height: 56px; padding: 0 24px;
    background: rgba(10,10,10,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .ds-topbar-left { display: flex; align-items: center; gap: 14px; }
  .ds-crumb { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .ds-crumb .sep { color: var(--fg-4); margin: 0 6px; }
  .ds-crumb .cur { color: var(--fg-1); }
  .ds-search {
    flex: 1; max-width: 520px;
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-elev-1); border: 1px solid var(--border); border-radius: 8px;
    padding: 0 12px; height: 36px;
  }
  .ds-search input {
    flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg-1);
    font-family: var(--font-mono); font-size: 12.5px;
  }
  .ds-search input::placeholder { color: var(--fg-4); }
  .ds-kbd { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; }
  .ds-status-inline { display: flex; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); }
  .ds-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand-teal); animation: sol-pulse 2s infinite; }

  .ds-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 120px); }

  /* side nav */
  .ds-side { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 12px; display: flex; flex-direction: column; gap: 3px; font-family: var(--font-body); }
  .ds-side-group-label { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-4); padding: 14px 10px 6px; }
  .ds-nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; font-size: 13px; color: var(--fg-2); cursor: pointer; transition: background 120ms ease, color 120ms ease; }
  .ds-nav-item:hover { background: rgba(255,255,255,0.03); color: var(--fg-1); }
  .ds-nav-item.active { background: var(--brand-orange-tint); color: var(--brand-orange); }
  .ds-nav-item .ds-pill-n { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); background: var(--bg); padding: 1px 6px; border-radius: 4px; }
  .ds-nav-item.active .ds-pill-n { color: var(--brand-orange); background: rgba(255,107,0,0.1); }
  .ds-nav-ic { width: 14px; height: 14px; flex-shrink: 0; }

  .ds-main { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; min-width: 0; }

  .ds-section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .ds-title { font-family: var(--font-display); font-weight: 700; font-size: 32px; letter-spacing: -0.02em; margin: 0; }
  .ds-sub { color: var(--fg-3); font-size: 13px; margin-top: 4px; }

  .ds-hunter { display: inline-flex; align-items: center; gap: 12px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-2); }
  .ds-hunter .agents { color: var(--brand-purple); font-weight: 500; }
  .ds-reticle { position: relative; width: 16px; height: 16px; }
  .ds-reticle::before, .ds-reticle::after { content: ""; position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--brand-purple); }
  .ds-reticle::before { animation: reticle-orbit 6s linear infinite; border-top-color: transparent; border-right-color: transparent; }
  .ds-reticle::after { inset: 4px; background: var(--brand-purple); border: 0; animation: sol-pulse 2s infinite; }

  /* metric strip */
  .ds-metrics { display: grid; grid-template-columns: repeat(5,1fr); border: 1px solid var(--border); border-radius: 6px; background: var(--surface); overflow: hidden; }
  .ds-metric { padding: 18px 20px; border-right: 1px solid var(--border); position: relative; }
  .ds-metric:last-child { border-right: 0; }
  .ds-metric-label { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px; }
  .ds-metric-value { font-family: var(--font-display); font-weight: 700; font-size: 28px; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
  .ds-metric-sub { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); margin-top: 6px; }
  .ds-metric-sub.up { color: var(--brand-teal); }
  .ds-metric-sub.crit { color: var(--status-critical); }

  /* two col */
  .ds-two-col { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; }
  .ds-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
  .ds-panel.p-0 { padding: 0; }
  .ds-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .ds-panel-head.bordered { padding: 16px 20px; margin-bottom: 0; border-bottom: 1px solid var(--border); }
  .ds-panel-title { font-family: var(--font-body); font-weight: 500; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-3); }
  .ds-panel-meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .ds-panel-meta.live { color: var(--brand-teal); }

  /* scan result */
  .ds-scan { padding: 20px; background: var(--surface); border: 1px solid var(--status-critical); border-radius: 6px; box-shadow: 0 0 24px rgba(255,68,68,0.12); display: flex; flex-direction: column; gap: 14px; }
  .ds-scan-head { display: flex; align-items: flex-start; gap: 16px; }
  .ds-scan-head-left { flex: 1; min-width: 0; }
  .ds-scan-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .ds-scan-eyebrow .label { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-3); }
  .ds-scan-eyebrow .ts { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-4); }
  .ds-scan-title { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -0.01em; color: var(--fg-1); }
  .ds-scan-addr { display: inline-flex; align-items: center; gap: 8px; margin-top: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--brand-orange); word-break: break-all; }
  .ds-scan-addr .copy { font-size: 10px; color: var(--fg-4); padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; }
  .ds-scan-addr .copy:hover { color: var(--brand-orange); border-color: var(--brand-orange-line); }
  .ds-scan-risk { text-align: right; }
  .ds-scan-risk .val { font-family: var(--font-display); font-weight: 700; font-size: 40px; line-height: 1; color: var(--status-critical); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .ds-scan-risk .val span { font-size: 18px; color: var(--fg-3); }
  .ds-scan-risk .lbl { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--status-critical); margin-top: 4px; }
  .ds-scan-row { display: flex; gap: 28px; padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .ds-scan-stat-lbl { font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-3); }
  .ds-scan-stat-val { font-family: var(--font-mono); font-size: 15px; color: var(--fg-1); margin-top: 2px; }
  .ds-scan-stat-val.crit { color: var(--status-critical); }
  .ds-flags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ds-flag { font-family: var(--font-mono); font-size: 10.5px; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.04em; border: 1px solid currentColor; }
  .ds-flag.critical { color: var(--status-critical); background: var(--status-critical-tint); }
  .ds-flag.warning { color: var(--status-warning); background: var(--status-warning-tint); }
  .ds-flag.info { color: var(--fg-2); background: var(--bg); border-color: var(--border); }

  /* graph */
  .ds-graph {
    height: 280px; background-color: var(--bg-elev-1);
    background-image: linear-gradient(rgba(255,107,0,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,107,0,.05) 1px, transparent 1px);
    background-size: 32px 32px;
    border: 1px solid var(--border); border-radius: 6px; position: relative; overflow: hidden;
  }
  .ds-node { position: absolute; border-radius: 999px; transform: translate(-50%,-50%); cursor: pointer; }
  .ds-node.op { background: var(--brand-orange); box-shadow: 0 0 0 4px rgba(255,107,0,.15), 0 0 20px rgba(255,107,0,0.35); width: 14px; height: 14px; }
  .ds-node.wal { background: var(--brand-teal); width: 9px; height: 9px; }
  .ds-node.bot { background: var(--brand-purple); width: 10px; height: 10px; }
  .ds-node.cex { background: var(--fg-3); width: 8px; height: 8px; }
  .ds-node-label { position: absolute; transform: translate(-50%, 0); font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); padding: 1px 5px; background: rgba(10,10,10,0.85); border-radius: 3px; white-space: nowrap; pointer-events: none; }
  .ds-edge { position: absolute; height: 1px; background: rgba(255,107,0,.35); transform-origin: 0 50%; pointer-events: none; }
  .ds-edge.drain { background: linear-gradient(90deg, rgba(255,68,68,.5), rgba(255,68,68,.15)); height: 1.5px; }
  .ds-graph-legend { display: flex; gap: 16px; margin-top: 12px; font-family: var(--font-body); font-size: 10.5px; color: var(--fg-3); letter-spacing: 0.1em; text-transform: uppercase; flex-wrap: wrap; }
  .ds-graph-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .ds-graph-legend i { display: inline-block; width: 8px; height: 8px; border-radius: 999px; }

  /* table */
  .ds-th { display: grid; grid-template-columns: 1.6fr 0.8fr 0.8fr 0.8fr 1fr 0.9fr; gap: 16px; padding: 12px 20px; font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg-4); border-bottom: 1px solid var(--border); }
  .ds-tr { display: grid; grid-template-columns: 1.6fr 0.8fr 0.8fr 0.8fr 1fr 0.9fr; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; font-family: var(--font-mono); font-size: 13px; color: var(--fg-2); cursor: pointer; transition: background 120ms ease; }
  .ds-tr:last-child { border-bottom: 0; }
  .ds-tr:hover { background: rgba(255,255,255,0.02); }
  .ds-tr .op-handle { color: var(--brand-orange); font-weight: 500; }
  .ds-tr .risk-crit { color: var(--status-critical); }
  .ds-tr .risk-warn { color: var(--status-warning); }
  .ds-tr .ls { color: var(--fg-3); font-size: 12px; }
  .ds-tr .status { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-weight: 500; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
  .ds-tr .status i { width: 6px; height: 6px; border-radius: 999px; }
  .ds-tr .status.flagged { color: var(--status-critical); }
  .ds-tr .status.flagged i { background: var(--status-critical); }
  .ds-tr .status.tracking { color: var(--brand-teal); }
  .ds-tr .status.tracking i { background: var(--brand-teal); }

  /* log */
  .ds-log { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); line-height: 1.7; max-height: 300px; overflow: auto; }
  .ds-log-row { padding: 2px 0; }
  .ds-log-row .ts { color: var(--fg-4); margin-right: 10px; }
  .ds-log-row .tag { display: inline-block; min-width: 72px; margin-right: 8px; font-weight: 500; letter-spacing: 0.06em; }
  .ds-log-row .tag-crit { color: var(--status-critical); }
  .ds-log-row .tag-ok { color: var(--brand-teal); }
  .ds-log-row .tag-info { color: var(--fg-3); }
  .ds-log-row .tag-evo { color: var(--brand-purple); }
  .ds-log-row .tag-trk { color: var(--status-info); }
  .ds-log-row .addr { color: var(--brand-orange); }

  .ds-footer { height: 28px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing: 0.05em; }

  @media (max-width: 960px) {
    .ds-layout { grid-template-columns: 1fr; }
    .ds-side { display: none; }
    .ds-two-col { grid-template-columns: 1fr; }
    .ds-metrics { grid-template-columns: repeat(2, 1fr); }
    .ds-metric { border-right: 0; border-bottom: 1px solid var(--border); }
  }
</style>

    { group: 'Monitor', links: [
      { k: 'dash',   t: 'Dashboard',    ic: 'dash'   },
      { k: 'scan',   t: 'Scanner',      ic: 'scan',  n: 'new' },
      { k: 'alerts', t: 'Alerts',       ic: 'alert', n: '12'  },
    ]},
    { group: 'Intel', links: [
      { k: 'watch',  t: 'Watchlist',    ic: 'watch', n: '69' },
      { k: 'graph',  t: 'Graph explorer', ic: 'graph', href: 'explorer.html' },
      { k: 'bots',   t: 'Bot clusters', ic: 'bot',   n: '2,4k' },
    ]},
    { group: 'System', links: [
      { k: 'agents', t: 'Hunter agents', ic: 'agents', n: '30'  },
      { k: 'docs',   t: 'API / MCP',     ic: 'docs',  href: 'docs.html' },
      { k: 'set',    t: 'Settings',      ic: 'set'    },
    ]},
  ];
  return (
    <aside className="ds-side">
      {items.map(g => (
        <React.Fragment key={g.group}>
          <div className="ds-side-group-label">{g.group}</div>
          {g.links.map(l => (
            <a key={l.k} href={l.href || '#'} className={'ds-nav-item' + (active === l.k ? ' active' : '')}>
              <SideIcon name={l.ic} />
              <span>{l.t}</span>
              {l.n && <span className="ds-pill-n">{l.n}</span>}
            </a>
          ))}
        </React.Fragment>
      ))}
    </aside>

}

function HunterBadge() {
  return (
    <span className="ds-hunter">
      <span className="ds-reticle"></span>
      <span className="agents">30 agents</span>
      <span style={{color:'var(--fg-4)'}}>|</span>
      <span>tracking · mutating · hunting</span>
    </span>
  );
}

const API = 'https://api.solsentry.app/v1';

function fmt(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString('en-US');
}

function DSMetrics() {
  const [stats, setStats] = useState(null);
  useEffect(() => {
    let dead = false;
    const tick = async () => {
      try {
        const r = await fetch(API + '/stats', { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        if (!dead) setStats(j);
      } catch (_) {}
    };
    tick();
    const id = setInterval(tick, 30000);
    return () => { dead = true; clearInterval(id); };
  }, []);

  const items = [
    { l: 'Tokens scanned', v: fmt(stats?.total_predictions), s: stats ? `${stats.resolve_rate_pct}% resolved` : 'loading…', cls: 'up' },
    { l: 'CRITICAL/HIGH alerts', v: fmt(stats?.high_risk_alerts), s: 'zero FP in CRITICAL', cls: 'crit' },
    { l: 'Operators', v: fmt(stats?.total_operators), s: stats ? `${fmt(stats.serial_ruggers)} serial` : '—', cls: 'up' },
    { l: 'Bot clusters', v: fmt(stats?.bot_clusters), s: 'coordinated detection', cls: '' },
    { l: 'Confirmed rugs', v: fmt(stats?.confirmed_rugs), s: stats ? `${fmt(stats.runtime_hours)}h uptime` : '—', cls: 'crit' },
  ];
  return (
    <div className="ds-metrics">
      {items.map(m => (
        <div className="ds-metric" key={m.l}>
          <div className="ds-metric-label">{m.l}</div>
          <div className="ds-metric-value">{m.v}</div>
          <div className={'ds-metric-sub ' + m.cls}>{m.s}</div>
        </div>
      ))}
    </div>
  );
}

function ScanCard() {
  return (
    <article className="ds-scan">
      <header className="ds-scan-head">
        <div className="ds-scan-head-left">
          <div className="ds-scan-eyebrow">
            <span className="label">Latest auto-scan</span>
            <span className="ts">14:02 UTC · 187ms</span>
          </div>
          <div className="ds-scan-title">Meteora Position NFT (MPN)</div>
          <div className="ds-scan-addr">
            <span>EMSTMP9uTV1uEVXMHURR6w8pDmaywJkgurF8XCVrRgVa</span>
            <span className="copy">copy</span>
          </div>
        </div>
        <div className="ds-scan-risk">
          <div className="val">100<span>/100</span></div>
          <div className="lbl">Critical</div>
        </div>
      </header>
      <div className="ds-scan-row">
        <div><div className="ds-scan-stat-lbl">Holders</div><div className="ds-scan-stat-val">1</div></div>
        <div><div className="ds-scan-stat-lbl">Top 1</div><div className="ds-scan-stat-val crit">100%</div></div>
        <div><div className="ds-scan-stat-lbl">Liquidity</div><div className="ds-scan-stat-val">—</div></div>
        <div><div className="ds-scan-stat-lbl">Operator</div><div className="ds-scan-stat-val" style={{color:'var(--brand-orange)'}}>4kxscute</div></div>
      </div>
      <div>
        <div className="ds-scan-stat-lbl" style={{marginBottom: 8}}>Flags</div>
        <div className="ds-flags">
          {FLAGS.map(f => <span key={f.label} className={'ds-flag ' + f.tone}>{f.label}</span>)}
        </div>
      </div>
    </article>
  );
}

function GraphPanel() {
  return (
    <div className="ds-panel">
      <div className="ds-panel-head">
        <span className="ds-panel-title">Operator Graph · 4kxscute · depth 2</span>
        <span className="ds-panel-meta">11 entities · 3 clusters · <a href="explorer.html" style={{color:'var(--brand-orange)'}}>expand →</a></span>
      </div>
      <div className="ds-graph">
        {G_EDGES.map(([a, b, kind], i) => {
          const n1 = NODE_BY[a], n2 = NODE_BY[b];
          const dx = n2.x - n1.x, dy = n2.y - n1.y;
          const len = Math.sqrt(dx*dx + dy*dy);
          const ang = Math.atan2(dy, dx) * 180 / Math.PI;
          return <div key={i} className={'ds-edge ' + (kind || '')}
            style={{left:`${n1.x}%`, top:`${n1.y}%`, width:`${len}%`, transform:`rotate(${ang}deg)`}} />;
        })}
        {G_NODES.map(n => (
          <React.Fragment key={n.id}>
            <div className={'ds-node ' + n.t} style={{left:`${n.x}%`, top:`${n.y}%`}} />
            {n.l && <div className="ds-node-label" style={{left:`${n.x}%`, top:`calc(${n.y}% + 12px)`}}>{n.l}</div>}
          </React.Fragment>
        ))}
      </div>
      <div className="ds-graph-legend">
        <span><i style={{background:'var(--brand-orange)'}}/>Operator</span>
        <span><i style={{background:'var(--brand-teal)'}}/>Wallet</span>
        <span><i style={{background:'var(--brand-purple)'}}/>Bot cluster</span>
        <span><i style={{background:'var(--fg-3)'}}/>CEX / Bridge</span>
      </div>
    </div>
  );
}

function Watchlist() {
  const [ops, setOps] = useState([]);
  const [total, setTotal] = useState(null);
  useEffect(() => {
    let dead = false;
    (async () => {
      try {
        const [t, s] = await Promise.all([
          fetch(API + '/top-operators?limit=10', { cache: 'no-store' }).then(r => r.ok ? r.json() : null),
          fetch(API + '/stats', { cache: 'no-store' }).then(r => r.ok ? r.json() : null),
        ]);
        if (!dead) {
          if (t?.operators) setOps(t.operators);
          if (s) setTotal({ serial: s.serial_ruggers, all: s.total_operators });
        }
      } catch (_) {}
    })();
    return () => { dead = true; };
  }, []);

  return (
    <div className="ds-panel p-0">
      <div className="ds-panel-head bordered">
        <span className="ds-panel-title">Serial-deployer watchlist</span>
        <span className="ds-panel-meta">{total ? `${fmt(total.serial)} serial · ${fmt(total.all)} total mapped` : 'loading…'}</span>
      </div>
      <div className="ds-th">
        <span>Operator</span><span>Tokens</span><span>Rugs</span><span>Rug rate</span><span>Pending</span><span>Status</span>
      </div>
      {ops.length === 0 && <div className="ds-tr"><span style={{gridColumn: '1 / -1', color: 'var(--fg-3)', fontFamily: 'var(--font-mono)', fontSize: 12}}>Fetching from api.solsentry.app/v1/top-operators…</span></div>}
      {ops.map(op => {
        const rate = op.rug_rate_pct ?? 0;
        const status = rate >= 80 ? 'flagged' : rate >= 50 ? 'tracking' : 'watch';
        return (
          <div className="ds-tr" key={op.wallet}>
            <a className="op-handle" href={`explorer.html#${op.wallet}`} style={{textDecoration: 'none', color: 'var(--brand-orange)'}}>{op.wallet.slice(0, 8)}</a>
            <span>{fmt(op.total_tokens)}</span>
            <span>{fmt(op.confirmed_rugs)}</span>
            <span className={rate >= 90 ? 'risk-crit' : rate >= 75 ? 'risk-warn' : ''}>{rate.toFixed(1)}%</span>
            <span className="ls">{fmt(op.pending)}</span>
            <span className={'status ' + status}><i/>{status}</span>
          </div>
        );
      })}
    </div>
  );
}

function LiveFeed() {
  const [rows, setRows] = useState([]);
  const [live, setLive] = useState(false);
  useEffect(() => {
    let dead = false;
    const toneFor = (level) => {
      if (level === 'CRITICAL') return 'crit';
      if (level === 'HIGH') return 'trk';
      if (level === 'MEDIUM') return 'info';
      return 'ok';
    };
    const tick = async () => {
      try {
        const r = await fetch(API + '/alerts/recent?limit=20', { cache: 'no-store' });
        if (!r.ok) throw 0;
        const j = await r.json();
        if (dead) return;
        const list = (j.alerts || []).map(a => {
          const ts = new Date((a.predicted_at || 0) * 1000).toTimeString().slice(0, 8);
          const addrShort = (a.mint || '').slice(0, 12);
          const body = (
            <>
              {a.symbol ? <b style={{color:'var(--fg-1)'}}>{a.symbol}</b> : 'scan'}
              {' · risk '}{a.risk_score}/100
              {' · '}<span className="addr">{addrShort}…</span>
              {a.dev_confirmed_rugs > 0 && <> · dev rugs <b>{a.dev_confirmed_rugs}</b></>}
            </>
          );
          return { ts, tag: a.risk_level, tone: toneFor(a.risk_level), body };
        });
        setRows(list);
        setLive(true);
      } catch (_) {
        if (!dead) setLive(false);
      }
    };
    tick();
    const id = setInterval(tick, 15000);
    return () => { dead = true; clearInterval(id); };
  }, []);
  return (
    <div className="ds-panel">
      <div className="ds-panel-head">
        <span className="ds-panel-title">Live feed · Recent alerts</span>
        <span className="ds-panel-meta live">{live ? '● streaming' : '○ cached'}</span>
      </div>
      <div className="ds-log">
        {rows.length === 0 && <div className="ds-log-row"><span className="tag tag-info">[WAIT]</span> fetching recent alerts from api.solsentry.app…</div>}
        {rows.map((r, i) => (
          <div className="ds-log-row" key={i}>
            <span className="ts">{r.ts}</span>
            <span className={'tag tag-' + r.tone}>[{r.tag}]</span>
            {r.body}
          </div>
        ))}
      </div>
    </div>
  );
}

}
