<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SolSentry — Operator intelligence for Solana</title>
<meta name="description" content="RugCheck tells you a fire is burning. SolSentry tells you who lit it. Real-time operator intelligence for Solana. Track serial rug deployers before they pull." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared/nav.css" />
<style>
  :root {
    --bg: #0A0A0A;
    --bg-1: #121212;
    --surface: #161616;
    --surface-2: #1C1C1C;
    --border: #242424;
    --border-strong: #333;
    --fg-1: #F5F5F5;
    --fg-2: #B8B8B8;
    --fg-3: #8A8A8A;
    --fg-4: #5A5A5A;
    --crit: #E5484D;
    --high: #F5A524;
    --safe: #3FB950;
    --accent: #6E56CF;
    --brand: #FF6B00;
    --brand-tint: rgba(255,107,0,0.10);
    --brand-line: rgba(255,107,0,0.28);
    --font-display: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--fg-1);
    font-family: var(--font-body); font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  ::selection { background: var(--brand); color: var(--bg); }
  .tnum { font-variant-numeric: tabular-nums; }
  .mono { font-family: var(--font-mono); }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* Legacy nav styles kept out of the way — shared nav (shared/nav.css) owns .ss-* now */
  .nav-legacy-unused {
    position: fixed; top: 14px; right: 14px; left: auto; z-index: 50;
    display: flex; gap: 8px; align-items: center;
    font-family: var(--font-body);
  }
  .pill-base {
    background: rgba(26,26,26,0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 2px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .pill-brand { padding: 6px 12px 6px 8px; gap: 8px; text-decoration: none; }
  .pill-brand .mark { width: 22px; height: 22px; border-radius: 6px; background: rgba(255,107,0,0.15); border: 1px solid rgba(255,107,0,0.4); display: grid; place-items: center; }
  .pill-brand .mark svg { width: 12px; height: 12px; }
  .pill-brand .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--fg-1); letter-spacing: -0.01em; }
  .pill-menu { gap: 0; }
  .pill-menu .item {
    padding: 7px 12px; font-size: 12.5px; font-weight: 500; color: var(--fg-2);
    border-radius: 6px; display: inline-flex; align-items: center; gap: 4px;
    text-decoration: none; cursor: pointer; white-space: nowrap;
    transition: all 120ms ease; background: transparent; border: 0;
    font-family: var(--font-body); line-height: 1;
  }
  .pill-menu .item:hover { color: var(--fg-1); background: rgba(255,255,255,0.04); }
  .pill-menu .item.active { background: var(--brand-tint); color: var(--brand); }
  .pill-menu .divider { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }
  .pill-menu .chev { font-size: 9px; opacity: 0.55; }
  .pill-util { padding: 6px; gap: 4px; }
  .pill-util .seg { display: flex; background: #121212; border-radius: 6px; padding: 2px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; height: 24px; }
  .pill-util .seg button { padding: 0 8px; display: grid; place-items: center; border-radius: 4px; color: var(--fg-3); background: transparent; border: 0; font-family: inherit; font-size: inherit; cursor: pointer; }
  .pill-util .seg button.on { background: #262626; color: var(--fg-1); }
  .pill-util .kbd { font-family: var(--font-mono); font-size: 10px; padding: 0 7px; height: 22px; display: grid; place-items: center; border: 1px solid var(--border); border-radius: 4px; color: var(--fg-3); background: transparent; cursor: pointer; }
  .pill-util .kbd:hover { color: var(--fg-1); border-color: var(--border-strong); }
  .pill-util .ic { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; color: var(--fg-2); background: transparent; border: 0; cursor: pointer; }
  .pill-util .ic:hover { background: rgba(255,255,255,0.04); color: var(--fg-1); }

  .nav-dd { position: relative; display: inline-flex; }
  .nav-dd-panel {
    position: absolute; top: calc(100% + 10px); left: 50%; transform: translateX(-50%) translateY(-4px);
    min-width: 320px;
    background: rgba(26,26,26,0.98);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: all 140ms ease;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .nav-dd:hover .nav-dd-panel,
  .nav-dd:focus-within .nav-dd-panel {
    opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); pointer-events: auto;
  }
  .nav-dd-panel::before {
    content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%) rotate(45deg);
    width: 8px; height: 8px; background: rgba(26,26,26,0.98);
    border-top: 1px solid var(--border); border-left: 1px solid var(--border);
  }
  .nav-dd-item {
    display: flex; flex-direction: column; gap: 2px;
    padding: 10px 12px; border-radius: 6px; text-decoration: none;
  }
  .nav-dd-item:hover { background: rgba(255,255,255,0.04); }
  .nav-dd-item strong { font-size: 13px; color: var(--fg-1); font-weight: 600; }
  .nav-dd-item span { font-size: 11.5px; color: var(--fg-3); font-family: var(--font-mono); }

  .nav-fab { display: none; }

  /* ── HERO ── */
  .hero { padding: 120px 0 64px; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
  .hero::before {
    content:""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 800px 400px at 15% 0%, rgba(255,107,0,0.06), transparent 60%),
      radial-gradient(ellipse 700px 500px at 90% 100%, rgba(110,86,207,0.05), transparent 60%);
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--brand); letter-spacing: 0.14em; text-transform: uppercase;
    padding: 5px 11px; border: 1px solid var(--brand-line); background: var(--brand-tint);
    border-radius: 999px; margin-bottom: 28px;
  }
  .hero-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .hero h1 {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(40px, 6vw, 76px); line-height: 1.02;
    letter-spacing: -0.025em; margin-bottom: 22px; max-width: 980px;
  }
  .hero h1 em { font-style: normal; color: var(--fg-3); }
  .hero h1 .brand-word { color: var(--brand); }
  .hero-sub {
    font-size: clamp(16px, 1.3vw, 19px); color: var(--fg-2);
    max-width: 640px; margin-bottom: 36px; line-height: 1.55;
  }
  .hero-ctas { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn-primary {
    background: var(--brand); color: #fff; font-weight: 600;
    padding: 12px 20px; border-radius: 8px; font-size: 14px;
    display: inline-flex; align-items: center; gap: 8px; transition: all 150ms ease;
  }
  .btn-primary:hover { background: #ff8533; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--fg-1); font-weight: 600;
    padding: 12px 20px; border-radius: 8px; font-size: 14px;
    border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-ghost:hover { border-color: var(--fg-3); }
  .btn-code {
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 14px 10px 16px; border-radius: 8px; font-family: var(--font-mono); font-size: 13px;
    color: var(--fg-1); display: inline-flex; align-items: center; gap: 14px; position: relative;
  }
  .btn-code .pfx { color: var(--fg-4); }
  .btn-code .cmd { color: var(--fg-1); }
  .btn-code .copy-btn {
    margin-left: 4px; padding: 3px 8px; font-size: 10.5px;
    background: rgba(255,255,255,0.05); border-radius: 4px;
    color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .btn-code:hover .copy-btn { color: var(--brand); }

  /* ── HERO LOOKUP ── */
  .hero-lookup {
    margin-top: 40px; max-width: 720px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden;
  }
  .lookup-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 6px; gap: 2px; }
  .lookup-tab {
    flex: 1; padding: 9px 14px; font-size: 12px; font-family: var(--font-mono);
    color: var(--fg-3); border-radius: 7px; letter-spacing: 0.06em;
    text-transform: uppercase; font-weight: 500;
  }
  .lookup-tab.active { background: rgba(255,107,0,0.12); color: var(--brand); }
  .lookup-input-wrap { display: flex; align-items: stretch; padding: 14px; gap: 10px; }
  .lookup-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; color: var(--fg-1);
    font-family: var(--font-mono); font-size: 13.5px; outline: none;
  }
  .lookup-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(255,107,0,0.12); }
  .lookup-input::placeholder { color: var(--fg-4); }
  .lookup-btn {
    background: var(--brand); color: #fff; font-weight: 600; font-size: 13px;
    padding: 0 22px; border-radius: 8px;
  }
  .lookup-btn:hover { background: #ff8533; }
  .lookup-examples { padding: 10px 14px 14px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .lookup-examples-label { font-size: 11px; color: var(--fg-4); font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; }
  .lookup-chip {
    font-size: 11.5px; font-family: var(--font-mono); padding: 5px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--fg-2); display: inline-flex; align-items: center; gap: 6px;
  }
  .lookup-chip:hover { border-color: var(--brand-line); color: var(--fg-1); }
  .lookup-chip .ch-addr { color: var(--fg-1); }
  .lookup-chip .ch-risk-CRIT { color: var(--crit); }
  .lookup-chip .ch-risk-HIGH { color: var(--high); }
  .lookup-chip .ch-risk-SAFE { color: var(--safe); }

  /* ── Inline result card ── */
  .result-panel {
    margin: 14px; border-top: 1px solid var(--border); padding-top: 18px;
  }
  .result-panel.crit { border-color: rgba(229,72,77,0.25); }
  .result-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .risk-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-weight: 600;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px; border: 1px solid currentColor;
  }
  .risk-pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .risk-C { color: var(--crit); background: rgba(229,72,77,0.08); }
  .risk-H { color: var(--high); background: rgba(245,165,36,0.08); }
  .risk-M { color: var(--high); opacity: 0.8; background: rgba(245,165,36,0.05); }
  .risk-L { color: var(--safe); background: rgba(63,185,80,0.08); }
  .risk-U { color: var(--fg-3); background: rgba(255,255,255,0.04); }
  .addr-mono { font-family: var(--font-mono); font-size: 13px; color: var(--fg-1); }
  .result-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .rs { padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
  .rs-label { font-size: 10px; color: var(--fg-4); font-family: var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .rs-value { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -0.01em; }

  /* ── METRICS STRIP ── */
  .metrics { padding: 56px 0; border-bottom: 1px solid var(--border); }
  .metrics-head { display: flex; align-items: end; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
  .section-kicker { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 10px; }
  h2.section-title { font-family: var(--font-display); font-size: clamp(28px, 3.2vw, 40px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .metrics-status { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); display: inline-flex; align-items: center; gap: 10px; }
  .metrics-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--safe); animation: pulse 2s infinite; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--surface); }
  .metric {
    padding: 24px 22px; border-right: 1px solid var(--border); position: relative;
    transition: background 300ms ease;
  }
  .metric.flash { background: rgba(255,107,0,0.04); }
  .metric:last-child { border-right: 0; }
  .metric-label { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; }
  .metric-value { font-family: var(--font-display); font-weight: 700; font-size: 40px; letter-spacing: -0.02em; line-height: 1; }
  .metric-sub { margin-top: 10px; font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-4); display: flex; align-items: center; gap: 8px; }
  .spark { display: inline-flex; align-items: end; gap: 1.5px; height: 18px; }
  .spark i { width: 2px; background: var(--fg-4); display: block; }
  .spark.crit i:nth-child(n+6) { background: var(--crit); }

  /* ── CASE STUDY ── */
  .case { padding: 96px 0; border-bottom: 1px solid var(--border); }
  .case-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: start; }
  .case-lead { font-size: 20px; line-height: 1.45; color: var(--fg-1); font-weight: 500; margin-bottom: 20px; max-width: 540px; }
  .case-lead em { font-style: normal; color: var(--crit); }
  .case-body p { color: var(--fg-2); margin-bottom: 16px; line-height: 1.65; }
  .case-cite { background: var(--bg-1); border-left: 2px solid var(--crit); padding: 14px 18px; margin: 22px 0; color: var(--fg-2); }
  .case-cite .mono { color: var(--brand); font-size: 12px; }
  .case-tl {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  }
  .case-tl-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); }
  .case-tl-head .mark-crit { color: var(--crit); }
  .case-tl-row {
    display: grid; grid-template-columns: 90px 90px 1fr; gap: 14px; padding: 12px 18px;
    border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 12.5px;
    align-items: center;
  }
  .case-tl-row:last-child { border-bottom: 0; }
  .case-tl-t { color: var(--fg-3); }
  .case-tl-kind { font-weight: 600; letter-spacing: 0.08em; font-size: 10.5px; }
  .case-tl-kind.crit { color: var(--crit); }
  .case-tl-kind.warn { color: var(--high); }
  .case-tl-kind.ok { color: var(--fg-2); }
  .case-tl-foot { padding: 14px 18px; background: var(--bg-1); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 12px; }
  .case-tl-foot .lead { color: var(--safe); font-weight: 600; }

  /* ── GRAPH TEASER ── */
  .graph { padding: 96px 0; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .graph-head { max-width: 680px; margin-bottom: 40px; }
  .graph-viz {
    position: relative; height: 420px; border: 1px solid var(--border); border-radius: 14px;
    background: radial-gradient(ellipse at center, #141414 0%, #0D0D0D 70%);
    overflow: hidden;
  }
  .graph-legend { position: absolute; top: 16px; left: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); background: rgba(10,10,10,0.8); padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; }
  .graph-legend div { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .graph-legend div:first-child { margin-top: 0; color: var(--fg-2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .graph-cta { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }

  /* ── INTEGRATION 3-COL ── */
  .integ { padding: 96px 0; border-bottom: 1px solid var(--border); }
  .integ-head { max-width: 640px; margin-bottom: 48px; }
  .integ-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .integ-card { padding: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; gap: 14px; }
  .integ-card:hover { border-color: var(--border-strong); }
  .integ-ico {
    width: 40px; height: 40px; border-radius: 10px; background: var(--brand-tint);
    border: 1px solid var(--brand-line); display: flex; align-items: center; justify-content: center;
    color: var(--brand);
  }
  .integ-card h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; }
  .integ-card p { color: var(--fg-2); font-size: 13.5px; line-height: 1.55; }
  .integ-code {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-2);
    overflow-x: auto; margin-top: 4px;
  }
  .integ-code .k { color: var(--brand); }
  .integ-link { color: var(--brand); font-size: 13px; font-weight: 500; margin-top: auto; }

  /* ── CTA BLOCK ── */
  .cta { padding: 88px 0; border-bottom: 1px solid var(--border); }
  .cta-box {
    background: linear-gradient(135deg, var(--surface), var(--bg-1));
    border: 1px solid var(--border); border-radius: 20px;
    padding: 56px 48px; text-align: center;
  }
  .cta-box h2 { font-family: var(--font-display); font-size: clamp(28px, 3.2vw, 44px); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 14px; line-height: 1.1; }
  .cta-box p { color: var(--fg-2); font-size: 16px; max-width: 520px; margin: 0 auto 28px; }
  .cta-box .hero-ctas { justify-content: center; }

  /* ── FOOTER ── */
  footer { padding: 56px 0 40px; background: var(--bg); }
  .ft-grid { display: grid; grid-template-columns: 2fr repeat(3, 1fr); gap: 40px; margin-bottom: 40px; }
  .ft-brand h4 { font-family: var(--font-display); font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .ft-brand p { color: var(--fg-3); font-size: 13px; line-height: 1.6; max-width: 320px; }
  .ft-col h5 { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 14px; }
  .ft-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .ft-col a { color: var(--fg-2); font-size: 13px; }
  .ft-col a:hover { color: var(--fg-1); }
  .ft-bottom { border-top: 1px solid var(--border); padding-top: 20px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-4); gap: 16px; flex-wrap: wrap; }

  /* ── TIER PICKER · Easy / Pro / Dev ── */
  .tiers { padding: 96px 0; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .tiers::before {
    content:""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,107,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 900px 500px at 50% 0%, #000 40%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 900px 500px at 50% 0%, #000 40%, transparent 80%);
  }
  .tiers-head { text-align: center; margin-bottom: 56px; position: relative; }

  .hunter-row .kind.crit { color: var(--crit); background: rgba(229,72,77,0.10); }
  .hunter-row .kind.warn { color: var(--high); background: rgba(245,165,36,0.10); }
  .hunter-row .kind.ok   { color: var(--safe); background: rgba(63,185,80,0.10); }
  .hunter-row .body { color: var(--fg-1); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .hunter-row .body b { color: var(--brand); font-weight: 500; }
  .hunter-row .score { color: var(--fg-3); font-variant-numeric: tabular-nums; }
  .hunter-row.new { animation: hrow-in 400ms ease; }
  @keyframes hrow-in {
    from { opacity: 0; transform: translateY(-8px); background: rgba(168,85,247,0.08); }

    .metric:nth-child(2) { border-right: 0; }
    .metric:nth-child(-n+2) { border-bottom: 1px solid var(--border); }

  @media (max-width: 560px) {
    .hero { padding: 64px 0 48px; }
    .metrics-grid { grid-template-columns: 1fr; }
    .metric { border-right: 0 !important; border-bottom: 1px solid var(--border) !important; }
    .metric:last-child { border-bottom: 0 !important; }
    .lookup-input-wrap { flex-direction: column; }
    .lookup-btn { padding: 14px; }
  }

<body>
<div id="root"></div>

<script type="text/babel" src="shared/nav.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const API = 'https://api.solsentry.app/v1';
const SENTINEL = '4kxscuteRLQdNiTXA33YYsvywAPNA6DQTifswxjL5pH1';

/* ── helpers ── */
const fmtInt = (n) => (n == null ? '—' : Number(n).toLocaleString('en-US'));
const short = (a) => (!a || a.length < 12 ? a || '—' : a.slice(0, 6) + '…' + a.slice(-5));

/* ── shield logo ── */
function ShieldMark({ size = 22 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      <path d="M20 3L6 9v11c0 8.5 5.8 16.3 14 18 8.2-1.7 14-9.5 14-18V9L20 3z"
        fill="rgba(255,107,0,0.18)" stroke="#FF6B00" strokeWidth="1.6"/>
      <circle cx="20" cy="20" r="4.5" stroke="#FF6B00" strokeWidth="1.4"/>
      <circle cx="20" cy="20" r="1.6" fill="#FF6B00"/>
      <line x1="20" y1="4.5" x2="20" y2="34" stroke="#FF6B00" strokeWidth="1" opacity="0.5"/>
    </svg>
  );
}

/* ── NAV ── */
const PRODUCTS = [
  { t: 'Operator Explorer', s: '/graph · visual network', h: '#/graph' },
  { t: 'Protected Payment', s: '/products · Cloak track', h: '#/products/protected-payment' },
  { t: 'Stealth Launch', s: '/products · B2B · Q3 2026', h: '#/products/stealth-launch' },
  { t: 'Operator Oracle', s: '/products · enterprise API', h: '#/products/operator-oracle' },
];
const DOCS = [
  { t: 'MCP server', s: 'npm i @solsentry/mcp', h: '#/docs/mcp' },
  { t: 'REST API', s: '11 endpoints · no key', h: '#/docs/api' },
  { t: 'Integrations', s: 'Phantom · Jupiter · Trojan', h: '#/docs/integration' },
];
const RESOURCES = [
  { t: '4kxscute case study', s: '1,078 rugs · 19 min lead time', h: '#/case-studies/4kxscute' },
  { t: 'Weekly recap', s: 'Saturday operator digest', h: '#/blog/weekly' },
  { t: 'Research', s: 'ALife + AIS writeups', h: '#/blog/research' },
];

function Nav() {
  const [route, setRoute] = useState(typeof location !== 'undefined' ? location.hash || '#/' : '#/');
  useEffect(() => {
    const onHash = () => setRoute(location.hash || '#/');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const [lang, setLang] = useState('EN');
  const isActive = (hash) => route === hash || (hash !== '#/' && route.startsWith(hash));

  return (
    <nav className="nav" aria-label="Primary">
      <a href="#/" className="pill-base pill-brand" aria-label="SolSentry home">
        <span className="mark"><ShieldMark size={12} /></span>
        <span className="name">SolSentry</span>
      </a>

      <div className="pill-base pill-menu" role="menubar">
        <a href="#/graph" className={'item' + (isActive('#/graph') ? ' active' : '')} role="menuitem">Explorer</a>
        <span className="divider" aria-hidden="true"></span>
        <span className="nav-dd">
          <button className={'item' + (isActive('#/products') ? ' active' : '')} aria-haspopup="true">
            Products <span className="chev">▾</span>
          </button>
          <div className="nav-dd-panel" role="menu">
            {PRODUCTS.map(l => (
              <a key={l.h} href={l.h} className="nav-dd-item" role="menuitem">
                <strong>{l.t}</strong><span>{l.s}</span>
              </a>
            ))}
          </div>
        </span>
        <span className="divider" aria-hidden="true"></span>
        <span className="nav-dd">
          <button className={'item' + (isActive('#/docs') ? ' active' : '')} aria-haspopup="true">
            Docs <span className="chev">▾</span>
          </button>
          <div className="nav-dd-panel" role="menu">
            {DOCS.map(l => (
              <a key={l.h} href={l.h} className="nav-dd-item" role="menuitem">
                <strong>{l.t}</strong><span>{l.s}</span>
              </a>
            ))}
          </div>
        </span>
        <span className="divider" aria-hidden="true"></span>
        <span className="nav-dd">
          <button className={'item' + (isActive('#/resources') ? ' active' : '')} aria-haspopup="true">
            Resources <span className="chev">▾</span>
          </button>
          <div className="nav-dd-panel" role="menu">
            {RESOURCES.map(l => (
              <a key={l.h} href={l.h} className="nav-dd-item" role="menuitem">
                <strong>{l.t}</strong><span>{l.s}</span>
              </a>
            ))}
          </div>
        </span>
        <span className="divider" aria-hidden="true"></span>
        <a href="#/partners" className={'item' + (isActive('#/partners') ? ' active' : '')} role="menuitem">Partners</a>
      </div>

      <div className="pill-base pill-util">
        <div className="seg" role="group" aria-label="Language">
          <button className={lang === 'EN' ? 'on' : ''} onClick={() => setLang('EN')} aria-pressed={lang === 'EN'}>EN</button>
          <button className={lang === 'PT' ? 'on' : ''} onClick={() => setLang('PT')} aria-pressed={lang === 'PT'}>PT</button>
        </div>
        <button className="kbd" aria-label="Command palette" title="Command palette">⌘K</button>
        <a href="https://github.com/solsentry" target="_blank" rel="noopener" className="ic" aria-label="GitHub">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/>
          </svg>
        </a>
      </div>

      <button className="pill-base nav-fab" aria-label="Open menu" style={{padding: '10px'}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F5F5F5" strokeWidth="1.8">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>

/* ── HERO ── */
function riskBucket(score) {
  if (score >= 80) return 'CRIT';
  if (score >= 50) return 'HIGH';
  if (score >= 25) return 'MED';
  return 'SAFE';
}

function Hero() {
  const [kind, setKind] = useState('wallet');
  const [addr, setAddr] = useState('');
  const [verdict, setVerdict] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const samples = [
    { addr: SENTINEL, label: '4kxscute.sol' },
    { addr: 'So11111111111111111111111111111111111111112', label: 'wSOL · native' },
    { addr: 'JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4', label: 'Jupiter v6' },
  ];

  const lookup = async (value, lookupKind) => {
    const q = (value || addr).trim();
    const k = lookupKind || kind;
    if (!q) return;
    if (q.length < 32 || q.length > 44) {
      setError('Paste a valid Solana address (32–44 chars).');
      setVerdict(null);
      return;
    }
    if (k === 'graph') {
      window.location.href = 'explorer.html#' + encodeURIComponent(q);
      return;
    }
    setLoading(true); setError(null);
    const t0 = performance.now();
    try {
      const path = k === 'token' ? '/token/' + encodeURIComponent(q) : '/operator/' + encodeURIComponent(q);
      const r = await fetch(API + path, { cache: 'no-store' });
      if (!r.ok) throw new Error('lookup failed ' + r.status);
      const j = await r.json();
      const ms = Math.round(performance.now() - t0);
      if (k === 'operator' || k === 'wallet') {
        const score = j.risk_score ?? 0;
        setVerdict({
          addr: j.wallet || q,
          label: j.tags?.[0] || j.risk_label || (j.known ? 'tracked operator' : 'unknown operator'),
          risk: j.risk_level === 'CRITICAL' ? 'CRIT' : j.risk_level === 'HIGH' ? 'HIGH' : j.risk_level === 'MEDIUM' ? 'MED' : riskBucket(score),
          score,
          rugs: j.confirmed_rugs ?? 0,
          tokens: j.total_tokens ?? 0,
          elapsedMs: ms,
        });
      } else {
        const score = j.risk_score ?? j.risk ?? 0;
        setVerdict({
          addr: j.mint || q,
          label: j.symbol || j.name || 'token',
          risk: riskBucket(score),
          score,
          rugs: j.dev_confirmed_rugs ?? 0,
          tokens: j.dev_total_tokens ?? 1,
          elapsedMs: ms,
        });
      }
    } catch (e) {
      setError('Address not found or API unreachable. Try another sample.');
      setVerdict(null);
    } finally {
      setLoading(false);
    }
  };

  const runSample = (s) => { setAddr(s.addr); setError(null); lookup(s.addr, kind); };
  const clearVerdict = () => { setVerdict(null); setError(null); };

  return (
    <section className="hero">
      <div className="container">
        <span className="hero-eyebrow"><span className="dot"></span>210h continuous · 28,404 scans · 86.7% accuracy · zero FP at CRITICAL</span>
        <h1>
          RugCheck tells you a fire is burning.<br />
          SolSentry tells you <span className="brand-word">who lit it</span>.
        </h1>
        <p className="hero-sub">
          Real-time operator intelligence for Solana. Track serial rug deployers, bot clusters,
          and malicious launches before your users lose funds. What Pyth is to prices,
          SolSentry is to operator risk.
        </p>

        <div className="hero-ctas">
          <a href="/dashboard" className="btn-primary">Open the Dashboard →</a>
          <a href="/explorer" className="btn-ghost">Try the Explorer</a>
          <button className="btn-code" onClick={() => navigator.clipboard?.writeText('npm i @solsentry/mcp')}>
            <span className="pfx">$</span>
            <span className="cmd">npm i @solsentry/mcp</span>
            <span className="copy-btn">copy</span>
          </button>
        </div>

        <div className="hero-lookup" role="region" aria-label="Operator lookup">
          <div className="lookup-tabs">
            {[
              { id: 'wallet', label: 'Operator / wallet' },
              { id: 'token', label: 'Token mint' },
              { id: 'graph', label: 'Graph explorer' },
            ].map(t => (
              <button key={t.id}
                onClick={() => setKind(t.id)}
                className={'lookup-tab ' + (kind === t.id ? 'active' : '')}>
                {t.label}
              </button>
            ))}
          </div>
          <div className="lookup-input-wrap">
            <input
              className="lookup-input"
              value={addr}
              onChange={e => { setAddr(e.target.value); clearVerdict(); }}
              onKeyDown={e => { if (e.key === 'Enter') lookup(); }}
              placeholder={kind === 'token' ? 'Paste a Solana token mint…' : kind === 'graph' ? 'Root wallet for graph…' : 'Paste any Solana wallet…'}
              spellCheck={false} autoComplete="off" />
            <button className="lookup-btn" onClick={() => lookup()} disabled={loading}>
              {loading ? '…' : (kind === 'graph' ? 'Explore' : 'Check')}
            </button>
          </div>
          {error && (
            <div style={{ marginTop: 10, fontSize: 12, color: 'var(--status-critical, #FF4444)', fontFamily: 'var(--font-mono, monospace)' }}>
              {error}
            </div>
          )}
          <div className="lookup-examples">
            <span className="lookup-examples-label">Try:</span>
            {samples.map(s => (
              <button key={s.addr} className="lookup-chip" onClick={() => runSample(s)}>
                <span className={'ch-risk-' + s.risk}>●</span>
                <span className="ch-addr">{s.label}</span>
              </button>
            ))}
          </div>

          {verdict && (
            <div className={'result-panel ' + (verdict.risk === 'CRIT' ? 'crit' : '')}>
              <div className="result-head">
                <span className={'risk-pill risk-' + verdict.risk.charAt(0)}>
                  {verdict.risk === 'CRIT' ? 'CRITICAL' : verdict.risk}
                </span>
                <span className="addr-mono">{short(verdict.addr)}</span>
                <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--fg-3)', fontFamily: 'var(--font-mono)' }}>
                  resolved in {verdict.elapsedMs ?? 187}ms
                </span>
              </div>
              <div className="result-stats">
                <div className="rs"><div className="rs-label">Risk score</div><div className="rs-value tnum" style={{ color: verdict.risk === 'CRIT' ? 'var(--crit)' : verdict.risk === 'SAFE' ? 'var(--safe)' : 'var(--fg-1)' }}>{verdict.score}<span style={{ fontSize: 14, color: 'var(--fg-4)' }}>/100</span></div></div>
                <div className="rs"><div className="rs-label">Confirmed rugs</div><div className="rs-value tnum" style={{ color: verdict.rugs > 0 ? 'var(--crit)' : 'var(--fg-1)' }}>{verdict.rugs}</div></div>
                <div className="rs"><div className="rs-label">Tokens deployed</div><div className="rs-value tnum">{verdict.tokens}</div></div>
                <div className="rs"><div className="rs-label">Rug rate</div><div className="rs-value tnum">{verdict.tokens > 0 ? ((verdict.rugs / verdict.tokens) * 100).toFixed(1) + '%' : '—'}</div></div>
              </div>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

/* ── METRICS ── */
function useStats() {
  const [s, setS] = useState(null);
  const [live, setLive] = useState(false);
  useEffect(() => {
    let dead = false;
    const fallback = { total_predictions: 28289, accuracy_pct: 86.7, total_operators: 1639, confirmed_rugs: 5513, bot_clusters: 2451, serial_ruggers: 463, runtime_hours: 210 };
    const tick = async () => {
      try {
        const r = await fetch(API + '/stats', { cache: 'no-store' });
        if (!r.ok) throw 0;
        const j = await r.json();
        if (!dead) { setS(j); setLive(true); }
      } catch {
        if (!dead) { setS(fallback); setLive(false); }
      }
    };
    tick();
    const id = setInterval(tick, 30000);
    return () => { dead = true; clearInterval(id); };
  }, []);
  return { stats: s, live };
}

function Metric({ label, value, delta, flashKey }) {
  const [flash, setFlash] = useState(false);
  const prev = useRef(value);
  useEffect(() => {
    if (prev.current !== value) {
      setFlash(true);
      const t = setTimeout(() => setFlash(false), 600);
      prev.current = value;
      return () => clearTimeout(t);
    }
  }, [value]);
  const bars = useMemo(() => {
    const out = [];
    for (let i = 0; i < 16; i++) {
      const v = Math.sin(i * 0.6 + (flashKey || 0)) * 0.3 + 0.55 + (i * 37 % 11) / 50;
      out.push(Math.max(3, v * 18));
    }
    return out;
  }, [flashKey]);
  return (
    <div className={'metric ' + (flash ? 'flash' : '')}>
      <div className="metric-label">{label}</div>
      <div className="metric-value tnum">{value}</div>
      <div className="metric-sub">
        <span className="spark"><>{bars.map((h, i) => <i key={i} style={{ height: h + 'px' }} />)}</></span>
        <span>{delta}</span>
      </div>
    </div>
  );
}
