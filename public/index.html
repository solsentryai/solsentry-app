<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SolSentry — Operator Intelligence for Solana</title>
<meta name="description" content="What Pyth is to prices, SolSentry is to operator risk. Identify serial ruggers before the rug."/>
<meta property="og:title" content="SolSentry — Operator Intelligence for Solana"/>
<meta property="og:description" content="Token #62. T+4 seconds. 19 minutes of lead time. Risk 100/100."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --border:#1e1e2e;
  --orange:#ff6b00;
  --teal:#00c9a7;
  --purple:#a855f7;
  --yellow:#f59e0b;
  --text:#e8e8f0;
  --muted:#6b6b8a;
  --topbar-h:48px;
  --bar-h:52px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:rgba(10,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 16px;gap:12px}
.topbar-logo{font-weight:700;font-size:15px;letter-spacing:-.3px;color:var(--text)}
.topbar-logo span{color:var(--orange)}
.topbar-spacer{flex:1}
.topbar-link{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);padding:4px 10px;border-radius:6px;transition:color .15s,background .15s}
.topbar-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lang-btn{font-size:11px;font-weight:600;color:var(--muted);padding:4px 8px;border-radius:5px;border:1px solid var(--border);transition:all .15s}
.lang-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.lang-btn.active{color:var(--text);border-color:var(--orange);background:rgba(255,107,0,.08)}

/* MODE BAR */
.mode-bar{position:fixed;bottom:0;left:0;right:0;height:var(--bar-h);background:rgba(10,10,15,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:100;display:flex;align-items:center;justify-content:center;gap:8px}
.mode-btn{padding:8px 28px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;border:1px solid transparent}
.mode-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.mode-btn.active-easy{background:rgba(255,107,0,.15);color:var(--orange);border-color:rgba(255,107,0,.3)}
.mode-btn.active-pro{background:rgba(0,201,167,.12);color:var(--teal);border-color:rgba(0,201,167,.25)}
.mode-btn.active-dev{background:rgba(168,85,247,.12);color:var(--purple);border-color:rgba(168,85,247,.25)}

/* PAGE */
.page{padding-top:calc(var(--topbar-h) + 1px);padding-bottom:calc(var(--bar-h) + 1px);min-height:100vh}
.container{max-width:760px;margin:0 auto;padding:32px 16px}
.container-wide{max-width:1080px;margin:0 auto;padding:32px 16px}

/* HERO */
.hero{padding:44px 16px 28px;text-align:center;max-width:680px;margin:0 auto}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:12px}
.hero-h1{font-size:clamp(26px,5vw,46px);font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-bottom:16px}
.hero-h1 .hl{color:var(--orange)}
.hero-sub{font-size:15px;color:var(--muted);max-width:520px;margin:0 auto 28px}

/* SEARCH */
.search-wrap{position:relative;max-width:540px;margin:0 auto}
.search-input{width:100%;padding:13px 100px 13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);outline:none;transition:border .15s}
.search-input:focus{border-color:var(--orange)}
.search-input::placeholder{color:var(--muted)}
.search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--orange);color:#000;font-weight:600;font-size:13px;padding:7px 14px;border-radius:7px;transition:opacity .15s;white-space:nowrap}
.search-btn:hover{opacity:.85}
.search-btn:disabled{opacity:.5;cursor:not-allowed}

/* RESULT CARD */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:20px;max-width:540px;margin-left:auto;margin-right:auto}
.result-card.critical{border-color:rgba(255,107,0,.4)}
.result-card.high{border-color:rgba(245,158,11,.35)}
.result-card.low{border-color:rgba(0,201,167,.3)}
.rc-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.rc-addr{font-family:monospace;font-size:12px;color:var(--muted)}
.risk-badge{font-size:11px;font-weight:700;letter-spacing:.05em;padding:3px 10px;border-radius:20px}
.risk-badge.CRITICAL{background:rgba(255,107,0,.18);color:var(--orange);border:1px solid rgba(255,107,0,.3)}
.risk-badge.HIGH{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.risk-badge.MEDIUM{background:rgba(255,255,255,.07);color:#d0d0e0;border:1px solid var(--border)}
.risk-badge.LOW{background:rgba(0,201,167,.12);color:var(--teal);border:1px solid rgba(0,201,167,.2)}
.rc-body{padding:16px}
.rc-score-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rc-score{font-size:38px;font-weight:800;line-height:1}
.rc-score.critical{color:var(--orange)}
.rc-score.high{color:var(--yellow)}
.rc-score.low{color:var(--teal)}
.rc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.rc-stat{background:rgba(255,255,255,.03);border-radius:8px;padding:10px 12px}
.rc-stat-val{font-size:18px;font-weight:700}
.rc-stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.rc-explain{font-size:13px;color:#c8c8de;line-height:1.6;background:rgba(255,255,255,.02);border-radius:8px;padding:12px;margin-bottom:12px}
.rc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.02em}
.rc-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{font-size:12px;padding:7px 14px;border-radius:7px;border:1px solid var(--border);color:var(--muted);transition:all .15s}
.btn-sm:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-follow{background:rgba(0,201,167,.1);color:var(--teal);border-color:rgba(0,201,167,.25)}
.btn-follow:hover{background:rgba(0,201,167,.2)}
.btn-follow.following{background:rgba(255,107,0,.08);color:var(--orange);border-color:rgba(255,107,0,.2)}
.btn-follow.following:hover{background:rgba(239,68,68,.1);color:#ef4444;border-color:rgba(239,68,68,.2)}
.error-card{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:16px;margin-top:20px;max-width:540px;margin-left:auto;margin-right:auto;font-size:13px;color:#f87171}

/* HOW IT WORKS */
.how-section{max-width:540px;margin:40px auto 0;padding:0 16px}
.how-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;text-align:center}
.how-steps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.how-step{text-align:center;padding:14px 10px}
.how-step-icon{font-size:22px;margin-bottom:8px}
.how-step-title{font-size:13px;font-weight:600;margin-bottom:4px}
.how-step-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* CASE STUDY */
.case-card{max-width:540px;margin:28px auto 0;background:rgba(255,107,0,.05);border:1px solid rgba(255,107,0,.2);border-radius:12px;padding:18px 20px}
.case-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.case-title{font-size:16px;font-weight:700;margin-bottom:8px}
.case-body{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.case-link{font-size:13px;color:var(--orange)}
.case-link:hover{text-decoration:underline}

/* PRO */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
@media(min-width:600px){.stats-bar{grid-template-columns:repeat(6,1fr)}}
.stat-tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center}
.stat-tile-val{font-size:20px;font-weight:800;line-height:1.1}
.stat-tile-val.orange{color:var(--orange)}
.stat-tile-val.teal{color:var(--teal)}
.stat-tile-val.purple{color:var(--purple)}
.stat-tile-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:8px 16px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.ops-table{width:100%;border-collapse:collapse}
.ops-table th{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.ops-table td{padding:10px;border-bottom:1px solid rgba(30,30,46,.5);vertical-align:middle;font-size:13px}
.ops-table tr:hover td{background:rgba(255,255,255,.02)}
.mono-sm{font-family:monospace;font-size:11px;color:var(--muted)}
.badge-critical{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(255,107,0,.15);color:var(--orange);border:1px solid rgba(255,107,0,.2)}
.badge-high{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.badge-medium{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.rug-pct{font-weight:600}
.rug-pct.hot{color:var(--orange)}
.rug-pct.warm{color:var(--yellow)}

/* LOOKUP / WATCHLIST */
.lookup-form{display:flex;gap:8px;margin-bottom:20px}
.lookup-input{flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none;transition:border .15s}
.lookup-input:focus{border-color:var(--teal)}
.lookup-input::placeholder{color:var(--muted)}
.btn-primary{background:var(--orange);color:#000;font-weight:600;font-size:13px;padding:10px 18px;border-radius:8px;transition:opacity .15s;border:none}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-primary.teal{background:var(--teal)}
.wl-empty{text-align:center;padding:48px 16px;color:var(--muted)}
.wl-empty .icon{font-size:32px;margin-bottom:12px}
.wl-grid{display:grid;gap:10px}
.wl-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;flex-wrap:wrap}
.wl-item.critical{border-color:rgba(255,107,0,.3)}
.wl-item.high{border-color:rgba(245,158,11,.2)}
.wl-addr{font-family:monospace;font-size:12px;color:var(--muted);flex:1;min-width:100px}
.wl-rugs{font-size:13px;font-weight:600;color:var(--orange)}
.btn-remove{font-size:11px;color:var(--muted);padding:4px 8px;border-radius:5px;border:1px solid var(--border);transition:all .15s}
.btn-remove:hover{color:#ef4444;border-color:rgba(239,68,68,.3)}

/* DEV */
.dev-section{margin-bottom:32px}
.dev-section-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.dev-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.code-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.code-tab{font-size:11px;font-weight:600;padding:7px 14px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;text-transform:uppercase;letter-spacing:.04em}
.code-tab:hover{color:var(--text)}
.code-tab.active{color:var(--purple);border-bottom-color:var(--purple)}
pre.code-block{background:rgba(0,0,0,.45);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:16px;font-size:12px;font-family:'SF Mono',Consolas,monospace;color:#c8c8de;overflow-x:auto;line-height:1.65;margin:0}
.endpoint-list{display:grid;gap:8px}
.endpoint-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.method{font-family:monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(0,201,167,.12);color:var(--teal);border:1px solid rgba(0,201,167,.2);flex-shrink:0;margin-top:2px}
.ep-path{font-family:monospace;font-size:12px;color:var(--text);margin-bottom:3px}
.ep-desc{font-size:12px;color:var(--muted)}
.mcp-list{display:grid;gap:6px}
.mcp-item{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px}
.mcp-name{font-family:monospace;color:var(--purple);min-width:180px;flex-shrink:0}
.mcp-desc{color:var(--muted)}
.pricing-table{width:100%;border-collapse:collapse;font-size:13px}
.pricing-table th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border)}
.pricing-table td{padding:10px 12px;border-bottom:1px solid rgba(30,30,46,.5)}
.pricing-table tr:last-child td{border-bottom:none}
.price-val{font-weight:700;color:var(--teal)}

/* MISC */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.12);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .how-steps{grid-template-columns:1fr}
  .rc-stats{grid-template-columns:1fr 1fr}
  .ops-table th:nth-child(4),.ops-table td:nth-child(4),.ops-table th:nth-child(5),.ops-table td:nth-child(5){display:none}
  .mode-btn{padding:8px 16px}
}
</style>
</head>

<script type="text/babel">
const { useState, useEffect } = React;

const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8081/v1'
  : 'https://api.solsentry.app/v1';

const WL_KEY  = 'solsentry_watchlist';
const MODE_KEY = 'ss_mode';
const LANG_KEY = 'ss_lang';

/* ── i18n ── */
const T = {

/* ── helpers ── */
const getWL = () => { try { return JSON.parse(localStorage.getItem(WL_KEY)||'[]'); } catch { return []; } };
const saveWL = (a) => localStorage.setItem(WL_KEY, JSON.stringify(a));
const fmtAddr = (a) => a ? `${a.slice(0,6)}…${a.slice(-4)}` : '?';
const fmtNum  = (n) => n >= 1000 ? `${(n/1000).toFixed(1)}K` : String(n||0);
const fmtPct  = (n) => `${(n||0).toFixed(1)}%`;
const fmtRuntime = (s) => { const h=Math.floor((s||0)/3600); return h>=24?`${Math.floor(h/24)}d ${h%24}h`:`${h}h`; };

const tagStyle = (tag) => {
  const t = (tag||'').toLowerCase();
  if (t.includes('serial')||t.includes('critical')) return {background:'rgba(255,107,0,.15)',color:'var(--orange)',border:'1px solid rgba(255,107,0,.25)'};
  if (t.includes('fast')||t.includes('drain'))      return {background:'rgba(245,158,11,.12)',color:'var(--yellow)',border:'1px solid rgba(245,158,11,.2)'};
  if (t.includes('bundle')||t.includes('sniper'))   return {background:'rgba(168,85,247,.12)',color:'var(--purple)',border:'1px solid rgba(168,85,247,.2)'};
  if (t.includes('kol')||t.includes('smart'))       return {background:'rgba(0,201,167,.1)',color:'var(--teal)',border:'1px solid rgba(0,201,167,.18)'};
  return {background:'rgba(255,255,255,.05)',color:'var(--muted)',border:'1px solid var(--border)'};
};

/* ── FollowButton ── */
function FollowButton({ address, t }) {
  const [on, setOn] = useState(() => getWL().includes(address));
  const [hov, setHov] = useState(false);
  const toggle = () => {
    const wl = getWL();
    const next = wl.includes(address) ? wl.filter(a=>a!==address) : [...wl, address];
    saveWL(next);
    setOn(!wl.includes(address));
  };
  return (
    <button
      className={`btn-sm btn-follow${on?' following':''}`}
      onClick={toggle}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
    >{on?(hov?t.unfollow:t.following):t.follow}</button>
  );
}

/* ── ResultCard ── */
function ResultCard({ data, t }) {
  const [copied, setCopied] = useState(false);
  const addr  = data.operator_address || data.address || '';
  const score = data.risk_score   || 0;
  const level = data.risk_level   || 'UNKNOWN';
  const rugs  = data.confirmed_rugs || 0;
  const toks  = data.total_tokens  || 0;
  const rate  = data.rug_rate_pct  || 0;
  const tags  = data.tags || data.risk_labels || [];
  const lc    = level==='CRITICAL'?'critical':level==='HIGH'?'high':'low';
  const sc    = score>=80?'critical':score>=50?'high':'low';

  let explain;
  if (score>=80||level==='CRITICAL') explain = t.explain_critical(fmtNum(rugs), fmtNum(toks), rate.toFixed(1));
  else if (score>=50||level==='HIGH') explain = t.explain_high(fmtNum(rugs), fmtNum(toks));
  else explain = t.explain_low();

  const copy = () => navigator.clipboard.writeText(addr).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),1500); });

  return (
    <div className={`result-card ${lc}`}>
      <div className="rc-header">
        <span className="rc-addr">{fmtAddr(addr)}</span>
        <span className={`risk-badge ${level}`}>{level}</span>
      </div>
      <div className="rc-body">
        <div className="rc-score-row">
          <div className={`rc-score ${sc}`}>{score}</div>
          <div><div className="rc-stat-lbl" style={{fontSize:11}}>{t.score_lbl}</div></div>
        </div>
        <div className="rc-stats">
          <div className="rc-stat">
            <div className="rc-stat-val" style={{color:rugs>0?'var(--orange)':'var(--teal)'}}>{fmtNum(rugs)}</div>
            <div className="rc-stat-lbl">{t.rugs_lbl}</div>
          </div>
          <div className="rc-stat">
            <div className="rc-stat-val">{fmtNum(toks)}</div>
            <div className="rc-stat-lbl">{t.tok_lbl}</div>
          </div>
          <div className="rc-stat">
            <div className="rc-stat-val" style={{color:rate>70?'var(--orange)':rate>30?'var(--yellow)':'var(--teal)'}}>{fmtPct(rate)}</div>
            <div className="rc-stat-lbl">{t.rate_lbl}</div>
          </div>
        </div>
        <div className="rc-explain">{explain}</div>
        {tags.length>0&&(
          <div className="rc-tags">
            {tags.slice(0,5).map(tag=>(
              <span key={tag} className="tag" style={tagStyle(tag)}>{tag}</span>
            ))}
            {tags.length>5&&<span className="tag" style={{background:'rgba(255,255,255,.04)',color:'var(--muted)',border:'1px solid var(--border)'}}>+{tags.length-5}</span>}
          </div>
        )}
        <div className="rc-actions">
          <FollowButton address={addr} t={t}/>
          <button className="btn-sm" onClick={copy}>{copied?t.copied:t.copy}</button>
        </div>
      </div>
    </div>
  );
}

/* ── FunMode ── */
function FunMode({ t, stats }) {
  const [q, setQ] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [err, setErr] = useState(null);

  const lookup = async () => {
    if (!q.trim()) return;
    setLoading(true); setErr(null); setResult(null);
    try {
      const r = await fetch(`${API}/operator/${q.trim()}`);
      if (!r.ok) throw new Error();
      const d = await r.json();
      if (!d.known) throw new Error();
      setResult(d);
    } catch { setErr(t.err); }
    finally { setLoading(false); }
  };

  const caseRugs = stats ? fmtNum(stats.confirmed_rugs||6899) : '6.9K';

  return (
    <div className="page">
      <div className="hero">
        <p className="hero-eyebrow">{t.eyebrow}</p>
        <h1 className="hero-h1">
          {t.h1a}<span className="hl">{t.h1b}</span>{t.h1c}<br/>
          <span style={{fontFamily:'monospace',fontSize:'0.78em',letterSpacing:'-.01em'}}>{t.h1d}</span>
        </h1>
        <p className="hero-sub">{t.sub}</p>
        <div className="search-wrap">
          <input
            className="search-input"
            placeholder={t.placeholder}
            value={q}
            onChange={e=>setQ(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&lookup()}
          />
          <button className="search-btn" onClick={lookup} disabled={loading||!q.trim()}>
            {loading?<span className="spinner"/>:t.check}
          </button>
        </div>
        {result&&<ResultCard data={result} t={t}/>}
        {err&&<div className="error-card">{err}</div>}
      </div>
      <div className="how-section">
        <div className="how-title">{t.how_title}</div>
        <div className="how-steps">
          {[['📋',t.s1t,t.s1d],['⚡',t.s2t,t.s2d],['🛡️',t.s3t,t.s3d]].map(([ic,ti,de])=>(
            <div key={ti} className="how-step">
              <div className="how-step-icon">{ic}</div>
              <div className="how-step-title">{ti}</div>
              <div className="how-step-desc">{de}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="case-card">
        <div className="case-eyebrow">{t.case_eyebrow}</div>
        <div className="case-title">{t.case_fn(caseRugs)}</div>
        <div className="case-body">{t.case_body}</div>
        <a href="/case-studies/4kxscute" className="case-link">{t.case_link}</a>
      </div>
    </div>
  );
}

/* ── ProMode ── */
function ProMode({ t }) {
  const [stats,   setStats]   = useState(null);
  const [ops,     setOps]     = useState([]);
  const [tab,     setTab]     = useState('operators');
  const [wl,      setWl]      = useState(getWL);
  const [wlData,  setWlData]  = useState({});
  const [lkAddr,  setLkAddr]  = useState('');
  const [lkRes,   setLkRes]   = useState(null);
  const [lkLoad,  setLkLoad]  = useState(false);
  const [lkErr,   setLkErr]   = useState(null);

  useEffect(()=>{
    const load = async()=>{
      try {
        const [sr, or] = await Promise.all([
          fetch(`${API}/stats`).then(r=>r.json()),
          fetch(`${API}/operators/top?limit=20`).then(r=>r.json()),
        ]);
        setStats(sr);
        setOps(Array.isArray(or)?or:(or.operators||[]));
      } catch {}
    };
    load();
    const iv = setInterval(load, 30000);
    return ()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if (tab!=='watchlist') return;
    const cur = getWL(); setWl(cur);
    const fetchAll = async()=>{
      const res={};
      await Promise.all(cur.map(async addr=>{
        try { const r=await fetch(`${API}/operator/${addr}`); if(r.ok) res[addr]=await r.json(); } catch {}
      }));
      setWlData(res);
    };
    fetchAll();
  },[tab]);

  const removeWl = (addr) => { const n=getWL().filter(a=>a!==addr); saveWL(n); setWl(n); };
  const clearWl  = () => { saveWL([]); setWl([]); };

  const doLookup = async()=>{
    if (!lkAddr.trim()) return;
    setLkLoad(true); setLkErr(null); setLkRes(null);
    try {
      const r=await fetch(`${API}/operator/${lkAddr.trim()}`);
      if (!r.ok) throw new Error();
      const d=await r.json();
      if (!d.known) throw new Error();
      setLkRes(d);
    } catch { setLkErr(t.err); }
    finally { setLkLoad(false); }
  };

  return (
    <div className="page">
      <div className="container-wide">
        {stats&&(
          <div className="stats-bar">
            {[
              [fmtNum(stats.total_predictions), t.st_scans,  'orange'],
              [fmtPct(stats.accuracy_pct),       t.st_acc,   'teal'],
              [fmtNum(stats.confirmed_rugs),      t.st_rugs,  'orange'],
              [fmtNum(stats.total_operators),     t.st_ops,   ''],
              [fmtNum(stats.serial_ruggers),      t.st_serial,'purple'],
              [fmtRuntime(stats.runtime_seconds), t.st_up,    'teal'],
            ].map(([v,l,c])=>(
              <div key={l} className="stat-tile">
                <div className={`stat-tile-val${c?' '+c:''}`}>{v}</div>
                <div className="stat-tile-lbl">{l}</div>
              </div>
            ))}
          </div>
        )}
        <div className="tabs">
          {['operators','watchlist','lookup'].map(tid=>(
            <button key={tid} className={`tab-btn${tab===tid?' active':''}`} onClick={()=>setTab(tid)}>
              {tid==='operators'?t.t_ops:tid==='watchlist'?`${t.t_wl}${wl.length>0?` (${wl.length})`:''}`  :t.t_lk}
            </button>
          ))}
        </div>

        {tab==='operators'&&(
          <div style={{overflowX:'auto'}}>
            <table className="ops-table">
              <thead><tr>
                <th>{t.col_addr}</th><th>{t.col_level}</th><th>{t.col_rugs}</th><th>{t.col_tok}</th><th>{t.col_rate}</th>
              </tr></thead>
              <tbody>
                {ops.slice(0,20).map((op,i)=>{
                  const addr=op.operator_address||op.address||'';
                  const lv=op.risk_level||'MEDIUM';
                  const r=op.confirmed_rugs||0;
                  const to=op.total_tokens||0;
                  const rt=op.rug_rate_pct||0;
                  return (
                    <tr key={i}>
                      <td><span className="mono-sm">{fmtAddr(addr)}</span></td>
                      <td><span className={lv==='CRITICAL'?'badge-critical':lv==='HIGH'?'badge-high':'badge-medium'}>{lv}</span></td>
                      <td style={{color:'var(--orange)',fontWeight:600}}>{fmtNum(r)}</td>
                      <td>{fmtNum(to)}</td>
                      <td><span className={`rug-pct${rt>70?' hot':rt>30?' warm':''}`}>{fmtPct(rt)}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {tab==='watchlist'&&(
          wl.length===0?(
            <div className="wl-empty">
              <div className="icon">👁️</div>
              <div style={{fontWeight:600,marginBottom:6}}>{t.wl_empty_h}</div>
              <div style={{fontSize:13}}>{t.wl_empty_d}</div>
            </div>
          ):(
            <>
              <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
                <button className="btn-sm" onClick={clearWl}>{t.wl_clear}</button>
              </div>
              <div className="wl-grid">
                {wl.map(addr=>{
                  const d=wlData[addr];
                  const lv=(d?.risk_level||'').toLowerCase();
                  return (
                    <div key={addr} className={`wl-item${lv?' '+lv:''}`}>
                      <span className="wl-addr">{fmtAddr(addr)}</span>
                      {d&&<span className={d.risk_level==='CRITICAL'?'badge-critical':d.risk_level==='HIGH'?'badge-high':'badge-medium'}>{d.risk_level}</span>}
                      {d&&<span className="wl-rugs">{fmtNum(d.confirmed_rugs||0)} rugs</span>}
                      <button className="btn-sm btn-remove" onClick={()=>removeWl(addr)}>{t.wl_remove}</button>
                    </div>
                  );
                })}
              </div>
            </>
          )
        )}

        {tab==='lookup'&&(
          <div>
            <div className="lookup-form">
              <input
                className="lookup-input"
                placeholder={t.lk_ph}
                value={lkAddr}
                onChange={e=>setLkAddr(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&doLookup()}
              />
              <button className="btn-primary teal" onClick={doLookup} disabled={lkLoad||!lkAddr.trim()}>
                {lkLoad?<span className="spinner"/>:t.lk_btn}
              </button>
            </div>
            {lkRes&&<ResultCard data={lkRes} t={t}/>}
            {lkErr&&<div className="error-card">{lkErr}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [mode, setMode] = useState(() => localStorage.getItem(MODE_KEY)||'easy');
  const [lang, setLang] = useState(() => localStorage.getItem(LANG_KEY)||'pt');
  const [stats, setStats] = useState(null);
  const t = T[lang]||T.pt;

  useEffect(()=>{ localStorage.setItem(MODE_KEY,mode); },[mode]);
  useEffect(()=>{ localStorage.setItem(LANG_KEY,lang); },[lang]);

  useEffect(()=>{
    fetch(`${API}/stats`).then(r=>r.json()).then(setStats).catch(()=>{});
  },[]);

  const modes=[
    {id:'easy',label:t.easy,ac:'active-easy'},
    {id:'pro', label:t.pro, ac:'active-pro'},
    {id:'dev', label:t.dev, ac:'active-dev'},
  ];

  return (
    <>
      <nav className="topbar">
        <span className="topbar-logo"><span>Sol</span>Sentry</span>
        <div className="topbar-spacer"/>
        <a href="https://ops.solsentry.app" className="topbar-link">{t.dashboard}</a>
        <a href="https://api.solsentry.app/health" target="_blank" rel="noopener" className="topbar-link">
          <span className="dot-live" aria-hidden="true"/>
          {t.live}
        </a>
        <button className={`lang-btn${lang==='pt'?' active':''}`} onClick={()=>setLang('pt')}>PT</button>
        <button className={`lang-btn${lang==='en'?' active':''}`} onClick={()=>setLang('en')}>EN</button>
      </nav>

      {mode==='easy'&&<FunMode t={t} stats={stats}/>}
      {mode==='pro' &&<ProMode t={t}/>}
      {mode==='dev' &&<DevMode t={t} lang={lang}/>}

      <nav className="mode-bar">
        {modes.map(m=>(
          <button key={m.id} className={`mode-btn${mode===m.id?' '+m.ac:''}`} onClick={()=>setMode(m.id)}>
            {m.label}
          </button>
        ))}
      </nav>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
