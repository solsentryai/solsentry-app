<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SolSentry — É seguro?</title>
<meta name="description" content="SolSentry: descubra se uma carteira ou token Solana é seguro em segundos.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
/* ============================================================
   SolSentry — paleta v4 (warm âmbar). Dark-warm flat.
   Filosofia: luz que revela. NÃO neon, NÃO cripto-bro.
   Source: internal/marketing/brand/sds/v4/colors_and_type.css
   ============================================================ */
:root {
  /* legacy aliases (mantém compat com markup existente) */
  --orange: #C17D0E; --teal: #2A7A7A; --purple: #8A5A00;
  --red:    #D94B2B; --yellow: #E0A82E; --green: #4A9A6E;
  --bg:     #100E0A; --card:   #1E1B16; --border: #2A251E;
  --white:  #F2EDE4; --muted:  #968D7E;

  /* v4 canonical tokens (use estes em código novo) */
  --amber-core:      #C17D0E;
  --amber-core-400:  #D9962E;
  --amber-burnt:     #8A5A00;
  --teal-precise:    #2A7A7A;
  --status-critical: #D94B2B;
  --status-warning:  #E0A82E;
  --status-safe:     #4A9A6E;
  --cream:           #F2EDE4;
  --fg-2:            #C9C0B0;
  --fg-3:            #968D7E;
  --bg-elev-1:       #16130E;
  --surface:         #1E1B16;
  --surface-2:       #26221C;

  --font-display: 'Syne', ui-sans-serif, system-ui, sans-serif;
  --font-body:    'DM Sans', 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
html, body { background: var(--bg); color: var(--cream); font-family: var(--font-body); min-height: 100vh; }
body { background:
  radial-gradient(ellipse 900px 600px at 20% 10%, rgba(193,125,14,0.10), transparent 60%),
  radial-gradient(ellipse 700px 500px at 80% 90%, rgba(138,90,0,0.06), transparent 60%),
  #100E0A;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #16130E; }
::-webkit-scrollbar-thumb { background: #2A251E; border-radius: 4px; }
:focus-visible { outline: 2px solid var(--amber-core); outline-offset: 2px; border-radius: 4px; }
button { font-family: inherit; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
}

@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scale-in { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
.fade-up { animation: fade-up 400ms ease-out; }
.scale-in { animation: scale-in 500ms cubic-bezier(0.34, 1.56, 0.64, 1); }

/* Hub navigation (top-right) */
.hub-nav {
  position: fixed; top: 14px; right: 14px; z-index: 200;
  display: flex; gap: 6px; align-items: center;
}
.hub-link {
  background: rgba(26,26,26,0.92); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px; color: var(--muted);
  font-size: 11px; text-decoration: none; font-family: var(--font-body);
  font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.15s ease; display: flex; align-items: center; gap: 6px;
  backdrop-filter: blur(10px);
}
.hub-link:hover { color: var(--orange); border-color: rgba(193,125,14,0.4); }
.hub-link.hub-live {
  background: rgba(74,154,110,0.08); color: var(--teal); border-color: rgba(74,154,110,0.3);
}
.hub-link.hub-live:hover { background: rgba(74,154,110,0.14); color: var(--green); }
.hub-live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green); animation: pulse 2s infinite;
}

/* Mode switcher (bottom-left) */
.mode-switcher {
  position: fixed; bottom: 20px; left: 20px; z-index: 100;
  background: rgba(26,26,26,0.95); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 10px; padding: 6px;
  display: flex; flex-direction: column; gap: 2px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.mode-btn {
  padding: 8px 14px; border-radius: 6px; background: transparent;
  border: none; color: var(--muted); cursor: pointer;
  font-family: var(--font-body); font-weight: 500; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s ease; min-width: 100px;
}
.mode-btn:hover { background: rgba(255,255,255,0.04); color: var(--white); }
.mode-btn.active { background: var(--orange); color: var(--white); }
.mode-btn.active.watch-active { background: var(--teal); }
.mode-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.mode-btn.active .dot { opacity: 1; animation: pulse 1.8s infinite; }
.mode-hint { font-size: 10px; color: var(--muted); padding: 4px 14px 2px; letter-spacing: 0.1em; text-transform: uppercase; }

/* Label tags */
.label-tag {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 3px;
  border: 1px solid; white-space: nowrap; cursor: default;
  font-family: var(--font-body);
}

/* Follow button */
.follow-btn {
  padding: 7px 16px; border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; border: 1px solid;
  transition: all 0.15s ease; font-family: var(--font-body);
  background: rgba(42,122,122,0.1); color: var(--teal); border-color: rgba(42,122,122,0.35);
}
.follow-btn:hover:not(.following) { background: rgba(42,122,122,0.2); transform: translateY(-1px); }
.follow-btn.following { background: rgba(255,255,255,0.04); color: var(--muted); border-color: var(--border); }
.follow-btn.following:hover { background: rgba(217,75,43,0.1); color: var(--red); border-color: rgba(217,75,43,0.3); }
.follow-btn.follow-sm { padding: 4px 10px; font-size: 10px; border-radius: 5px; }

/* FUN MODE */
.fun-shell {
  max-width: 640px; margin: 0 auto;
  padding: 40px 20px 120px; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
.fun-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; margin-top: 40px; }
.fun-logo-text { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: var(--orange); letter-spacing: -0.02em; text-transform: uppercase; }
.fun-headline {
  font-family: var(--font-display); font-weight: 700; font-size: 32px;
  text-align: center; line-height: 1.15; margin-bottom: 10px;
  letter-spacing: -0.02em;
}
.fun-sub {
  font-size: 15px; color: var(--muted); text-align: center;
  margin-bottom: 32px; max-width: 460px; line-height: 1.5;
}
.fun-input-wrap {
  width: 100%; display: flex; gap: 10px; margin-bottom: 12px;
}
.fun-input {
  flex: 1; background: var(--card); border: 2px solid var(--border);
  border-radius: 12px; padding: 18px 20px;
  color: var(--white); font-family: var(--font-mono); font-size: 14px;
  outline: none; transition: all 0.2s ease;
}
.fun-input:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(193,125,14,0.1); }
.fun-input::placeholder { color: var(--muted); }
.fun-btn {
  background: var(--orange); color: var(--white); border: none;
  border-radius: 12px; padding: 0 28px; cursor: pointer;
  font-family: var(--font-body); font-weight: 700; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.08em;
  transition: all 0.15s ease; white-space: nowrap;
}
.fun-btn:hover { background: var(--amber-core-400, #D9962E); transform: translateY(-1px); }
.fun-btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; transform: none; }
.fun-examples {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-top: 4px;
}
.fun-example {
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; cursor: pointer;
  font-size: 12px; color: var(--muted); font-family: var(--font-body);
  transition: all 0.15s ease;
}
.fun-example:hover { background: rgba(255,255,255,0.08); color: var(--white); }

/* Result card */
.result-card {
  width: 100%; margin-top: 32px;
  background: var(--card); border: 2px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.result-card.critical { border-color: rgba(217,75,43,0.5); box-shadow: 0 0 40px rgba(217,75,43,0.15); }
.result-card.high { border-color: rgba(193,125,14,0.5); box-shadow: 0 0 40px rgba(193,125,14,0.15); }
.result-card.medium { border-color: rgba(224,168,46,0.45); }
.result-card.low, .result-card.clean { border-color: rgba(74,154,110,0.45); box-shadow: 0 0 40px rgba(74,154,110,0.1); }
.result-card.unknown { border-color: rgba(138,90,0,0.4); }

.result-header {
  padding: 36px 28px 24px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.result-emoji { font-size: 72px; line-height: 1; margin-bottom: 16px; display: block; }
.result-title {
  font-family: var(--font-display); font-weight: 700; font-size: 32px;
  letter-spacing: -0.02em; margin-bottom: 8px;
}
.result-title.critical { color: var(--red); }
.result-title.high { color: var(--orange); }
.result-title.medium { color: var(--yellow); }
.result-title.low, .result-title.clean { color: var(--green); }
.result-title.unknown { color: var(--purple); }

.result-recommendation {
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em;
  padding: 6px 14px; border-radius: 6px;
  display: inline-block;
}
.result-recommendation.critical { background: rgba(217,75,43,0.15); color: var(--red); border: 1px solid rgba(217,75,43,0.4); }
.result-recommendation.high { background: rgba(193,125,14,0.15); color: var(--orange); border: 1px solid rgba(193,125,14,0.4); }
.result-recommendation.medium { background: rgba(224,168,46,0.12); color: var(--yellow); border: 1px solid rgba(224,168,46,0.35); }
.result-recommendation.low, .result-recommendation.clean { background: rgba(74,154,110,0.12); color: var(--green); border: 1px solid rgba(74,154,110,0.35); }
.result-recommendation.unknown { background: rgba(138,90,0,0.12); color: var(--purple); border: 1px solid rgba(138,90,0,0.35); }

.result-body { padding: 24px 28px; }
.result-explain { font-size: 15px; line-height: 1.65; color: rgba(255,255,255,0.85); margin-bottom: 20px; }
.result-explain strong { color: var(--white); font-weight: 600; }
.result-explain .num { font-family: var(--font-mono); }

.result-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-top: 20px;
}
.result-stat {
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px 12px; text-align: center;
}
.result-stat-value {
  font-family: var(--font-display); font-weight: 700; font-size: 24px;
  line-height: 1; letter-spacing: -0.02em;
}
.result-stat-label {
  font-size: 10px; color: var(--muted); margin-top: 6px;
  text-transform: uppercase; letter-spacing: 0.1em;
}

.result-details-toggle {
  display: block; width: 100%; padding: 14px 28px;
  background: rgba(255,255,255,0.02); border: none; border-top: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;
  transition: background 0.15s ease;
}
.result-details-toggle:hover { background: rgba(255,255,255,0.04); color: var(--white); }

.result-details {
  padding: 20px 28px; border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}
.result-detail-row {
  display: flex; justify-content: space-between; padding: 8px 0;
  font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.result-detail-row:last-child { border-bottom: none; }
.result-detail-key { color: var(--muted); }
.result-detail-val { color: var(--white); font-weight: 500; font-family: var(--font-mono); font-size: 12px; }

.addr-display {
  font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  padding: 10px 14px; background: rgba(0,0,0,0.3);
  border-radius: 6px; word-break: break-all; margin-bottom: 16px;
}

.fun-footer {
  text-align: center; color: var(--muted); font-size: 12px; margin-top: 48px;
  line-height: 1.6;
}
.fun-footer a { color: var(--orange); text-decoration: none; }
.fun-footer a:hover { text-decoration: underline; }

/* Loading spinner */
.spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 3px solid rgba(193,125,14,0.2); border-top-color: var(--orange);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}

/* PRO MODE */
.pro-shell {
  padding: 0; min-height: 100vh;
}
.pro-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: rgba(10,10,10,0.9); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}
.pro-brand { display: flex; align-items: center; gap: 12px; }
.pro-brand-text { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--orange); letter-spacing: -0.02em; }
.pro-stats-bar {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px; padding: 16px 24px;
}
.pro-stat {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px;
}
.pro-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; }
.pro-stat-value { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; }
.pro-stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.pro-main { padding: 16px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .pro-main { grid-template-columns: 1fr; } }
.pro-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.pro-panel-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  font-family: var(--font-display); font-weight: 700; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.12em;
  display: flex; justify-content: space-between; align-items: center;
}
.pro-op-row {
  display: grid; grid-template-columns: 130px 1fr 90px 70px 60px;
  gap: 8px; padding: 10px 16px; align-items: center;
  border-bottom: 1px solid var(--border);
}
.pro-op-row:last-child { border-bottom: none; }
.mono { font-family: var(--font-mono); font-size: 12px; }
.risk-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 2px 8px; border-radius: 4px;
}
.risk-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; display: inline-block; }
.risk-CRITICAL { color: var(--red); background: rgba(217,75,43,0.12); border: 1px solid rgba(217,75,43,0.35); }
.risk-HIGH { color: var(--orange); background: rgba(193,125,14,0.12); border: 1px solid rgba(193,125,14,0.35); }
.risk-MEDIUM { color: var(--yellow); background: rgba(224,168,46,0.12); border: 1px solid rgba(224,168,46,0.35); }
.risk-LOW, .risk-CLEAN { color: var(--teal); background: rgba(42,122,122,0.12); border: 1px solid rgba(42,122,122,0.35); }
.risk-UNKNOWN { color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); }

/* WATCH MODE */
.watch-shell {
  max-width: 800px; margin: 0 auto; padding: 80px 20px 120px;
}
.watch-title {
  font-family: var(--font-display); font-weight: 700; font-size: 28px;
  margin-bottom: 6px; letter-spacing: -0.02em;
}
.watch-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
.watch-empty {
  text-align: center; padding: 60px 20px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; color: var(--muted); font-size: 14px; line-height: 1.7;
}
.watch-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px; margin-bottom: 12px;
  display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;
  transition: border-color 0.15s ease;
}
.watch-card:hover { border-color: rgba(193,125,14,0.3); }
.watch-card-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.watch-card-tags { margin-bottom: 8px; }
.watch-card-stats {
  font-size: 12px; color: var(--muted); font-family: var(--font-mono);
}
.watch-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.watch-copy-btn {
  padding: 5px 11px; font-size: 10px; border-radius: 5px; cursor: pointer;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--muted); font-family: var(--font-body); letter-spacing: 0.05em;
  text-transform: uppercase; transition: all 0.15s ease;
}
.watch-copy-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }

/* DEV MODE */
.dev-shell { padding: 24px; max-width: 1100px; margin: 0 auto 100px; }
.dev-title {
  font-family: var(--font-display); font-weight: 700; font-size: 32px;
  margin-bottom: 8px; color: var(--orange); letter-spacing: -0.02em;
}
.dev-sub { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
.dev-section { margin-bottom: 32px; }
.dev-section-title {
  font-family: var(--font-display); font-weight: 700; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--muted); margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.dev-endpoint {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px;
}
.dev-endpoint-method {
  display: inline-block; font-family: var(--font-mono); font-size: 11px;
  font-weight: 700; padding: 2px 8px; border-radius: 4px;
  background: rgba(42,122,122,0.15); color: var(--teal);
  margin-right: 10px; letter-spacing: 0.05em;
}
.dev-endpoint-path {
  font-family: var(--font-mono); font-size: 14px; color: var(--white);
}
.dev-endpoint-desc { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.5; }
.dev-code {
  background: var(--bg-elev-1, #16130E); border: 1px solid var(--border); border-radius: 6px;
  padding: 14px 16px; font-family: var(--font-mono); font-size: 12px;
  color: var(--teal-precise); overflow-x: auto; margin-top: 10px;
  line-height: 1.6; position: relative;
}
.dev-code-copy {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; padding: 4px 10px;
  font-family: var(--font-body); font-size: 10px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.dev-code-copy:hover { color: var(--orange); border-color: var(--orange); }
.dev-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.dev-tab {
  padding: 6px 14px; background: transparent; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px; cursor: pointer;
  font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
}
.dev-tab.active { background: var(--orange); color: var(--white); border-color: var(--orange); }

/* Responsive */
@media (max-width: 600px) {
  .fun-headline { font-size: 26px; }
  .fun-input-wrap { flex-direction: column; }
  .fun-btn { padding: 16px; width: 100%; }
  .result-emoji { font-size: 56px; }
  .result-title { font-size: 24px; }
  .result-stats { grid-template-columns: repeat(2, 1fr); }
  .mode-switcher { bottom: 10px; left: 10px; }
  .hub-nav { top: 10px; right: 10px; }
  .pro-op-row { grid-template-columns: 100px 1fr 80px 60px; }
  .pro-op-row > *:last-child { display: none; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')

// ── API ───────────────────────────────────────────────────────
async function fetchOperator(a) { const r = await fetch(`${API}/v1/operator/${a}`); return r.json(); }
async function fetchToken(a) { const r = await fetch(`${API}/v1/token/${a}`); return r.json(); }
async function fetchStats() { const r = await fetch(`${API}/v1/stats`); return r.json(); }
async function fetchTopOps(n = 10) { const r = await fetch(`${API}/v1/top-operators?limit=${n}`); const d = await r.json(); return d.operators || []; }

// ── Helpers ───────────────────────────────────────────────────
function isValidAddr(s) {
  if (!s) return false;
  const t = s.trim();
  return t.length >= 32 && t.length <= 44 && /^[1-9A-HJ-NP-Za-km-z]+$/.test(t);
}
function fmt(n) { if (n == null) return '—'; return typeof n === 'number' ? n.toLocaleString() : String(n); }
function shortAddr(a) { if (!a || a.length < 12) return a || '—'; return a.slice(0,6)+'…'+a.slice(-4); }
function getWatchlist() { try { return JSON.parse(localStorage.getItem(WL_KEY) || '[]'); } catch { return []; } }
function saveWatchlist(wl) { localStorage.setItem(WL_KEY, JSON.stringify(wl)); }

// ── Label tag helpers ─────────────────────────────────────────
function tagStyle(tag) {
  const t = (tag || '').toLowerCase();
  if (t.includes('serial') || (t.includes('rug') && !t.includes('rate'))) return { color: 'var(--red)', background: 'rgba(217,75,43,0.1)', borderColor: 'rgba(217,75,43,0.3)' };
  if (t.includes('fast') || t.includes('quick')) return { color: 'var(--orange)', background: 'rgba(193,125,14,0.1)', borderColor: 'rgba(193,125,14,0.3)' };
  if (t.includes('bundle') || t.includes('shill')) return { color: 'var(--purple)', background: 'rgba(138,90,0,0.1)', borderColor: 'rgba(138,90,0,0.3)' };
  if (t.includes('kol') || t.includes('smart') || t.includes('legit')) return { color: 'var(--teal)', background: 'rgba(42,122,122,0.1)', borderColor: 'rgba(42,122,122,0.3)' };
  if (t.includes('rename') || t.includes('rebrand') || t.includes('slow') || t.includes('drain')) return { color: 'var(--yellow)', background: 'rgba(224,168,46,0.1)', borderColor: 'rgba(224,168,46,0.3)' };
  return { color: 'var(--muted)', background: 'rgba(255,255,255,0.04)', borderColor: 'var(--border)' };
}

function LabelTag({ tag }) {
  if (!tag) return null;
  const style = tagStyle(tag);
  return <span className="label-tag" style={style} title={tag}>{tag.replace(/_/g, ' ')}</span>;
}

function LabelTagGroup({ tags = [], max = 3 }) {
  if (!tags?.length) return null;
  const shown = tags.slice(0, max);
  const extra = tags.length - max;
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center' }}>
      {shown.map(t => <LabelTag key={t} tag={t} />)}
      {extra > 0 && <span style={{ fontSize: 10, color: 'var(--muted)' }}>+{extra}</span>}
    </div>
  );
}

// ── Follow Button ─────────────────────────────────────────────
function FollowButton({ wallet, small = false }) {
  const t = useT();
  const [following, setFollowing] = useState(() => getWatchlist().includes(wallet));

  const toggle = useCallback((e) => {
    e.stopPropagation();
    const wl = getWatchlist();
    const next = following ? wl.filter(w => w !== wallet) : [...wl, wallet];
    saveWatchlist(next);
    setFollowing(!following);
  }, [wallet, following]);

  return (
    <button
      className={'follow-btn ' + (small ? 'follow-sm ' : '') + (following ? 'following' : '')}
      onClick={toggle}
      title={following ? t.unfollow_title : t.follow_title}
    >
      {following ? t.following : t.follow}
    </button>
  );
}

// ── Rule-based AI Explainer (i18n) ────────────────────────────
function explainRisk({ op, tok, addr, t }) {
  const opKnown = op?.known;
  const tokKnown = tok?.known;

  if (!opKnown && !tokKnown) {
    const [b1, b2, b3, b4, b5] = t.not_found_body;
    return {
      level: 'unknown', emoji: '❓',
      title: t.not_found_title,
      recommendation: t.max_caution,
      explain: <>{b1}<strong>{b2}</strong>{b3}<br/><br/><strong>{b4}</strong>{b5}</>,
      stats: null
    };
  }

  if (opKnown) {
    const rugs = op.confirmed_rugs || 0;
    const tokens = op.total_tokens || 0;
    const rate = op.rug_rate_pct || 0;
    const isSerial = op.tags?.includes('serial_rugger') || op.tags?.includes('serial_deployer');
    const level = op.risk_level;

    const stats = [
      { label: t.rugs_lbl,   value: fmt(rugs),   color: 'var(--red)' },
      { label: t.tokens_lbl, value: fmt(tokens), color: 'var(--orange)' },
      { label: t.rate_lbl,   value: rate != null ? rate + '%' : '—', color: rate >= 50 ? 'var(--red)' : 'var(--white)' },
    ];

    if (rugs >= 5 || level === 'CRITICAL') {
      return { level: 'critical', emoji: '🔴', title: t.extreme_danger, recommendation: t.do_not_buy,
        explain: t.explain_extreme(rugs, tokens, rate, isSerial), stats };
    }
    if (rugs >= 2 || level === 'HIGH') {
      return { level: 'high', emoji: '🟠', title: t.high_risk_title, recommendation: t.avoid_buying,
        explain: t.explain_high(rugs, tokens, rate), stats };
    }
    if (level === 'MEDIUM') {
      return { level: 'medium', emoji: '🟡', title: t.medium_risk_title, recommendation: t.investigate_first,
        explain: t.explain_medium(tokens, rugs), stats };
    }
    return { level: 'low', emoji: '🟢', title: t.low_risk_title, recommendation: t.seems_safe,
      explain: t.explain_low(tokens, rugs), stats };
  }

  if (tokKnown) {
    const score = tok.risk_score || 0;
    const level = tok.risk_level;
    const sym = tok.symbol;
    const outcomeLbl = tok.final_outcome === 'confirmed_scam' ? t.rug
                     : tok.final_outcome === 'confirmed_safe' ? t.safe
                     : t.pending;

    const stats = [
      { label: t.score_lbl,  value: score + '/100', color: score >= 60 ? 'var(--red)' : score >= 40 ? 'var(--yellow)' : 'var(--green)' },
      { label: t.symbol,     value: sym || '—',     color: 'var(--white)' },
      { label: t.result_lbl, value: outcomeLbl,     color: 'var(--muted)' },
    ];

    if (level === 'CRITICAL' || score >= 80 || tok.final_outcome === 'confirmed_scam') {
      return { level: 'critical', emoji: '🔴', title: t.token_dangerous, recommendation: t.do_not_buy,
        explain: t.explain_token_critical(sym, score, tok.final_outcome === 'confirmed_scam', tok.is_bundle, tok.flags), stats };
    }
    if (level === 'HIGH' || score >= 60) {
      return { level: 'high', emoji: '🟠', title: t.token_risky, recommendation: t.max_caution_label,
        explain: t.explain_token_high(score, tok.is_bundle), stats };
    }
    if (level === 'MEDIUM' || score >= 40) {
      return { level: 'medium', emoji: '🟡', title: t.medium_risk_title, recommendation: t.investigate_first,
        explain: t.explain_token_medium(score), stats };
    }
    return { level: 'low', emoji: '🟢', title: t.token_ok, recommendation: t.seems_safe,
      explain: t.explain_token_low(score, tok.final_outcome === 'confirmed_safe'), stats };
  }

  return { level: 'unknown', emoji: '❓', title: t.not_found_title, recommendation: t.max_caution, explain: t.no_data, stats: null };
}

function Shield({ size = 32 }) {

// ── FUN MODE ──────────────────────────────────────────────────
function FunMode() {
  const t = useT();
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [showDetails, setShowDetails] = useState(false);
  const inputRef = useRef(null);

  const check = useCallback(async (addr) => {
    const a = (addr || input).trim();
    if (!isValidAddr(a)) {
      setError(t.invalid);
      return;
    }
    setLoading(true); setError(null); setResult(null); setShowDetails(false);
    try {
      const [op, tok] = await Promise.all([
        fetchOperator(a).catch(() => ({})),
        fetchToken(a).catch(() => ({}))
      ]);
      const analysis = explainRisk({ op, tok, addr: a, t });
      setResult({ ...analysis, addr: a, raw: { op, tok } });
    } catch (e) {
      setError(t.apiErr);
    } finally {
      setLoading(false);
    }
  }, [input, t]);

  const tryExample = useCallback((addr) => {
    setInput(addr);
    setTimeout(() => check(addr), 100);
  }, [check]);

  return (
    <div className="fun-shell">
      <div className="fun-logo">
        <Shield size={40} />
        <div className="fun-logo-text">SolSentry</div>
      </div>

      <h1 className="fun-headline">{t.headline}</h1>
      <p className="fun-sub">{t.sub}</p>

      <div className="fun-input-wrap">
        <input
          ref={inputRef}
          className="fun-input"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && check()}
          placeholder={t.placeholder}
          spellCheck={false}
          autoComplete="off"
          aria-label={t.placeholder}
        />
        <button
          className="fun-btn"
          onClick={() => check()}
          disabled={loading || !input.trim()}
        >
          {loading ? <span className="spinner" aria-label={t.verifying} /> : t.verify}
        </button>
      </div>

      <div className="fun-examples">
        <span style={{ fontSize: 12, color: 'var(--muted)', alignSelf: 'center', marginRight: 4 }}>{t.examples}</span>
        <button className="fun-example" onClick={() => tryExample(DEFAULT_DANGER)}>{t.ex_danger}</button>
        <button className="fun-example" onClick={() => tryExample(DEFAULT_SAFE)}>{t.ex_safe}</button>
      </div>

      {error && (
        <div className="result-card fade-up" style={{ borderColor: 'rgba(217,75,43,0.5)', marginTop: 24, padding: 20 }} role="alert">
          <div style={{ color: 'var(--red)', fontSize: 14 }}>⚠ {error}</div>
        </div>
      )}

      {result && (
        <div className={'result-card scale-in ' + result.level}>
          <div className="result-header">
            <span className="result-emoji" aria-hidden="true">{result.emoji}</span>
            <h2 className={'result-title ' + result.level}>{result.title}</h2>
            <div style={{ marginTop: 10 }}>
              <span className={'result-recommendation ' + result.level}>{result.recommendation}</span>
            </div>
          </div>

          <div className="result-body">
            <div className="addr-display" title={result.addr}>{result.addr}</div>
            <div className="result-explain">{result.explain}</div>

            {result.raw.op?.tags?.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <LabelTagGroup tags={result.raw.op.tags} max={5} />
              </div>
            )}

            {result.stats && (
              <div className="result-stats">
                {result.stats.map(s => (
                  <div className="result-stat" key={s.label}>
                    <div className="result-stat-value" style={{ color: s.color }}>{s.value}</div>
                    <div className="result-stat-label">{s.label}</div>
                  </div>
                ))}
              </div>
            )}

            <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
              <FollowButton wallet={result.addr} />
            </div>
          </div>

          <button
            className="result-details-toggle"
            onClick={() => setShowDetails(!showDetails)}
            aria-expanded={showDetails}
          >
            {showDetails ? t.details_hide : t.details_show}
          </button>

          {showDetails && (
            <div className="result-details fade-up">
              {result.raw.op?.known && (
                <>

                  <div className="result-detail-row"><span className="result-detail-key">{t.risk_level}</span><span className="result-detail-val">{result.raw.op.risk_level || '—'}</span></div>
                  <div className="result-detail-row"><span className="result-detail-key">{t.confirmed_rugs}</span><span className="result-detail-val">{fmt(result.raw.op.confirmed_rugs)}</span></div>
                  <div className="result-detail-row"><span className="result-detail-key">{t.total_tokens}</span><span className="result-detail-val">{fmt(result.raw.op.total_tokens)}</span></div>
                  <div className="result-detail-row"><span className="result-detail-key">{t.rug_rate}</span><span className="result-detail-val">{result.raw.op.rug_rate_pct != null ? result.raw.op.rug_rate_pct + '%' : '—'}</span></div>

                  <div className="result-detail-row"><span className="result-detail-key">{t.bundle}</span><span className="result-detail-val">{result.raw.tok.is_bundle ? t.yes : t.no}</span></div>
                </>

          )}

      )}

      <FunFooter />
    </div>
  );

// ── FunFooter — fetches live stats so footer never goes stale ─
function FunFooter() {
  const t = useT();
  const [s, setS] = useState(null);
  useEffect(() => { fetchStats().then(setS).catch(() => {}); }, []);
  const fmtUptime = (h) => {
    if (!h) return '—';
    const total = Math.floor(h * 60);
    const d = Math.floor(total / 1440);
    const hh = Math.floor((total % 1440) / 60);
    return d > 0 ? `${d}d ${hh}h` : `${hh}h`;
  };
  return (
    <div className="fun-footer">
      <p>
        {t.monitoring} {fmtUptime(s?.runtime_hours)} ·{' '}
        {s ? fmt(s.total_predictions) : '—'} {t.scans_word} ·{' '}
        {s?.accuracy_pct != null ? s.accuracy_pct + '%' : '—'} {t.accuracy_word} ·{' '}
        {s ? fmt(s.confirmed_rugs) : '—'} {t.rugs_confirmed}
      </p>
      <p style={{ marginTop: 8 }}>
        {t.found_something} <a href="https://twitter.com/solsentryai" target="_blank" rel="noopener noreferrer">@solsentryai</a>
      </p>
    </div>
  );
}

// ── WATCH MODE ────────────────────────────────────────────────
function WatchlistMode({ onModeChange }) {
  const t = useT();
  const [wallets, setWallets] = useState(getWatchlist);
  const [data, setData] = useState({});
  const [loading, setLoading] = useState(false);
  const [copied, setCopied] = useState(null);

  const refresh = useCallback(async (ws) => {
    if (!ws.length) return;
    setLoading(true);
    const results = await Promise.allSettled(ws.map(w => fetchOperator(w).then(d => [w, d])));
    const map = {};
    results.forEach(r => {
      if (r.status === 'fulfilled') { const [w, d] = r.value; map[w] = d; }
    });
    setData(prev => ({ ...prev, ...map }));
    setLoading(false);
  }, []);

  useEffect(() => {
    refresh(wallets);
    const id = setInterval(() => refresh(wallets), 60000);
    return () => clearInterval(id);
  }, [wallets.join(','), refresh]);

  const unfollow = (wallet) => {
    const next = wallets.filter(w => w !== wallet);
    saveWatchlist(next);
    setWallets(next);
    setData(prev => { const d = {...prev}; delete d[wallet]; return d; });
  };

  const copyAddr = (wallet) => {
    navigator.clipboard?.writeText(wallet);
    setCopied(wallet);
    setTimeout(() => setCopied(null), 1500);
  };

  return (
    <div className="watch-shell">
      <div className="watch-title">👁 {t.watchlist}</div>
      <p className="watch-sub">
        {wallets.length > 0
          ? `${t.wallets_followed(wallets.length)}${loading ? ' · ' + t.watch_loading : ''}`
          : t.no_wallets}
      </p>

      {wallets.length === 0 ? (
        <div className="watch-empty">
          <div style={{ fontSize: 48, marginBottom: 16 }}>📋</div>
          <div style={{ fontWeight: 600, marginBottom: 8 }}>{t.watch_empty_title}</div>
          <div style={{ fontSize: 13 }}>
            {t.watch_empty_msg_pre}<strong>{t.watch_empty_msg_btn}</strong>{t.watch_empty_msg_mid}
            <button
              style={{ background: 'none', border: 'none', color: 'var(--orange)', cursor: 'pointer', fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 700, padding: 0 }}
              onClick={() => onModeChange('fun')}
            >{t.mode_easy}</button>
            {t.watch_empty_or}
            <button
              style={{ background: 'none', border: 'none', color: 'var(--orange)', cursor: 'pointer', fontFamily: 'inherit', fontSize: 'inherit', fontWeight: 700, padding: 0 }}
              onClick={() => onModeChange('pro')}
            >{t.mode_pro}</button>
            {t.watch_empty_msg_suf}
          </div>
        </div>
      ) : (
        wallets.map(wallet => {
          const op = data[wallet];
          const level = op?.risk_level || 'UNKNOWN';
          const isLoading = loading && !op;
          return (
            <div className="watch-card fade-up" key={wallet}>
              <div style={{ minWidth: 0 }}>
                <div className="watch-card-top">
                  <span className={'risk-pill risk-' + level}>{level}</span>
                  <span className="mono" style={{ fontSize: 12, color: 'var(--muted)', overflow: 'hidden', textOverflow: 'ellipsis' }}
                    title={wallet}>{shortAddr(wallet)}</span>
                  {isLoading && <span className="spinner" style={{ width: 12, height: 12, borderWidth: 2, flexShrink: 0 }} />}
                </div>
                {op?.tags?.length > 0 && (
                  <div className="watch-card-tags">
                    <LabelTagGroup tags={op.tags} max={5} />
                  </div>
                )}
                <div className="watch-card-stats">
                  {op?.known
                    ? `${fmt(op.confirmed_rugs)} ${t.rugs_short.toLowerCase()} · ${fmt(op.total_tokens)} tokens · ${op.rug_rate_pct ?? 0}% ${t.rug_rate.toLowerCase()}`
                    : isLoading ? t.op_loading : t.op_not_found}
                </div>
              </div>
              <div className="watch-actions">
                <button className="follow-btn follow-sm following" onClick={() => unfollow(wallet)}>{t.remove}</button>
                <button className="watch-copy-btn" onClick={() => copyAddr(wallet)}>
                  {copied === wallet ? t.copied : t.copy}
                </button>
              </div>
            </div>
          );
        })
      )}

      {wallets.length > 0 && (
        <div style={{ textAlign: 'center', marginTop: 32, fontSize: 12, color: 'var(--muted)' }}>
          <button
            style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 'inherit', fontFamily: 'inherit' }}
            onClick={() => { saveWatchlist([]); setWallets([]); setData({}); }}
          >
            {t.clear_all}
          </button>
          {' · '}
          <button
            style={{ background: 'none', border: 'none', color: 'var(--muted)', cursor: 'pointer', fontSize: 'inherit', fontFamily: 'inherit' }}
            onClick={() => refresh(wallets)}
          >
            {t.refresh_now}
          </button>
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  // Mode migration: if user came from previous live deploy (ss_mode key),
  // honor that selection instead of forcing them back to 'fun'.
  const [mode, setMode] = useState(() => {
    const stored = localStorage.getItem(MODE_KEY_NEW)
              || localStorage.getItem(MODE_KEY_LEGACY_LIVE)
              || 'fun';
    // Live used 'easy' instead of 'fun' — normalize.
    return stored === 'easy' ? 'fun' : stored;
  });
  const [lang, setLang] = useState(() => {
    const stored = localStorage.getItem(LANG_KEY) || localStorage.getItem('ss_lang') || 'pt';
    return stored === 'en' ? 'en' : 'pt';
  });

  const changeMode = useCallback((m) => {
    setMode(m);
    localStorage.setItem(MODE_KEY_NEW, m);
  }, []);

  const changeLang = useCallback((l) => {
    setLang(l);
    localStorage.setItem(LANG_KEY, l);
    document.documentElement.lang = l === 'en' ? 'en' : 'pt-BR';
  }, []);

  const t = T[lang] || T.pt;

  return (
    <LangCtx.Provider value={t}>
      {mode === 'fun'   && <FunMode />}
      {mode === 'pro'   && <ProMode />}
      {mode === 'dev'   && <DevMode />}
      {mode === 'watch' && <WatchlistMode onModeChange={changeMode} />}
      <ModeSwitcher mode={mode} onChange={changeMode} />
      <HubNav lang={lang} onLangChange={changeLang} />
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
